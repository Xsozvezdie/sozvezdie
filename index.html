<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Созвездие</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #0b0f19;
    --bg-soft: #111827;
    --panel: #161d2e;
    --line: #262f45;
    --ink: #e8ecf7;
    --ink-dim: #8892ad;
    --gold: #f2c14e;
    --edge: #4b3f78;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(ellipse at 30% 0%, #131a2c 0%, var(--bg) 55%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .wrap{
    max-width: 820px;
    margin: 0 auto;
    padding: 64px 24px 80px;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
  }
  .wrap.wide{ max-width: 1040px; }
  .eyebrow{
    font-family:'Space Grotesk',sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 18px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: clamp(30px, 5.5vw, 48px);
    line-height: 1.08;
    margin: 0 0 20px;
    letter-spacing: -0.01em;
  }
  h1 span{ color: var(--gold); }
  p.lead{
    font-size: 16px;
    line-height: 1.6;
    color: #c3c9de;
    max-width: 600px;
    margin: 0 0 32px;
  }
  .btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 600;
    font-size: 15px;
    background: var(--gold);
    color: #1a1406;
    border: none;
    padding: 14px 26px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{ transform: translateY(-1px); box-shadow: 0 6px 24px rgba(242,193,78,0.25); }
  .btn.ghost{
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn.ghost:hover{ border-color: var(--gold); box-shadow:none; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .hero-graph{ width:100%; height: 200px; margin: 4px 0 8px; opacity:.9; }

  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px;
  }

  textarea{
    width:100%;
    min-height: 220px;
    background: var(--bg-soft);
    border:1px solid var(--line);
    color: var(--ink);
    padding: 18px;
    border-radius: 12px;
    font-size: 15.5px;
    line-height: 1.55;
    font-family:'Inter',sans-serif;
    resize: vertical;
    margin-bottom: 14px;
  }
  textarea:focus{ outline:none; border-color: var(--gold); }

  input[type=text], input[type=password]{
    width:100%;
    background: var(--bg-soft);
    border:1px solid var(--line);
    color: var(--ink);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 16px;
    font-family:'Inter',sans-serif;
    margin-bottom: 14px;
    display: block;
  }
  input[type=text]:focus, input[type=password]:focus{ outline:none; border-color: var(--gold); }

  select{
    width:100%;
    background: var(--bg-soft);
    border:1px solid var(--line);
    color: var(--ink);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 15px;
    font-family:'Inter',sans-serif;
    margin-bottom: 14px;
    display: block;
  }
  select:focus{ outline:none; border-color: var(--gold); }

  .counter{ font-size:12px; color: var(--ink-dim); margin-bottom: 18px; }

  .prompts{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 18px; }
  .prompt-chip{
    font-size:12px; color: var(--ink-dim);
    border:1px solid var(--line); border-radius:999px;
    padding: 6px 12px;
    background: var(--bg-soft);
  }

  .footer-note{
    margin-top: auto;
    padding-top: 40px;
    font-size: 13px;
    color: var(--ink-dim);
  }

  .legend{ display:flex; flex-wrap:wrap; gap:10px; margin: 18px 0 4px; }
  .legend-item{
    display:flex; align-items:center; gap:7px;
    font-size:13px; color: var(--ink-dim);
    border:1px solid var(--line); border-radius:999px;
    padding: 6px 12px;
  }
  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; background: transparent; border: 2px solid; box-sizing: border-box; }

  .loading-wrap{
    display:flex; flex-direction:column; align-items:flex-start; gap:14px;
    padding: 40px 0;
  }
  .spinner{
    width: 28px; height:28px; border-radius:50%;
    border: 3px solid var(--line);
    border-top-color: var(--gold);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  svg text{ font-family:'Inter',sans-serif; fill:#c3c9de; font-size:11px; }

  .err{ color:#ef6f8e; font-size:14px; margin-bottom:14px; word-break: break-word; }

  ::selection{ background: var(--gold); color:#1a1406; }

  /* ---------------- темы оформления ---------------- */
  @keyframes theme-shift{
    0%{ background-position: 0% 50%; }
    50%{ background-position: 100% 50%; }
    100%{ background-position: 0% 50%; }
  }
  body[data-theme]::before{
    content: ''; position: fixed; inset: 0; z-index: -1;
  }

  body[data-theme="light"]{
    --bg: #f3f4fa; --bg-soft: #ffffff; --panel: #ffffff; --line: #e1e3ee;
    --ink: #1b2030; --ink-dim: #6b7280; --edge: #d7d9ea;
    --gold: #3457d5;
  }
  body[data-theme="light"] .card, body[data-theme="light"] .nav, body[data-theme="light"] .chat-bubble{
    box-shadow: 0 2px 10px rgba(20,20,40,0.06);
  }

  body.bg-motion[data-theme="light"]::before{
    animation: light-bg-drift 50s ease-in-out infinite alternate;
  }
  @keyframes light-bg-drift{
    0%   { background-position: 40% 30%; transform: scale(1.06); }
    50%  { background-position: 55% 60%; transform: scale(1.09); }
    100% { background-position: 45% 40%; transform: scale(1.06); }
  }
  /* кнопки/бейджи используют --gold как текст на светлой заливке — нужен светлый текст поверх акцента */
  body[data-theme="light"] .btn, body[data-theme="light"] .icon-btn.checked,
  body[data-theme="light"] .chat-bubble.mine, body[data-theme="light"] .nav-link.alert{
    color: #ffffff;
  }

  body[data-theme="aurora"]::before{
    background: linear-gradient(120deg, #0b1020, #123b34, #0b1020, #2a1f57);
    background-size: 400% 400%; animation: theme-shift 20s ease infinite;
  }
  body[data-theme="aurora"]{ --gold: #4fd8c4; }

  body[data-theme="sunset"]::before{
    background: linear-gradient(120deg, #1a0f1f, #5c2a3a, #1a0f1f, #7a4326);
    background-size: 400% 400%; animation: theme-shift 20s ease infinite;
  }
  body[data-theme="sunset"]{ --gold: #ff8f6b; }

  body[data-theme="ocean"]::before{
    background: linear-gradient(120deg, #061323, #103a52, #061323, #0d2a4a);
    background-size: 400% 400%; animation: theme-shift 22s ease infinite;
  }
  body[data-theme="ocean"]{ --gold: #4fc3f7; }

  body[data-theme="forest"]::before{
    background: linear-gradient(120deg, #0a1710, #1c3a25, #0a1710, #24462c);
    background-size: 400% 400%; animation: theme-shift 24s ease infinite;
  }
  body[data-theme="forest"]{ --gold: #7fe0a0; }

  body[data-theme="nebula"]::before{
    background: linear-gradient(120deg, #100b22, #3a1656, #100b22, #551a4a);
    background-size: 400% 400%; animation: theme-shift 18s ease infinite;
  }
  body[data-theme="nebula"]{ --gold: #c792ea; }

  .theme-grid{ display:flex; flex-wrap:wrap; gap:12px; margin-top: 10px; }
  .theme-swatch{
    width: 74px; cursor:pointer; text-align:center; font-size:11px; color: var(--ink-dim);
  }
  .theme-swatch-circle{
    width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 6px;
    border: 2px solid var(--line);
  }
  .theme-swatch.active .theme-swatch-circle{ border-color: var(--gold); box-shadow: 0 0 0 2px rgba(242,193,78,0.3); }
  .theme-swatch.active{ color: var(--ink); font-weight:600; }

  @media (max-width: 640px){
    .wrap{ padding: 20px 16px 60px; }
    .card{ padding: 20px; }
    h1{ font-size: clamp(26px, 8vw, 36px); }
    .nav{ padding: 8px; }
    .nav-links{ gap: 6px; }
    .nav-link{ font-size: 12px; padding: 7px 10px; }
    .nav-links{ flex-wrap: wrap; gap: 14px; width: 100%; }
    .person-row{ flex-wrap: wrap; gap: 10px; }
    .msg-row{ max-width: 88%; }
    .hero-graph{ height: 150px; }
  }

  .nav-wrapper{
    position: sticky; top: 16px; z-index: 50; margin-bottom: 40px;
  }
  .brand-row{ margin-bottom: 10px; }
  .nav{
    display:flex; align-items:center; flex-wrap: wrap;

<script>
// ---------------- backend (Firebase Firestore) ----------------
// Вставь сюда свои ключи из консоли Firebase (Project settings -> General -> Your apps -> SDK setup).
const firebaseConfig = {
  apiKey: "AIzaSyAni9Eg6fIJoGPD_E5VDLCVuO8yYzCBMIc",
  authDomain: "sozvezdie-3f7e6.firebaseapp.com",
  projectId: "sozvezdie-3f7e6",
  storageBucket: "sozvezdie-3f7e6.firebasestorage.app",
  messagingSenderId: "845619165839",
  appId: "1:845619165839:web:051ce4b807386aa8e38efa"
};

let db = null;
let auth = null;
let firebaseReady = false;
try{
  if(firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('ВСТАВЬ') === -1){
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    firebaseReady = true;
  }
}catch(e){
  console.error('Firebase init failed', e);
}

function backendNotConfiguredError(){
  return new Error('База данных не подключена: вставь конфиг Firebase в начало <script> (переменная firebaseConfig).');
}

// Логины у нас без email, но Firebase Auth умеет только email+пароль,
// поэтому превращаем ник в служебный псевдо-адрес — пользователь его не видит.
function hashUsername(name){
  const s = name.toLowerCase().trim();
  let h = 0;
  for(let i = 0; i < s.length; i++){
    h = (h * 31 + s.codePointAt(i)) >>> 0;
  }
  return h.toString(36) + s.length.toString(36);
}
function usernameToEmail(name){
  return 'u' + hashUsername(name) + '@sozvezdie.local';
}

async function registerUser(username, password){
  if(!firebaseReady) throw backendNotConfiguredError();
  const email = usernameToEmail(username);
  let cred;
  try{
    cred = await auth.createUserWithEmailAndPassword(email, password);
  }catch(e){
    if(e.code === 'auth/email-already-in-use') throw new Error('Это имя уже занято — выбери другое.');
    if(e.code === 'auth/weak-password') throw new Error('Пароль слишком короткий — минимум 6 символов.');
    throw new Error(e.message);
  }
  await db.collection('users').doc(cred.user.uid).set({ name: username, login: username, ts: Date.now() });
  return { uid: cred.user.uid, name: username, login: username };
}

async function loginUser(username, password){
  if(!firebaseReady) throw backendNotConfiguredError();
  const email = usernameToEmail(username);
  let cred;
  try{
    cred = await auth.signInWithEmailAndPassword(email, password);
  }catch(e){
    if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password'){
      throw new Error('Неверный логин или пароль.');
    }
    throw new Error(e.message);
  }
  const doc = await db.collection('users').doc(cred.user.uid).get();
  const data = doc.exists ? doc.data() : {};
  return { uid: cred.user.uid, name: data.name || username, login: data.login || username, graph: data.graph || null, text: data.text || '', profile: data.profile || null, isAdmin: data.isAdmin === true, theme: data.theme || 'dark' };
}

function logoutUser(){
  if(auth) auth.signOut();
}

async function changeLogin(newLogin, currentPassword){
  if(!firebaseReady) throw backendNotConfiguredError();
  const user = auth.currentUser;
  if(!user) throw new Error('Сессия истекла, войди заново.');
  const oldEmail = usernameToEmail(state.user.login);
  const cred = firebase.auth.EmailAuthProvider.credential(oldEmail, currentPassword);
  try{
    await user.reauthenticateWithCredential(cred);
  }catch(e){
    throw new Error('Неверный текущий пароль.');
  }
  const newEmail = usernameToEmail(newLogin);
  try{
    await user.updateEmail(newEmail);
  }catch(e){
    if(e.code === 'auth/email-already-in-use') throw new Error('Такой логин уже занят.');
    throw new Error(e.message);
  }
  await db.collection('users').doc(user.uid).update({ login: newLogin });
}

async function changeDisplayName(newName){
  if(!firebaseReady) throw backendNotConfiguredError();
  await db.collection('users').doc(state.user.uid).update({ name: newName });
}

async function saveUserGraph(uid, text, graph){
  if(!firebaseReady) throw backendNotConfiguredError();
  await db.collection('users').doc(uid).set({ text, graph, ts: Date.now() }, { merge: true });
}

async function fetchAllUsers(){
  if(!firebaseReady) throw backendNotConfiguredError();
  const snap = await db.collection('users').orderBy('ts', 'desc').get();
  return snap.docs.map(d => ({ uid: d.id, ...d.data() })).filter(u => u.graph);
}

// ---------------- друзья ----------------
// ---------------- звонки (WebRTC + Firestore как канал сигнализации) ----------------
// Без своего сервера сигнализации: договариваемся о соединении через документы в Firestore,
// а сам голос/видео потом идёт напрямую между браузерами (peer-to-peer).
// Ограничение: используется только публичный STUN, без TURN — в редких случаях
// (жёсткий NAT/корпоративная сеть) соединение может не установиться напрямую.
const RTC_CONFIG = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

let currentCall = null; // { callId, pc, localStream, remoteStream, unsubs:[], role, type }
let incomingCallUnsub = null;
let incomingCallDoc = null;

function listenForIncomingCalls(){
  if(incomingCallUnsub || !state.user) return;
  incomingCallUnsub = db.collection('calls')
    .where('toUid','==',state.user.uid)
    .where('status','==','ringing')
    .onSnapshot(snap => {
      const doc = snap.docs.find(d => !d.metadata.hasPendingWrites);
      if(doc && !currentCall){
        incomingCallDoc = { id: doc.id, ...doc.data() };
        renderIncomingCallBanner();
      } else if(!doc && incomingCallDoc){
        incomingCallDoc = null;
        renderIncomingCallBanner();
      }
    }, err => console.error('incoming call listen failed', err));
}

function stopListeningForIncomingCalls(){
  if(incomingCallUnsub){ incomingCallUnsub(); incomingCallUnsub = null; }
  incomingCallDoc = null;
  renderIncomingCallBanner();
}

async function startCall(toUid, toName, type){
  if(!firebaseReady) throw backendNotConfiguredError();
  if(currentCall){ showToast('Уже есть активный звонок'); return; }
  const constraints = type === 'video' ? { audio: true, video: true } : { audio: true };
  let localStream;
  try{
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
  }catch(e){
    showToast('Нет доступа к микрофону/камере: ' + (e.name || e.message));
    return;
  }
  const pc = new RTCPeerConnection(RTC_CONFIG);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  const remoteStream = new MediaStream();
  pc.ontrack = (e) => { e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t)); renderCallScreen(); };

  const callRef = db.collection('calls').doc();
  currentCall = { callId: callRef.id, pc, localStream, remoteStream, unsubs: [], role: 'caller', type, otherUid: toUid, otherName: toName, startedAt: null };

  pc.onicecandidate = (e) => { if(e.candidate) callRef.collection('callerCandidates').add(e.candidate.toJSON()); };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await callRef.set({
    fromUid: state.user.uid, fromName: state.user.name, toUid, toName,
    type, status: 'ringing', offer: { sdp: offer.sdp, type: offer.type }, ts: Date.now()
  });

  const unsub1 = callRef.onSnapshot(async (doc) => {
    const data = doc.data();
    if(!data) return;
    if(data.status === 'declined'){ endCall(false, 'declined'); }
    if(data.status === 'ended'){ endCall(false); }
    if(data.answer && pc.currentRemoteDescription === null){
      await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
      currentCall.startedAt = Date.now();
    }
  });
  const unsub2 = callRef.collection('calleeCandidates').onSnapshot(snap => {
    snap.docChanges().forEach(change => {
      if(change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{});
    });
  });
  currentCall.unsubs.push(unsub1, unsub2);
  currentCall.notifyEnd = () => callRef.update({ status: 'ended' }).catch(()=>{});
  renderCallScreen();
}

async function acceptIncomingCall(){
  if(!incomingCallDoc) return;
  const call = incomingCallDoc;
  incomingCallDoc = null;
  renderIncomingCallBanner();
  const constraints = call.type === 'video' ? { audio: true, video: true } : { audio: true };
  let localStream;
  try{
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
  }catch(e){
    showToast('Нет доступа к микрофону/камере: ' + (e.name || e.message));
    return;
  }
  const pc = new RTCPeerConnection(RTC_CONFIG);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  const remoteStream = new MediaStream();
  pc.ontrack = (e) => { e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t)); renderCallScreen(); };

  const callRef = db.collection('calls').doc(call.id);
  currentCall = { callId: call.id, pc, localStream, remoteStream, unsubs: [], role: 'callee', type: call.type, otherUid: call.fromUid, otherName: call.fromName, startedAt: Date.now() };

  pc.onicecandidate = (e) => { if(e.candidate) callRef.collection('calleeCandidates').add(e.candidate.toJSON()); };

  await pc.setRemoteDescription(new RTCSessionDescription(call.offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await callRef.update({ status: 'active', answer: { sdp: answer.sdp, type: answer.type } });

  const unsub1 = callRef.onSnapshot(doc => {
    const data = doc.data();
    if(data && data.status === 'ended') endCall(false);
  });
  const unsub2 = callRef.collection('callerCandidates').onSnapshot(snap => {
    snap.docChanges().forEach(change => {
      if(change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(()=>{});
    });
  });
  currentCall.unsubs.push(unsub1, unsub2);
  currentCall.notifyEnd = () => callRef.update({ status: 'ended' }).catch(()=>{});
  renderCallScreen();
}

async function declineIncomingCall(){
  if(!incomingCallDoc) return;
  try{ await db.collection('calls').doc(incomingCallDoc.id).update({ status: 'declined' }); }catch(e){}
  incomingCallDoc = null;
  renderIncomingCallBanner();
}

function endCall(notifyRemote, reason){
  if(!currentCall) return;
  const call = currentCall;
  currentCall = null;
  call.unsubs.forEach(fn => { try{ fn(); }catch(e){} });
  if(notifyRemote !== false && call.notifyEnd){ call.notifyEnd(); }
  try{ call.pc.close(); }catch(e){}
  try{ call.localStream.getTracks().forEach(t => t.stop()); }catch(e){}
  renderCallScreen();

  let outcome, duration = 0;
  if(reason === 'declined'){ outcome = 'declined'; }
  else if(call.startedAt){ outcome = 'completed'; duration = Math.round((Date.now() - call.startedAt)/1000); }
  else { outcome = 'missed'; }
  if(call.otherUid){
    logCallMessage(call.otherUid, call.otherName, call.type, outcome, duration).catch(e => console.error('call log failed', e));
  }
}

async function logCallMessage(otherUid, otherName, type, outcome, duration){
  if(!firebaseReady) return;
  await db.collection('messages').add({
    chatId: pairId(state.user.uid, otherUid),
    fromUid: state.user.uid, fromName: state.user.name, toUid: otherUid, toName: otherName,
    ts: Date.now(), callSummary: { type, outcome, duration }
  });
}

function renderIncomingCallBanner(){
  let el2 = document.getElementById('incoming-call-banner');
  if(el2) el2.remove();
  if(!incomingCallDoc) return;
  const banner = document.createElement('div');
  banner.id = 'incoming-call-banner';
  banner.className = 'incoming-call-banner';
  const icon = incomingCallDoc.type === 'video' ? '📹' : '📞';
  banner.innerHTML = `<div class="incoming-call-text">${icon} ${incomingCallDoc.fromName} звонит…</div>`;
  const actions = document.createElement('div');
  actions.style.display = 'flex'; actions.style.gap = '10px';
  const acceptBtn = document.createElement('button');
  acceptBtn.className = 'btn'; acceptBtn.textContent = 'Принять';
  acceptBtn.onclick = () => acceptIncomingCall();
  const declineBtn = document.createElement('button');
  declineBtn.className = 'btn ghost'; declineBtn.textContent = 'Отклонить';
  declineBtn.onclick = () => declineIncomingCall();
  actions.appendChild(acceptBtn); actions.appendChild(declineBtn);
  banner.appendChild(actions);
  document.body.appendChild(banner);
}

function renderCallScreen(){
  let overlay = document.getElementById('call-overlay');
  if(overlay) overlay.remove();
  if(!currentCall) return;

  overlay = document.createElement('div');
  overlay.id = 'call-overlay';
  overlay.className = 'call-overlay';

  const title = document.createElement('div');
  title.className = 'call-title';
  title.textContent = currentCall.otherName + (currentCall.role === 'caller' ? ' · вызов…' : ' · звонок');
  overlay.appendChild(title);

  if(currentCall.type === 'video'){
    const remoteVid = document.createElement('video');
    remoteVid.autoplay = true; remoteVid.playsInline = true; remoteVid.className = 'call-remote-video';
    remoteVid.srcObject = currentCall.remoteStream;
    overlay.appendChild(remoteVid);

    const localVid = document.createElement('video');
    localVid.autoplay = true; localVid.playsInline = true; localVid.muted = true; localVid.className = 'call-local-video';
    localVid.srcObject = currentCall.localStream;
    overlay.appendChild(localVid);
  } else {
    const avatar = document.createElement('div');
    avatar.className = 'call-avatar';
    avatar.textContent = (currentCall.otherName || '?')[0].toUpperCase();
    overlay.appendChild(avatar);
    // audio-only тоже нужно подключить удалённый звук
    const remoteAudio = document.createElement('audio');
    remoteAudio.autoplay = true;
    remoteAudio.srcObject = currentCall.remoteStream;
    overlay.appendChild(remoteAudio);
  }

  const controls = document.createElement('div');
  controls.className = 'call-controls';
  const hangupBtn = document.createElement('button');
  hangupBtn.className = 'call-hangup-btn'; hangupBtn.textContent = '📵';
  hangupBtn.onclick = () => endCall(true);
  controls.appendChild(hangupBtn);
  overlay.appendChild(controls);

  document.body.appendChild(overlay);
}

function pairId(uidA, uidB){
  return [uidA, uidB].sort().join('_');
}

async function getFriendRequestBetween(uidA, uidB){
  if(!firebaseReady) throw backendNotConfiguredError();
  const q1 = await db.collection('friendRequests').where('fromUid','==',uidA).where('toUid','==',uidB).limit(1).get();
  if(!q1.empty) return { id: q1.docs[0].id, ...q1.docs[0].data() };
  const q2 = await db.collection('friendRequests').where('fromUid','==',uidB).where('toUid','==',uidA).limit(1).get();
  if(!q2.empty) return { id: q2.docs[0].id, ...q2.docs[0].data() };
  return null;
}

async function sendFriendRequest(toUid, toName){
  if(!firebaseReady) throw backendNotConfiguredError();
  const me = state.user;
  const existing = await getFriendRequestBetween(me.uid, toUid);
  if(existing){
    if(existing.status === 'pending' && existing.fromUid === toUid){
      await db.collection('friendRequests').doc(existing.id).update({ status: 'accepted' });
      return { ...existing, status: 'accepted' };
    }
    return existing;
  }
  const doc = await db.collection('friendRequests').add({
    fromUid: me.uid, fromName: me.name, toUid, toName, status: 'pending', ts: Date.now()
  });
  return { id: doc.id, fromUid: me.uid, fromName: me.name, toUid, toName, status: 'pending' };
}

async function respondFriendRequest(requestId, accept){
  if(!firebaseReady) throw backendNotConfiguredError();
  if(accept){
    await db.collection('friendRequests').doc(requestId).update({ status: 'accepted' });
  } else {
    await db.collection('friendRequests').doc(requestId).delete();
  }
}

async function listIncomingRequests(){
  if(!firebaseReady) throw backendNotConfiguredError();
  const snap = await db.collection('friendRequests').where('toUid','==',state.user.uid).where('status','==','pending').get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function listFriends(){
  if(!firebaseReady) throw backendNotConfiguredError();
  const uid = state.user.uid;
  const [q1, q2] = await Promise.all([
    db.collection('friendRequests').where('fromUid','==',uid).where('status','==','accepted').get(),
    db.collection('friendRequests').where('toUid','==',uid).where('status','==','accepted').get(),
  ]);
  const friends = [];
  q1.docs.forEach(d => { const v = d.data(); friends.push({ uid: v.toUid, name: v.toName }); });
  q2.docs.forEach(d => { const v = d.data(); friends.push({ uid: v.fromUid, name: v.fromName }); });
  return friends;
}

async function getUnreadChatsCount(){
  if(!state.user) return 0;
  const meDoc = await db.collection('users').doc(state.user.uid).get();
  const lastRead = (meDoc.exists && meDoc.data().lastRead) || {};
  const snap = await db.collection('messages').where('toUid','==',state.user.uid).get();
  const groupSnap = await db.collection('groups').where('members','array-contains',state.user.uid).get();
  const groupIds = new Set(groupSnap.docs.map(d => 'g_' + d.id));
  const latestByChat = {};
  snap.docs.forEach(d => {
    const m = d.data();
    if(!latestByChat[m.chatId] || m.ts > latestByChat[m.chatId]) latestByChat[m.chatId] = m.ts;
  });
  // групповые сообщения не от меня тоже считаем непрочитанными
  if(groupIds.size){
    const groupMsgsSnap = await Promise.all([...groupIds].map(gid => db.collection('messages').where('chatId','==',gid).get()));
    groupMsgsSnap.forEach(gs => gs.docs.forEach(d => {
      const m = d.data();
      if(m.fromUid === state.user.uid) return;
      if(!latestByChat[m.chatId] || m.ts > latestByChat[m.chatId]) latestByChat[m.chatId] = m.ts;
    }));
  }
  let count = 0;
  Object.keys(latestByChat).forEach(chatId => {
    if(latestByChat[chatId] > (lastRead[chatId] || 0)) count++;
  });
  return count;
}

async function refreshNotificationCounts(){
  if(!state.user) return;
  try{
    const [incoming, unread] = await Promise.all([listIncomingRequests(), getUnreadChatsCount()]);
    state.pendingRequestCount = incoming.length;
    state.unreadChatsCount = unread;
  }catch(e){ console.error('notif refresh failed', e); }
}

function listenToMessages(chatId, callback){
  return db.collection('messages').where('chatId','==',chatId)
    .onSnapshot(snap => {
      const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      msgs.sort((a,b) => (a.ts||0) - (b.ts||0));
      callback(msgs);
    }, err => console.error('chat listen failed', err));
}

    const icon = m.callSummary.type === 'video' ? '📹' : '📞';

    if(m.callSummary.outcome === 'declined') return icon + ' Звонок отклонён';

// Собирает список всех переписок (личных и групповых) с превью последнего сообщения.
async function listChatThreads(){
  const me = state.user.uid;
  const [sentSnap, receivedSnap, groupsSnap, meDoc] = await Promise.all([
    db.collection('messages').where('fromUid','==',me).get(),
    db.collection('messages').where('toUid','==',me).get(),
    db.collection('groups').where('members','array-contains',me).get(),
    db.collection('users').doc(me).get(),
  ]);
  const byChatId = {};
  function ingest(doc){
    const m = doc.data();
    const existing = byChatId[m.chatId];
    if(!existing || (m.ts||0) > (existing.latest?.ts||0)){
      byChatId[m.chatId] = {
        chatId: m.chatId,
        isGroup: !!m.groupId,
        groupId: m.groupId || null,
        otherUid: m.fromUid === me ? m.toUid : m.fromUid,
        otherName: m.fromUid === me ? m.toName : m.fromName,
        latest: m,
      };
    }
  }
  sentSnap.docs.forEach(ingest);
  receivedSnap.docs.forEach(ingest);

  const groupMsgLists = await Promise.all(groupsSnap.docs.map(d => db.collection('messages').where('chatId','==','g_'+d.id).get()));
  groupsSnap.docs.forEach((d, i) => {
    const g = d.data();
    const chatId = 'g_' + d.id;
    groupMsgLists[i].docs.forEach(md => {
      const m = md.data();
      const existing = byChatId[chatId];
      if(!existing || (m.ts||0) > (existing.latest?.ts||0)){
        byChatId[chatId] = { chatId, isGroup:true, groupId: d.id, groupName: g.name, latest: m };
      }
    });
    if(!byChatId[chatId]){
      byChatId[chatId] = { chatId, isGroup:true, groupId: d.id, groupName: g.name, latest: null };
    } else {
      byChatId[chatId].groupName = g.name;
    }
  });

  const lastRead = (meDoc.exists && meDoc.data().lastRead) || {};
  const threads = Object.values(byChatId).map(t => ({
    ...t,
    unread: !!(t.latest && t.latest.fromUid !== me && (t.latest.ts||0) > (lastRead[t.chatId]||0))
  }));
  threads.sort((a,b) => (b.latest?.ts||0) - (a.latest?.ts||0));
  return threads;
}

function formatLastSeen(ts){
  if(!ts) return 'давно не заходил(а)';
  const diffMin = (Date.now() - ts) / 60000;
  if(diffMin < 2) return 'в сети';
  if(diffMin < 60) return `был(а) в сети ${Math.round(diffMin)} мин назад`;
  const diffH = diffMin / 60;
  if(diffH < 24) return `был(а) в сети ${Math.round(diffH)} ч назад`;
  return `был(а) в сети ${Math.round(diffH/24)} дн назад`;
}

// Статус виден только если ОБА участника не скрыли его — как в Telegram.
async function getStatusText(otherUid){
  if(!state.user || !firebaseReady) return null;
  try{
    const [meDoc, otherDoc] = await Promise.all([
      db.collection('users').doc(state.user.uid).get(),
      db.collection('users').doc(otherUid).get(),
    ]);
    const myShow = !meDoc.exists || meDoc.data().showStatus !== false;
    if(!myShow) return null;
    if(!otherDoc.exists) return null;
    const otherShow = otherDoc.data().showStatus !== false;
    if(!otherShow) return null;
    return formatLastSeen(otherDoc.data().lastActive);
  }catch(e){ return null; }
}

  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 350);
  }, 2400);
}

// ---------------- запись голосовых и видео-кружочков ----------------
// Ограничиваем длительность — сообщения хранятся прямо в базе Firestore
// (лимит ~1 МБ на сообщение), поэтому длинные ролики физически не влезут.
function pickSupportedMimeType(candidates){
  for(const c of candidates){
    if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c;
  }
  return null;
}

function recordMedia(constraints, maxSeconds, onTick, recorderOptions, onStreamReady){
  return navigator.mediaDevices.getUserMedia(constraints).then(stream => {
    if(onStreamReady) onStreamReady(stream);
    const chunks = [];
    let recorder;
    try{ recorder = new MediaRecorder(stream, recorderOptions || {}); }
    catch(e){ recorder = new MediaRecorder(stream); }
    let seconds = 0;
    recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
    const finished = new Promise((resolve, reject) => {
      recorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
        const reader = new FileReader();
        reader.onload = () => resolve({ dataUrl: reader.result, seconds, sizeBytes: blob.size });
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      };
    });
    function stop(){
      clearInterval(tickTimer);
      if(recorder.state !== 'inactive') recorder.stop();
    }
    const tickTimer = setInterval(() => {
      seconds += 1;
      if(onTick) onTick(seconds);
      if(seconds >= maxSeconds) stop();
    }, 1000);
    recorder.start();
    return { stop, finished, stream };
  });
}

// Расшифровка голосового — идёт ЖИВЬЁМ во время записи (браузер умеет распознавать
// только живой звук с микрофона, не готовый файл), результат сохраняется вместе с сообщением.
let activeRecognition = null;
let recognitionBuffer = '';
function startTranscription(){
  recognitionBuffer = '';
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return;
  activeRecognition = new SR();
  activeRecognition.lang = 'ru-RU';
  activeRecognition.continuous = true;
  activeRecognition.interimResults = true;
  activeRecognition.onresult = (event) => {
    let text = '';
    for(let i=0;i<event.results.length;i++){ text += event.results[i][0].transcript; }
    recognitionBuffer = text;
  };
  activeRecognition.onerror = () => {};
  try{ activeRecognition.start(); }catch(e){ /* ignore */ }
}
function stopTranscription(){
  if(activeRecognition){
    try{ activeRecognition.stop(); }catch(e){ /* ignore */ }
    activeRecognition = null;
  }
  return recognitionBuffer.trim();
}

function formatDuration(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
}

// Настоящая волна по громкости, а не декоративная — разбираем записанный звук на пики.
async function extractWaveformPeaks(dataUrl, barCount){
  barCount = barCount || 32;
  try{
    const resp = await fetch(dataUrl);
    const arrayBuffer = await resp.arrayBuffer();
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    const channelData = audioBuffer.getChannelData(0);
    const blockSize = Math.max(1, Math.floor(channelData.length / barCount));
    const peaks = [];
    for(let i=0;i<barCount;i++){
      let max = 0;
      const start = i*blockSize;
      for(let j=0;j<blockSize;j++){
        const v = Math.abs(channelData[start + j] || 0);
        if(v > max) max = v;
      }
      peaks.push(Math.round(max*100)/100);
    }
    audioCtx.close();
    return peaks;
  }catch(e){
    console.error('waveform extraction failed', e);
    return null;
  }
}

function renderPeople(){
  const w = el('div','wrap');
  w.appendChild(renderNav('people'));
  w.appendChild(el('h1','', 'Пользователи'));
  w.appendChild(el('p','lead', state.graph
    ? 'Отсортировано по тому, насколько ваши схемы похожи — сверху те, с кем совпадений больше.'
    : 'Заполни свою схему, и здесь появится сортировка по совместимости.'));

  if(!state.peopleLoading && !state.peopleError && state.people && state.people.length){
    const searchRow = el('div','');
    searchRow.style.display='flex'; searchRow.style.gap='12px'; searchRow.style.flexWrap='wrap'; searchRow.style.marginBottom='16px';

    const searchInput = document.createElement('input');
    searchInput.type = 'text';
    searchInput.placeholder = 'Поиск по имени';
    searchInput.value = state.peopleSearch || '';
    searchInput.style.marginBottom = '0'; searchInput.style.flex='1'; searchInput.style.minWidth='180px';

    const interestInput = document.createElement('input');
    interestInput.type = 'text';
    interestInput.placeholder = 'Поиск по интересу';
    interestInput.value = state.peopleInterestSearch || '';
    interestInput.style.marginBottom = '0'; interestInput.style.flex='1'; interestInput.style.minWidth='220px';

    searchRow.appendChild(searchInput);
    searchRow.appendChild(interestInput);
    w.appendChild(searchRow);

    searchInput.addEventListener('input', () => { state.peopleSearch = searchInput.value; renderGrid(); });
    interestInput.addEventListener('input', () => { state.peopleInterestSearch = interestInput.value; renderGrid(); });
  }

  const card = el('div','card');
  w.appendChild(card);
  root.appendChild(w);

  function renderGrid(){
    card.innerHTML = '';
    if(state.peopleLoading){
      card.appendChild(el('div','footer-note','Загружаем…'));
      return;
    }
    if(state.peopleError){
      card.appendChild(el('div','err', state.peopleError));
      return;
    }
    if(!state.people || state.people.length === 0){
      card.appendChild(el('div','empty','Пока никого нет. Будь первой.'));
      return;
    }
    const query = (state.peopleSearch || '').trim().toLowerCase();
    const interestQuery = (state.peopleInterestSearch || '').trim().toLowerCase();
    let others = state.user ? state.people.filter(p => p.name.toLowerCase() !== state.user.name.toLowerCase()) : state.people;
    if(query){ others = others.filter(p => p.name.toLowerCase().includes(query)); }
    let matchedInterestByUid = {};
    let matchCountByUid = {};
    if(interestQuery){
      others = others.filter(p => {
        const leafHits = (p.graph.nodes||[]).filter(n => !n.isHub && labelMatchesQuery(n.label, interestQuery));
        const clusterHit = (p.graph.clusters||[]).find(c => labelMatchesQuery(c, interestQuery));
        const key = p.uid || p.name;
        if(leafHits.length){
          matchedInterestByUid[key] = leafHits.map(n => n.label).join(', ');
          matchCountByUid[key] = leafHits.length;
          return true;
        }
        if(clusterHit){
          matchedInterestByUid[key] = clusterHit;
          matchCountByUid[key] = 1;
          return true;
        }
        return false;
      });
    }
    if(others.length === 0){
      const emptyMsg = interestQuery ? 'Никто не упоминал такой интерес.' : (query ? 'Никого не нашли по этому запросу.' : 'Кроме тебя пока никого нет.');
      card.appendChild(el('div','empty', emptyMsg));
      return;
    }
    const withScores = others.map(p => ({
      p,
      compat: state.graph ? computeCompatibility(state.graph, p.graph) : null
    }));
    if(interestQuery){
      withScores.sort((x, y) => (matchCountByUid[y.p.uid || y.p.name]||0) - (matchCountByUid[x.p.uid || x.p.name]||0));
    } else if(state.graph){
      withScores.sort((x, y) => y.compat.percent - x.compat.percent);
    }
    const grid = el('div','people-grid');
    withScores.forEach(({ p, compat }) => {
      const row = el('div','person-row');
      const left = el('div');
      left.appendChild(el('div','name', p.name));
      let metaText = (p.graph.nodes||[]).filter(n=>!n.isHub).length + ' узлов · ' + (p.graph.clusters||[]).length + ' тем';
      const key = p.uid || p.name;
      if(matchedInterestByUid[key]){
        const cnt = matchCountByUid[key] || 1;
        metaText += ` · совпадений: ${cnt} (${matchedInterestByUid[key]})`;
      }
      if(compat && compat.sharedClusters.length){
        metaText += ' · общее: ' + compat.sharedClusters.join(', ');
      }
      left.appendChild(el('div','meta', metaText));
      row.appendChild(left);

      const right = el('div','');
      right.style.display='flex'; right.style.alignItems='center'; right.style.gap='12px'; right.style.flexShrink='0';
      if(compat){
        right.appendChild(el('div','compat-badge', compat.percent + '%'));
      }
      const iconsBox = el('div','');
      iconsBox.style.display='flex'; iconsBox.style.gap='6px';
      right.appendChild(iconsBox);
      renderQuickIcons(iconsBox, p);
      right.appendChild(el('div','arrow','→'));
      row.appendChild(right);

      row.onclick = () => { state.selectedPerson = p; state.screen = 'personView'; render(); };
      grid.appendChild(row);
    });
    card.appendChild(grid);
  }

  renderGrid();
}

// Компактные иконки "добавить в друзья" / "написать" прямо в списке пользователей.
async function renderQuickIcons(container, p){
  if(!state.user || !p.uid) return;
  let req = null;
  try{ req = await getFriendRequestBetween(state.user.uid, p.uid); }
  catch(e){ return; }
  container.innerHTML = '';

  if(req && req.status === 'accepted'){
    const msgIcon = el('button','icon-btn','✉️');
    msgIcon.title = 'Написать';
    msgIcon.onclick = (ev) => { ev.stopPropagation(); openChat(p.uid, p.name); };
    container.appendChild(msgIcon);
  } else if(req && req.status === 'pending' && req.fromUid === state.user.uid){
    const pendingIcon = el('div','icon-btn disabled','⏳');
    pendingIcon.title = 'Заявка отправлена';
    container.appendChild(pendingIcon);
  } else if(req && req.status === 'pending'){
    const acceptIcon = el('button','icon-btn','✔');
    acceptIcon.title = 'Принять заявку';
    acceptIcon.onclick = async (ev) => {
      ev.stopPropagation();
      await respondFriendRequest(req.id, true);
      renderQuickIcons(container, p);
    };
    container.appendChild(acceptIcon);
  } else {
    const addIcon = el('button','icon-btn','➕');
    addIcon.title = 'Добавить в друзья';
    addIcon.onclick = async (ev) => {
      ev.stopPropagation();
      addIcon.disabled = true;
      await sendFriendRequest(p.uid, p.name);
      renderQuickIcons(container, p);
    };
    container.appendChild(addIcon);
  }
}

// Асинхронно подтягивает статус дружбы с человеком p и рисует нужную кнопку в container.
async function renderFriendActionInto(container, p){
  container.innerHTML = '';
  container.appendChild(el('div','footer-note','Проверяем статус…'));
  let req = null;
  try{
    req = await getFriendRequestBetween(state.user.uid, p.uid);
  }catch(e){
    console.error('friend status check failed', e);
    container.innerHTML = '';
    container.appendChild(el('div','err', e.message));

  }
  container.innerHTML = '';
  const row = el('div','');
  row.style.display='flex'; row.style.gap='12px'; row.style.flexWrap='wrap'; row.style.alignItems='center';

  if(!req){
    const btn = el('button','btn','Добавить в друзья');
    btn.onclick = async () => {
      btn.disabled = true; btn.textContent = 'Отправляем…';
      try{
        await sendFriendRequest(p.uid, p.name);
        renderFriendActionInto(container, p);
      }catch(e){ container.appendChild(el('div','err', e.message)); }
    };
    row.appendChild(btn);
  } else if(req.status === 'accepted'){
    row.appendChild(el('div','compat-badge','Вы друзья ✓'));
    const msgBtn = el('button','btn ghost','Написать →');
    msgBtn.onclick = () => { openChat(p.uid, p.name); };

  } else if(req.status === 'pending' && req.fromUid === state.user.uid){
    const btn = el('button','btn ghost','Заявка отправлена');
    btn.disabled = true;
    row.appendChild(btn);
  } else {
    const acceptBtn = el('button','btn','Принять заявку в друзья');
    acceptBtn.onclick = async () => {
      acceptBtn.disabled = true; acceptBtn.textContent = 'Принимаем…';
      try{
        await respondFriendRequest(req.id, true);
        renderFriendActionInto(container, p);
      }catch(e){ container.appendChild(el('div','err', e.message)); }
    };
    row.appendChild(acceptBtn);
  }
  container.appendChild(row);
}

function compressImageToDataUrl(file, maxW){
  maxW = maxW || 480;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function buildVoicePlayer(voiceData, transcript, waveform){
  const wrap = el('div','');
  const audio = new Audio(dataUrlToObjectUrl(voiceData));
  const row = el('div','voice-bubble');
  const playBtn = el('div','voice-play','▶');

  const waveWrap = el('div','voice-waveform-wrap');
  const waveEl = el('div','voice-waveform');
  const peaks = (waveform && waveform.length) ? waveform : new Array(32).fill(0).map((_,i)=> 0.3 + 0.5*Math.abs(Math.sin(i*0.7)));
  const bars = peaks.map(p => {
    const bar = document.createElement('span');
    bar.style.height = Math.max(15, Math.round(p*100)) + '%';
    waveEl.appendChild(bar);
    return bar;
  });
  const seek = document.createElement('input');
  seek.type = 'range'; seek.min = '0'; seek.max = '1000'; seek.value = '0';
  seek.className = 'voice-seek-overlay';
  let seeking = false;
  waveWrap.appendChild(waveEl);
  waveWrap.appendChild(seek);

  const durationEl = el('div','voice-duration','0:00');
  row.appendChild(playBtn);
  row.appendChild(waveWrap);
  row.appendChild(durationEl);
  wrap.appendChild(row);

  function updateBars(fraction){
    const activeCount = Math.round(fraction * bars.length);
    bars.forEach((b,i) => b.classList.toggle('played', i < activeCount));
  }

  if(transcript){
    const toggleBtn = el('div','voice-transcript-toggle','Показать текст');
    const textEl = el('div','voice-transcript-text', transcript);
    textEl.style.display = 'none';
    toggleBtn.onclick = () => {
      const hidden = textEl.style.display === 'none';
      textEl.style.display = hidden ? 'block' : 'none';
      toggleBtn.textContent = hidden ? 'Скрыть текст' : 'Показать текст';
    };
    wrap.appendChild(toggleBtn);
    wrap.appendChild(textEl);
  }

  audio.addEventListener('loadedmetadata', () => {
    if(isFinite(audio.duration)) durationEl.textContent = formatDuration(Math.round(audio.duration));
  });
  audio.addEventListener('timeupdate', () => {
    if(seeking) return;
    if(!audio.paused) durationEl.textContent = formatDuration(Math.round(audio.currentTime));
    if(isFinite(audio.duration) && audio.duration > 0){
      const frac = audio.currentTime / audio.duration;
      seek.value = String(Math.round(frac * 1000));
      updateBars(frac);
    }
  });
  audio.addEventListener('ended', () => {
    playBtn.textContent = '▶';
    durationEl.textContent = isFinite(audio.duration) ? formatDuration(Math.round(audio.duration)) : '0:00';
    seek.value = '0';
    updateBars(0);
  });
  playBtn.onclick = () => {
    if(audio.paused){ audio.play(); playBtn.textContent = '⏸'; }
    else { audio.pause(); playBtn.textContent = '▶'; }
  };
  seek.addEventListener('input', () => {
    seeking = true;
    const frac = seek.value/1000;
    updateBars(frac);
    if(isFinite(audio.duration)){
      durationEl.textContent = formatDuration(Math.round(frac * audio.duration));
    }
  });
  seek.addEventListener('change', () => {
    if(isFinite(audio.duration)){
      audio.currentTime = (seek.value/1000) * audio.duration;
    }
    seeking = false;
  });
  return wrap;
}

function formatClockTime(ts){
  if(!ts) return '';
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

// Большие data:URL иногда плохо воспроизводятся напрямую (особенно в мобильных браузерах) —
// превращаем в настоящий Blob и играем через object URL, это надёжнее.
function dataUrlToObjectUrl(dataUrl){
  try{
    const [header, base64] = dataUrl.split(',');
    const mimeMatch = header.match(/data:(.*?);base64/);
    const mime = mimeMatch ? mimeMatch[1] : '';
    const bin = atob(base64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    const blob = new Blob([bytes], { type: mime });
    return URL.createObjectURL(blob);
  }catch(e){
    console.error('dataUrlToObjectUrl failed', e);
    return dataUrl;
  }
}

function downloadDataUrl(dataUrl, filename){

function renderChatMessages(){
  const box = document.getElementById('chat-messages');
  if(!box) return;
  box.innerHTML = '';

  const chatId = state.chatWith.isGroup ? ('g_' + state.chatWith.groupId) : pairId(state.user.uid, state.chatWith.uid);
  const visible = state.chatMessages.filter(m => !(m.deletedFor||[]).includes(state.user.uid));

  const pinned = visible.find(m => m.pinned);
  if(pinned){
    const pinBar = el('div','pinned-banner');
    pinBar.appendChild(el('div','','📌 ' + messagePreviewText(pinned)));
    box.appendChild(pinBar);
  }

  if(state.selectMode){
    const bar = el('div','select-action-bar');
    bar.appendChild(el('div','', 'Выбрано: ' + state.selectedMessageIds.size));
    const actions = el('div','');
    actions.style.display='flex'; actions.style.gap='10px';
    const forwardBtn = el('button','btn','Переслать');
    forwardBtn.onclick = () => { openForwardPickerMulti([...state.selectedMessageIds]); };
    const cancelBtn = el('button','btn ghost','Отмена');
    cancelBtn.onclick = () => { state.selectMode = false; state.selectedMessageIds = new Set(); renderChatMessages(); };
    actions.appendChild(forwardBtn);
    actions.appendChild(cancelBtn);
    bar.appendChild(actions);
    box.appendChild(bar);
  }

  // индекс последнего МОЕГО сообщения, которое собеседник уже видел (для подписи "просмотрено")
  let lastSeenMineIndex = -1;
  if(!state.chatWith.isGroup){
    visible.forEach((m, i) => {
      if(m.fromUid === state.user.uid && (m.ts||0) <= (state.otherLastRead||0)) lastSeenMineIndex = i;
    });
  }

  visible.forEach((m, i) => {
    if(m.callSummary){
      const mineCall = m.fromUid === state.user.uid;
      const cs = m.callSummary;
      const icon = cs.type === 'video' ? '📹' : '📞';
      let label;
      if(cs.outcome === 'missed') label = mineCall ? 'Звонок без ответа' : 'Пропущенный звонок';
      else if(cs.outcome === 'declined') label = mineCall ? 'Звонок отклонён' : 'Вызов отклонён';
      else label = 'Звонок · ' + formatDuration(cs.duration);
      const sysRow = el('div','call-summary-row', icon + ' ' + label + ' · ' + formatClockTime(m.ts));
      box.appendChild(sysRow);
      return;
    }
    const mine = m.fromUid === state.user.uid;
    const isBareMedia = (m.voiceData || m.videoData) && !m.text && !m.imageData && !m.replyTo;
    const row = el('div','msg-row' + (mine ? ' mine' : ''));
    const bubble = el('div','chat-bubble' + (mine ? ' mine' : '') + (isBareMedia ? ' bare-media' : ''));
    attachLongPressAndRightClick(bubble, (x,y) => showMessageContextMenu(x, y, m, chatId));

    if(state.selectMode){
      const cb = el('div','msg-select-box', state.selectedMessageIds.has(m.id) ? '✓' : '');
      if(state.selectedMessageIds.has(m.id)) cb.classList.add('checked');
      cb.onclick = (e) => {
        e.stopPropagation();
        if(state.selectedMessageIds.has(m.id)) state.selectedMessageIds.delete(m.id);
        else state.selectedMessageIds.add(m.id);
        renderChatMessages();
      };
      row.appendChild(cb);
    }
    row.appendChild(bubble);

    if(state.chatWith.isGroup && !mine){
      bubble.appendChild(el('div','chat-sender', m.fromName));
    }
    if(m.replyTo){
      bubble.appendChild(el('div','reply-quote', '↩ ' + m.replyTo.preview));
    }
    if(m.imageData){
      const img = document.createElement('img');
      img.src = m.imageData;
      img.className = 'chat-image';
      bubble.appendChild(img);
      const dl = el('div','download-chip','⬇ Сохранить');
      dl.onclick = (e) => { e.stopPropagation(); downloadDataUrl(m.imageData, 'photo-' + m.ts + '.jpg'); };
      bubble.appendChild(dl);
    }
    if(m.voiceData){
      bubble.appendChild(buildVoicePlayer(m.voiceData, m.transcript, m.waveform));
    }
    if(m.videoData){
      const circleWrap = el('div','video-circle-wrap');
      const vid = document.createElement('video');
      vid.src = dataUrlToObjectUrl(m.videoData);
      vid.className = 'chat-video-circle';
      vid.loop = true; vid.muted = false; vid.playsInline = true; vid.preload = 'auto';
      const playOverlay = el('div','video-circle-play','▶');
      vid.onclick = (e) => {
        e.stopPropagation();
        if(vid.paused){ vid.play(); playOverlay.style.display = 'none'; }
        else { vid.pause(); playOverlay.style.display = 'flex'; }
      };
      vid.addEventListener('error', () => {
        const errCode = vid.error ? vid.error.code : '?';
        const errCodeNames = {1:'ABORTED',2:'NETWORK',3:'DECODE — браузер не смог распознать формат',4:'SRC_NOT_SUPPORTED — формат/кодек не поддерживается'};
        console.error('video message failed to load', { id: m.id, code: errCode, name: errCodeNames[errCode], mimeStored: m.videoData?.slice(5, m.videoData.indexOf(';')) });
        circleWrap.innerHTML = '';
        circleWrap.appendChild(el('div','video-circle-error', 'Видео не загрузилось (код ' + errCode + ')'));
      });
      vid.addEventListener('loadeddata', () => {
        console.log('video message loaded OK', m.id);
      });
      circleWrap.appendChild(vid);
      circleWrap.appendChild(playOverlay);
      bubble.appendChild(circleWrap);
      const dl = el('div','download-chip','⬇ Сохранить');
      dl.onclick = (e) => { e.stopPropagation(); downloadDataUrl(m.videoData, 'video-' + m.ts + '.webm'); };
      bubble.appendChild(dl);
    }
    if(m.text){
      const textEl = document.createElement('div');
      textEl.textContent = m.text;
      if(m.imageData) textEl.style.marginTop = '6px';
      bubble.appendChild(textEl);
    }
    const timeEl = el('div','msg-time', formatClockTime(m.ts));
    bubble.appendChild(timeEl);

    box.appendChild(row);
    if(i === lastSeenMineIndex){
      const seenCap = el('div','seen-caption','просмотрено ·˖✧');
      seenCap.style.cursor = 'pointer';
      seenCap.onclick = () => {
        seenCap.textContent = 'прочитано в ' + formatClockTime(state.otherLastRead);
      };
      box.appendChild(seenCap);
    }
  });
  box.scrollTop = box.scrollHeight;
}

  const doSendVoice = async (dataUrl, transcript) => {

      ? sendGroupMessage(state.chatWith.groupId, null, null, dataUrl, null, transcript, waveform)

  };
  const doSendVideo = (dataUrl) => state.chatWith.isGroup
    ? sendGroupMessage(state.chatWith.groupId, null, null, null, dataUrl)
    : sendMessage(state.chatWith.uid, state.chatWith.name, null, null, null, dataUrl);

  const MAX_UPLOAD_CHARS = 700000; // это уже размер итоговой base64-строки, которая реально пишется в Firestore (лимит документа ~1 МБ)

  function makeRecordButton(icon, constraints, maxSeconds, onFinish, opts){
    opts = opts || {};
    const btn = el('button','btn ghost', icon);
    btn.style.flexShrink = '0';
    btn.title = opts.title || '';
    let active = null;
    let previewEl = null;
    let maxTimer = null;

    async function begin(){
      if(active) return;
      // на всякий случай убираем застрявшее превью от предыдущей попытки
      document.querySelectorAll('.record-live-preview').forEach(p => p.remove());
      try{
        active = await recordMedia(constraints, maxSeconds, sec => {
          btn.textContent = '⏹ ' + formatDuration(sec);
        }, opts.recorderOptions, stream => {
          if(opts.livePreview){
            previewEl = document.createElement('video');
            previewEl.srcObject = stream;
            previewEl.autoplay = true; previewEl.muted = true; previewEl.playsInline = true;
            previewEl.className = 'record-live-preview';
            document.body.appendChild(previewEl);
          }
        });
        btn.classList.add('recording');
        if(opts.transcribe) startTranscription();
        maxTimer = setTimeout(() => { if(active) finish(); }, maxSeconds*1000 + 300);
      }catch(e){
        console.error('recording start failed', e);
        showToast('Микрофон/камера недоступны: ' + (e.name || e.message || 'нет доступа'));
      }
    }

    async function finish(){
      if(!active) return;
      if(maxTimer){ clearTimeout(maxTimer); maxTimer = null; }
      const rec = active; active = null;
      rec.stop();
      btn.disabled = true; btn.textContent = '…';
      if(previewEl){ previewEl.remove(); previewEl = null; }
      const transcript = opts.transcribe ? stopTranscription() : '';
      try{
        const result = await rec.finished;
        const mimeFromDataUrl = result.dataUrl.slice(5, result.dataUrl.indexOf(';'));
        console.log('recording finished:', { seconds: result.seconds, sizeBytes: result.sizeBytes, dataUrlChars: result.dataUrl.length, mime: mimeFromDataUrl, icon });
        if(result.seconds < 1){
          // случайный тап — молча игнорируем
        } else if(result.sizeBytes < 2000){
          showToast('Запись не получилась (пустой файл) — попробуй ещё раз');
        } else if(result.dataUrl.length > MAX_UPLOAD_CHARS){
          showToast('Запись слишком длинная для отправки — попробуй короче или тише качеством');
        } else {
          await onFinish(result.dataUrl, transcript);
        }
      }catch(e){
        console.error('recording send failed', e);
        showToast('Не получилось отправить запись: ' + (e.message || e.name || 'ошибка'));
      }
      if(previewEl){ previewEl.remove(); previewEl = null; }
      btn.disabled = false;
      btn.classList.remove('recording');
      btn.textContent = icon;
    }

    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if(e.pointerType === 'mouse'){
        if(active) finish(); else begin();
      } else {
        begin();
      }
    });
    btn.addEventListener('pointerup', (e) => { if(e.pointerType !== 'mouse') finish(); });
    btn.addEventListener('pointerleave', (e) => { if(active && e.pointerType !== 'mouse') finish(); });
    btn.addEventListener('pointercancel', (e) => { if(active && e.pointerType !== 'mouse') finish(); });
    return btn;
  }

  const videoMime = pickSupportedMimeType(['video/webm;codecs=vp8,opus','video/webm']);
  const voiceBtn = makeRecordButton('🎙', { audio: true }, 300, doSendVoice, {
    title: 'На телефоне — зажми; на компьютере — клик, чтобы начать, и ещё клик, чтобы отправить (до 5 минут)',

    livePreview: true,
    recorderOptions: videoMime ? { mimeType: videoMime, videoBitsPerSecond: 150000, audioBitsPerSecond: 32000 } : { videoBitsPerSecond: 150000, audioBitsPerSecond: 32000 },
  });

  const input = document.createElement('input');
  input.type='text'; input.placeholder='Написать сообщение…';
  input.style.marginBottom = '0';
  const emojiBtn = buildEmojiButton(input);
  const sendBtn = el('button','btn','Отправить');
  const doSend = async () => {
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    try{
      await doSendText(text);
    }catch(e){ console.error('send failed', e); }
  };
  sendBtn.onclick = doSend;
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') doSend(); });
  inputRow.appendChild(attachBtn);
  inputRow.appendChild(fileInput);
  inputRow.appendChild(voiceBtn);
  inputRow.appendChild(videoCircleBtn);
  inputRow.appendChild(emojiBtn);
  inputRow.appendChild(input);
  inputRow.appendChild(sendBtn);
  card.appendChild(inputRow);

  container.appendChild(card);
  renderChatMessages();
  applyChatWallpaper();
}

function timeAgoShort(ts){
  if(!ts) return '';
  const diffMin = (Date.now() - ts) / 60000;
  if(diffMin < 1) return 'сейчас';
  if(diffMin < 60) return Math.round(diffMin) + ' мин';
  const diffH = diffMin / 60;
  if(diffH < 24) return Math.round(diffH) + ' ч';
  return Math.round(diffH / 24) + ' дн';
}

function renderAccountScreen(){
  const w = el('div','wrap');
  w.appendChild(renderNav('account'));
  w.appendChild(el('h1','', 'Аккаунт'));

  // --- Тема оформления ---
  const themeCard = el('div','card');
  themeCard.style.marginBottom = '16px';
  themeCard.appendChild(el('div','top-tag','Тема оформления'));
  const themeGrid = el('div','theme-grid');
  const currentTheme = state.user.theme || 'dark';
  const THEME_PREVIEW = {
    dark: 'linear-gradient(135deg,#111a2e,#1a2338)',
    light: 'linear-gradient(135deg,#f3f4fa,#ffffff)',
    aurora: 'linear-gradient(135deg,#123b34,#2a1f57)',
    sunset: 'linear-gradient(135deg,#5c2a3a,#7a4326)',
    ocean: 'linear-gradient(135deg,#103a52,#0d2a4a)',
    forest: 'linear-gradient(135deg,#1c3a25,#24462c)',
    nebula: 'linear-gradient(135deg,#3a1656,#551a4a)',
  };
  THEMES.forEach(t => {
    const swatch = el('div','theme-swatch' + (t.id === currentTheme ? ' active' : ''));
    const circle = el('div','theme-swatch-circle');
    circle.style.background = THEME_PREVIEW[t.id] || '#222';
    swatch.appendChild(circle);
    swatch.appendChild(el('div','', t.name));
    swatch.onclick = async () => {
      state.user.theme = t.id;
      await saveTheme(t.id);
      render();
    };
    themeGrid.appendChild(swatch);
  });
  themeCard.appendChild(themeGrid);

  const motionLabel = document.createElement('label');
  motionLabel.style.display='flex'; motionLabel.style.alignItems='center'; motionLabel.style.gap='10px';
  motionLabel.style.marginTop = '16px'; motionLabel.style.fontSize = '13px'; motionLabel.style.color = 'var(--ink-dim)';
  motionLabel.style.cursor = 'pointer';
  const motionCheckbox = document.createElement('input');
  motionCheckbox.type = 'checkbox'; motionCheckbox.style.width='auto'; motionCheckbox.style.marginBottom='0';
  motionCheckbox.checked = state.profile?.bgMotion === true;
  motionCheckbox.onchange = async () => {
    applyBgMotion(motionCheckbox.checked);
    const profile = { ...(state.profile||{}), bgMotion: motionCheckbox.checked };
    try{
      await db.collection('users').doc(state.user.uid).update({ profile });
      state.profile = profile;
    }catch(e){ console.error('bgMotion save failed', e); showToast('Не удалось сохранить'); }
  };
  motionLabel.appendChild(motionCheckbox);
  motionLabel.appendChild(document.createTextNode('Лёгкое движение фона (сейчас заметно только в светлой теме)'));
  themeCard.appendChild(motionLabel);

  w.appendChild(themeCard);

  // --- Фото аккаунта ---
  const avatarCard = el('div','card');
  avatarCard.style.marginBottom = '16px';
  avatarCard.appendChild(el('div','top-tag','Фото'));
  const avatarRow = el('div','');
  avatarRow.style.display='flex'; avatarRow.style.alignItems='center'; avatarRow.style.gap='16px';
  const avatarPreview = document.createElement('div');
  avatarPreview.className = 'account-avatar';
  if(state.profile?.avatar){
    const img = document.createElement('img'); img.src = state.profile.avatar;
    avatarPreview.appendChild(img);
  } else {
    avatarPreview.textContent = (state.user.name || '?')[0].toUpperCase();
  }
  avatarRow.appendChild(avatarPreview);
  const avatarFileInput = document.createElement('input');
  avatarFileInput.type = 'file'; avatarFileInput.accept = 'image/*';
  const avatarBtn = el('button','btn ghost','Загрузить фото');
  avatarBtn.onclick = () => avatarFileInput.click();
  avatarFileInput.onchange = async () => {
    const file = avatarFileInput.files[0];
    if(!file) return;
    avatarBtn.disabled = true; avatarBtn.textContent = 'Загружаем…';
    try{
      const dataUrl = await compressImageToDataUrl(file, 140);
      const profile = { ...(state.profile||{}), avatar: dataUrl };
      await db.collection('users').doc(state.user.uid).update({ profile });
      state.profile = profile;
      showToast('Фото обновлено ✓');
      render();
    }catch(e){
      console.error('avatar upload failed', e);
      showToast('Не сохранилось: ' + (e.message || e.code || 'ошибка'));
      avatarBtn.disabled = false; avatarBtn.textContent = 'Загрузить фото';
    }
  };
  avatarRow.appendChild(avatarBtn);
  avatarRow.appendChild(avatarFileInput);
  avatarCard.appendChild(avatarRow);
  w.appendChild(avatarCard);

  // --- Логин ---
  const loginCard = el('div','card');
  loginCard.style.marginBottom = '16px';
  loginCard.appendChild(el('div','top-tag','Логин'));
  loginCard.appendChild(el('p','lead','Только латинские буквы — это то, чем ты входишь на сайт.'));
  if(state.accountError) loginCard.appendChild(el('div','err', state.accountError));

  const loginInput = document.createElement('input');
  loginInput.type='text'; loginInput.value = state.user.login || '';
  loginCard.appendChild(loginInput);

  const currentPassInput = document.createElement('input');
  currentPassInput.type='password'; currentPassInput.placeholder='Текущий пароль (чтобы подтвердить смену)';
  loginCard.appendChild(currentPassInput);

  const loginBtn = el('button','btn ghost','Сохранить логин');
  loginBtn.onclick = async () => {
    const newLogin = loginInput.value.trim();
    if(!/^[A-Za-z0-9_]+$/.test(newLogin)){
      state.accountError = 'Логин может содержать только латинские буквы, цифры и подчёркивание.';
      render(); return;
    }
    if(!currentPassInput.value){
      state.accountError = 'Введи текущий пароль, чтобы подтвердить смену логина.';
      render(); return;
    }
    loginBtn.disabled = true; loginBtn.textContent = 'Сохраняем…';
    try{
      await changeLogin(newLogin, currentPassInput.value);
      state.user.login = newLogin;
      state.accountError = '';
      showToast('Логин обновлён ✓');
      render();
    }catch(e){
      state.accountError = e.message;
      loginBtn.disabled = false; loginBtn.textContent = 'Сохранить логин';
      render();
    }
  };
  loginCard.appendChild(loginBtn);
  w.appendChild(loginCard);

  // --- Профиль ---
  const card = el('div','card');
  card.appendChild(el('div','top-tag','Профиль'));

  const nameInput = document.createElement('input');
  nameInput.type='text'; nameInput.placeholder='Имя'; nameInput.value = state.user.name || '';
  card.appendChild(nameInput);

  const rowTop = el('div','');
  rowTop.style.display='flex'; rowTop.style.gap='12px'; rowTop.style.flexWrap='wrap';
  const ageInput = document.createElement('input');
  ageInput.type='text'; ageInput.placeholder='Возраст'; ageInput.style.maxWidth='120px'; ageInput.style.marginBottom='0';
  ageInput.value = state.profile?.age || '';
  rowTop.appendChild(ageInput);
  card.appendChild(rowTop);

  const rowGeo = el('div','');
  rowGeo.style.display='flex'; rowGeo.style.gap='12px'; rowGeo.style.flexWrap='wrap'; rowGeo.style.marginTop='12px';

  const countrySelect = document.createElement('select');
  countrySelect.style.flex='1'; countrySelect.style.minWidth='160px';
  const emptyOpt = document.createElement('option'); emptyOpt.value=''; emptyOpt.textContent='Страна';
  countrySelect.appendChild(emptyOpt);
  COUNTRIES.forEach(c => {
    const opt = document.createElement('option'); opt.value = c; opt.textContent = c;
    if(state.profile?.country === c) opt.selected = true;
    countrySelect.appendChild(opt);
  });
  rowGeo.appendChild(countrySelect);

  const cityContainer = el('div','');
  cityContainer.style.flex = '1'; cityContainer.style.minWidth='160px';
  rowGeo.appendChild(cityContainer);
  card.appendChild(rowGeo);

  function renderCityField(){
    cityContainer.innerHTML = '';
    const cities = citiesForCountry(countrySelect.value);
    if(cities){
      const citySelect = document.createElement('select');
      citySelect.style.width = '100%';
      const cEmpty = document.createElement('option'); cEmpty.value=''; cEmpty.textContent='Город';
      citySelect.appendChild(cEmpty);
      cities.forEach(city => {
        const opt = document.createElement('option'); opt.value = city; opt.textContent = city;
        if(state.profile?.city === city) opt.selected = true;
        citySelect.appendChild(opt);
      });
      citySelect.id = 'city-field';
      cityContainer.appendChild(citySelect);
    } else {
      const cityInput = document.createElement('input');
      cityInput.type='text'; cityInput.placeholder='Город'; cityInput.style.marginBottom='0';
      cityInput.value = state.profile?.city || '';
      cityInput.id = 'city-field';
      cityContainer.appendChild(cityInput);
    }
  }
  renderCityField();
  countrySelect.addEventListener('change', renderCityField);

  const statusLabel = document.createElement('label');
  statusLabel.style.display='flex'; statusLabel.style.alignItems='center'; statusLabel.style.gap='10px';
  statusLabel.style.marginTop = '16px'; statusLabel.style.fontSize = '13px'; statusLabel.style.color = 'var(--ink-dim)';
  statusLabel.style.cursor = 'pointer';
  const statusCheckbox = document.createElement('input');
  statusCheckbox.type = 'checkbox'; statusCheckbox.style.width='auto'; statusCheckbox.style.marginBottom='0';
  statusCheckbox.checked = state.profile?.showStatus !== false;
  statusLabel.appendChild(statusCheckbox);
  statusLabel.appendChild(document.createTextNode('Показывать мой статус «в сети» другим (если выключишь — тоже перестанешь видеть чужой)'));
  card.appendChild(statusLabel);

  const saveBtn = el('button','btn','Сохранить профиль');
  saveBtn.style.marginTop = '14px';
  saveBtn.onclick = async () => {
    saveBtn.disabled = true; saveBtn.textContent = 'Сохраняем…';
    const cityField = document.getElementById('city-field');
    const profile = {
      age: ageInput.value.trim(),
      country: countrySelect.value,
      city: cityField ? cityField.value.trim() : '',
      showStatus: statusCheckbox.checked,
    };
    const newName = nameInput.value.trim() || state.user.name;
    try{
      await db.collection('users').doc(state.user.uid).update({ profile, showStatus: statusCheckbox.checked });
      if(newName !== state.user.name) await changeDisplayName(newName);
      state.profile = profile;
      state.user.name = newName;
      showToast('Профиль сохранён ✓');
    }catch(e){
      console.error('account save failed', e);
      showToast('Не удалось сохранить :(');
    }
    saveBtn.disabled = false; saveBtn.textContent = 'Сохранить профиль';
    render();
  };
  card.appendChild(saveBtn);
  w.appendChild(card);

  const logoutCard = el('div','card');
  logoutCard.style.marginTop = '16px';
  const logoutBtn = el('button','btn ghost','Выйти из аккаунта');
  logoutBtn.onclick = () => {
    if(chatUnsubscribe){ chatUnsubscribe(); chatUnsubscribe = null; }
    if(otherLastReadUnsub){ otherLastReadUnsub(); otherLastReadUnsub = null; }
    stopNotificationPolling();
    stopListeningForIncomingCalls();
    if(currentCall) endCall(true);
    logoutUser();
    state = { screen: 'landing', user: null, text: '', graph: null, error: '', authMode: 'login' };
    render();
  };
  logoutCard.appendChild(logoutBtn);
  w.appendChild(logoutCard);

  root.appendChild(w);
}

const THEMES = [
  { id: 'dark', name: 'Тёмная (авто)' },
  { id: 'light', name: 'Светлая' },
  { id: 'aurora', name: 'Аврора' },
  { id: 'sunset', name: 'Закат' },
  { id: 'ocean', name: 'Океан' },
  { id: 'forest', name: 'Лес' },
  { id: 'nebula', name: 'Туманность' },
];

function applyTheme(themeId){
  if(themeId && themeId !== 'dark'){
    document.body.dataset.theme = themeId;
  } else {
    delete document.body.dataset.theme;
  }
}

function applyBgMotion(enabled){
  document.body.classList.toggle('bg-motion', !!enabled);
}

async function saveTheme(themeId){
  applyTheme(themeId);
  if(!state.user) return;
  try{
    await db.collection('users').doc(state.user.uid).update({ theme: themeId });
  }catch(e){ console.error('theme save failed', e); }
}
