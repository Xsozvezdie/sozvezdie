function renderAuth(){
  const w = el('div','wrap');
  w.appendChild(renderNav('auth'));
  const isLogin = state.authMode === 'login';
  w.appendChild(el('h1','', isLogin ? 'Вход' : 'Регистрация'));

  const card = el('div','card');
  if(state.error) card.appendChild(el('div','err', state.error));

  const userInput = document.createElement('input');
  userInput.type = 'text'; userInput.placeholder = 'Логин'; userInput.maxLength = 30;
  if(!isLogin){
    const hint = el('div','meta','Только латинские буквы и цифры, без пробелов');
    hint.style.marginTop = '-10px'; hint.style.marginBottom = '10px';
    card.appendChild(userInput);
    card.appendChild(hint);
  } else {
    card.appendChild(userInput);
  }

  const passWrap = el('div','');
  passWrap.style.position = 'relative';
  const passInput = document.createElement('input');
  passInput.type = 'password'; passInput.placeholder = 'Пароль';
  passInput.style.paddingRight = '46px';
  const eyeBtn = document.createElement('button');
  eyeBtn.type = 'button';
  eyeBtn.textContent = '👁';
  eyeBtn.className = 'eye-toggle';
  eyeBtn.onclick = () => {
    const showing = passInput.type === 'text';
    passInput.type = showing ? 'password' : 'text';
    eyeBtn.textContent = showing ? '👁' : '🙈';
  };
  passWrap.appendChild(passInput);
  passWrap.appendChild(eyeBtn);
  card.appendChild(passWrap);

  const LATIN_LOGIN_RE = /^[A-Za-z0-9_]+$/;

  const btn = el('button','btn', isLogin ? 'Войти →' : 'Зарегистрироваться →');
  btn.onclick = async () => {
    const username = userInput.value.trim();
    const password = passInput.value;
    if(!username || !password){
      state.error = 'Заполни логин и пароль.';
      render();
      return;
    }
    if(!isLogin && !LATIN_LOGIN_RE.test(username)){
      state.error = 'Логин может содержать только латинские буквы, цифры и подчёркивание — без кириллицы и пробелов.';
      render();
      return;
    }
    state.error = '';
    btn.disabled = true;
    btn.textContent = 'Подождите…';
    try{
      const user = isLogin ? await loginUser(username, password) : await registerUser(username, password);
      state.user = { uid: user.uid, name: user.name, login: user.login || user.name, theme: user.theme || 'dark' };
      state.graph = user.graph || null;
      state.text = user.text || '';
      state.profile = user.profile || null;
      state.isAdmin = user.isAdmin === true;
      applyTheme(user.theme || 'dark');
      applyBgMotion(state.profile?.bgMotion === true);
      state.screen = state.graph ? 'result' : 'story';
      render();
      refreshNotificationCounts().then(render);
      startNotificationPolling();
      listenForIncomingCalls();
    }catch(e){
      state.error = e.message;
      render();
    }
  };
  passInput.addEventListener('keydown', e=>{ if(e.key==='Enter') btn.click(); });
  card.appendChild(btn);

  const switchLink = el('button','nav-link', isLogin ? 'Ещё нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти');
  switchLink.style.display = 'block';
  switchLink.style.marginTop = '18px';
  switchLink.onclick = () => { state.authMode = isLogin ? 'register' : 'login'; state.error=''; render(); };
  card.appendChild(switchLink);

  w.appendChild(card);
  root.appendChild(w);
}

function renderStory(){
  const w = el('div','wrap');
  w.appendChild(renderNav('mine'));
  w.appendChild(el('h1','', 'Теперь — о себе.'));

  const chips = el('div','prompts');
  ['работа и то, что в ней держит','увлечения и как проводишь свободное время','что читаешь / смотришь','ценности и то, что раздражает','отношения и люди рядом']
    .forEach(t=>chips.appendChild(el('span','prompt-chip', t)));
  w.appendChild(chips);

  const card = el('div','card');
  if(state.error) card.appendChild(el('div','err', state.error));
  const ta = document.createElement('textarea');
  ta.placeholder = 'Например: чем занимаюсь по работе или учёбе, что делаю в свободное время, что читаю или смотрю, что для меня важно в людях, а что раздражает...';
  ta.value = state.text;
  card.appendChild(ta);
  const counter = el('div','counter','0 символов');
  card.appendChild(counter);
  ta.addEventListener('input', ()=>{ counter.textContent = ta.value.length + ' символов'; });

  const btn = el('button','btn','Построить граф →');
  btn.onclick = () => {
    const val = ta.value.trim();
    if(!val){
      state.error = 'Напиши хоть что-нибудь — даже пару слов.';
      render();
      return;
    }
    state.error = '';
    state.text = val;
    state.screen = 'loading';
    render();
    buildGraph(val);
  };
  card.appendChild(btn);
  w.appendChild(card);
  root.appendChild(w);
}

function renderLoading(){
  const w = el('div','wrap');
  w.appendChild(el('h1','', 'Читаем и раскладываем по темам…'));
  const lw = el('div','loading-wrap');
  lw.appendChild(el('div','spinner'));
  w.appendChild(lw);
  root.appendChild(w);
}

const STOPWORDS = new Set(['я','и','в','во','на','с','со','что','чтобы','это','эта','эти','этот','этом','этой','этих','эту','меня','мне','мной','мой','моя','моё','мои','моего','моей','моих','к','ко','по','из','изо','у','а','но','как','то','же','бы','для','от','ото','до','об','обо','о','не','ни','так','вот','ещё','уже','очень','тоже','его','её','их','ему','ей','им','он','она','они','мы','вы','ты','нас','вас','нам','вам','когда','если','или','там','тут','где','куда','который','которая','которое','которые','которых','которым','которой','которыми','себя','себе','собой','быть','был','была','было','были','есть','нет','да','ведь','лишь','только','всё','все','всех','всем','всей','всего','такой','такая','такое','такие','потому','поэтому','кто','чем','чём','чего','ним','ней','них','один','одна','одно','одни','одной','одних','одним','одному']);

const GENERIC_FILLER = new Set(['помогает','помогло','начал','начала','начали','вижу','вижу','чувствую','кажется','стараюсь','пытаюсь','хочу','хочет','буду','будет','можно','нужно','нравится','стало','является','являются','можем','смогу','делаю','делает','говорю','говорит','думаю','думает','знаю','знает']);

// Слова, которые формально совпадают с темой категории, но сами по себе — не тезис (просто глагол-самоотсылка).
// Такие слова не должны становиться единственным словом узла — им всегда нужен сосед по смыслу.
const WEAK_ANCHORS = new Set(['учусь','учится','работаю','работает','занимаюсь','занимается','увлекаюсь','увлекается','провожу','играю','смотрю','читаю','являюсь']);

const CATEGORY_KEYWORDS = {
  'Работа и учёба': ['бизнес','диплом','должност','задач','карьер','клиент','коллег','менеджер','начальник','подбор','продаж','проект','производств','профессионал','работ','студент','универ','учё','учус','юрист'],
  'Увлечения': ['готов','занима','игра','играю','музык','путешеств','рисова','спорт','творчеств','трейдинг','увлека','фотограф','хобби','шахмат'],
  'Люди рядом': ['близк','брат','девушк','друз','жена','муж','отношени','парен','партнер','родител','семь','сестр'],
  'Ценности': ['важно','верю','не люблю','принцип','раздража','смысл','считаю','терпеть не могу','ценю','честност'],
  'Медиа и мысли': ['антиутоп','истори','книг','подкаст','сериал','смотрю','фильм','читаю'],
};

function cleanToken(w){
  return w.replace(/[^\p{L}\p{N}]/gu, '');
}

function splitIntoClauses(text){
  const rawSentences = text.split(/(?<=[.!?])\s+|\n+/).map(s=>s.trim()).filter(Boolean);
  let clauses = [];
  rawSentences.forEach(s=>{
    const wordCount = s.split(/\s+/).filter(Boolean).length;
    if(wordCount > 14 && s.includes(',')){
      clauses.push(...s.split(',').map(c=>c.trim()).filter(Boolean));
    } else {
      clauses.push(s);
    }
  });
  return clauses.filter(c => c.split(/\s+/).filter(Boolean).length >= 3);
}

function categorize(clause){
  const lower = clause.toLowerCase();
  let best = null, bestScore = 0;
  for(const [cat, words] of Object.entries(CATEGORY_KEYWORDS)){
    let score = 0;
    words.forEach(w => { if(lower.includes(w)) score++; });
    if(score > bestScore){ bestScore = score; best = cat; }
  }
  return best || 'О себе';
}

function wordImportance(rawWord){
  const token = cleanToken(rawWord);
  if(!token) return { token: '', score: -1 };
  const lower = token.toLowerCase();
  if(STOPWORDS.has(lower)) return { token, score: -1 };
  if(GENERIC_FILLER.has(lower)) return { token, score: 0 };

  let score = 1;
  for(const words of Object.values(CATEGORY_KEYWORDS)){
    if(words.some(w => lower.includes(w))){ score += 5; break; }
  }
  if(/^[A-ZА-Я]{2,}$/.test(token)) score += 4; // acronyms like CS
  else if(/^[A-ZА-Я]/.test(rawWord) && lower !== rawWord.toLowerCase()) score += 1; // capitalized proper-noun-ish
  if(token.length >= 9) score += 3;
  else if(token.length >= 6) score += 2;
  else if(token.length <= 2) score -= 1;

  return { token, score };
}

function makeLabel(clause){
  const rawWords = clause.split(/\s+/).filter(Boolean);
  const scored = rawWords.map((w, i) => ({ ...wordImportance(w), pos: i }))
    .filter(w => w.token && w.score >= 0);

  if(scored.length === 0){
    const fallback = rawWords.map(cleanToken).filter(Boolean).slice(0, 2).join(' ');
    return capitalizeLabel(fallback) || clause.slice(0, 30);
  }

  const sorted = [...scored].sort((a,b) => (b.score - a.score) || (b.token.length - a.token.length));
  const top = sorted[0];
  const KEYWORD_THRESHOLD = 6;
  const topIsWeak = WEAK_ANCHORS.has(top.token.toLowerCase());

  let chosenWords;
  if(top.score >= KEYWORD_THRESHOLD && !topIsWeak){
    chosenWords = [top];
  } else if(sorted.length >= 2){
    chosenWords = [sorted[0], sorted[1]].sort((a,b) => a.pos - b.pos);
  } else {
    chosenWords = [top];
  }

  const label = chosenWords.map(w => w.token).join(' ');
  return capitalizeLabel(label) || clause.slice(0, 30);
}

function capitalizeLabel(label){
  if(!label) return label;
  return label[0].toUpperCase() + label.slice(1);
}

function extractGraphLocally(text){
  const clauses = splitIntoClauses(text);
  const usable = clauses.length ? clauses : [text];

  const leafNodes = [];
  const seenLabels = new Set();
  usable.forEach((clause, i) => {
    const cluster = categorize(clause);
    let label = makeLabel(clause);
    let uniqueLabel = label;
    let dupeCount = 1;
    while(seenLabels.has(uniqueLabel.toLowerCase())){
      dupeCount++;
      uniqueLabel = label + ' ' + dupeCount;
    }
    seenLabels.add(uniqueLabel.toLowerCase());
    const weight = Math.min(3, 1 + Math.floor(clause.split(/\s+/).length / 8));
    leafNodes.push({ id: 'n' + i, label: uniqueLabel, cluster, weight });
  });

  const clusters = [...new Set(leafNodes.map(n => n.cluster))];
  const nodes = [];
  const edges = [];

  clusters.forEach((cluster, ci) => {
    const members = leafNodes.filter(n => n.cluster === cluster);
    if(members.length >= 2){
      // Хаб — главная точка темы, к которой цепляются все её узлы.
      const hubId = 'hub' + ci;
      nodes.push({ id: hubId, label: cluster, cluster, weight: 3, isHub: true });
      members.forEach(m => {
        nodes.push(m);
        edges.push({ source: hubId, target: m.id });
      });
    } else {
      // Один узел в теме — хаб не нужен, он сам себе главная точка.
      nodes.push(...members);
    }
  });

  return { clusters, nodes, edges };
}

async function buildGraph(text){
  await new Promise(r => setTimeout(r, 400)); // brief pause so the loading state doesn't flash

  let parsed = null;
  try{
    parsed = extractGraphLocally(text);
    if(!parsed.nodes.length) throw new Error('empty');
  }catch(e){
    console.error('local extraction failed', e);
    state.error = 'Не получилось разобрать текст. Попробуй переформулировать несколькими отдельными предложениями.';
    state.screen = 'story';
    render();
    return;
  }

  state.graph = parsed;
  state.saveStatus = 'saving';
  render();

  try{
    await saveUserGraph(state.user.uid, text, parsed);
    state.saveStatus = 'saved';
  }catch(e){
    console.error('save failed', e);
    state.saveStatus = 'error';
    state.saveError = e.message;
  }

  state.screen = 'result';
  render();
}

const PALETTE = ['#7c9eff','#4fd8c4','#ff8fa3','#c792ea','#ffb37a','#7fe0a0','#6fb8ff'];
// Грубое сравнение по основе слова — устойчиво к русским окончаниям
// ("шахматы" находит "шахматами", "шахматист" и т.п.), без словаря синонимов.
function stemMatch(a, b, minLen){
  minLen = minLen || 4;
  const la = a.toLowerCase(), lb = b.toLowerCase();
  if(la === lb) return true;
  const cut = Math.min(6, la.length, lb.length);
  if(cut < minLen) return false;
  return la.slice(0, cut) === lb.slice(0, cut);
}

function labelMatchesQuery(label, query){
  const queryWords = query.toLowerCase().split(/\s+/).filter(Boolean);
  const labelWords = label.toLowerCase().split(/\s+/).filter(Boolean);
  return queryWords.some(qw => labelWords.some(lw => stemMatch(qw, lw)));
}

function colorForCluster(clusterName, clusters){
  const idx = clusters.indexOf(clusterName);
  return PALETTE[idx % PALETTE.length] || '#888';
}

// ---------------- совместимость между людьми ----------------
// Фиксированный список тем — чтобы сравнивать распределения по одинаковым осям,
// даже если у кого-то в графе какой-то темы вообще нет.
const ALL_CLUSTERS = [...Object.keys(CATEGORY_KEYWORDS), 'О себе'];

function clusterDistribution(graph){
  const leaf = (graph.nodes || []).filter(n => !n.isHub);
  const totals = {};
  ALL_CLUSTERS.forEach(c => totals[c] = 0);
  let sum = 0;
  leaf.forEach(n => {
    const w = n.weight || 1;
    totals[n.cluster] = (totals[n.cluster] || 0) + w;
    sum += w;
  });
  if(sum > 0){ ALL_CLUSTERS.forEach(c => totals[c] = totals[c] / sum); }
  return totals;
}

function normalizeLabelTokens(label){
  return label.toLowerCase().split(/\s+/).map(cleanToken).filter(t => t.length >= 4 && !STOPWORDS.has(t));
}

// Считает процент совместимости в два слоя:
// 1) насколько похоже распределение по темам (работа/увлечения/люди/ценности/медиа) —
//    ловит "похоже по сути", даже если конкретные слова разные (Паразиты vs антиутопии — оба в "Медиа и мысли").
// 2) бонус за реально совпадающие или пересекающиеся по словам конкретные узлы.
// Итог — оценка, а не точное измерение, поэтому специально не даём 100% почти никогда.
function computeCompatibility(graphA, graphB){
  if(!graphA || !graphB || !(graphA.nodes||[]).length || !(graphB.nodes||[]).length){
    return { percent: 0, sharedClusters: [], matches: [] };
  }

  const distA = clusterDistribution(graphA);
  const distB = clusterDistribution(graphB);
  let overlapSum = 0;
  const sharedClusters = [];
  ALL_CLUSTERS.forEach(c => {
    const m = Math.min(distA[c], distB[c]);
    overlapSum += m;
    if(m > 0.08) sharedClusters.push(c);
  });

  const leafA = (graphA.nodes||[]).filter(n => !n.isHub);
  const leafB = (graphB.nodes||[]).filter(n => !n.isHub);
  const usedB = new Set();
  const matches = [];
  let bonus = 0;

  leafA.forEach(a => {
    const aLower = a.label.toLowerCase();
    const hit = leafB.find(b => !usedB.has(b.id) && b.label.toLowerCase() === aLower);
    if(hit){ usedB.add(hit.id); matches.push({ a: a.label, b: hit.label, type: 'exact' }); bonus += 1; }
  });
  leafA.forEach(a => {
    if(matches.some(m => m.a === a.label)) return;
    const aTokens = normalizeLabelTokens(a.label);
    if(!aTokens.length) return;
    const hit = leafB.find(b => !usedB.has(b.id) && normalizeLabelTokens(b.label).some(t => aTokens.includes(t)));
    if(hit){ usedB.add(hit.id); matches.push({ a: a.label, b: hit.label, type: 'related' }); bonus += 0.4; }
  });

  const percent = Math.round(Math.max(0, Math.min(100, overlapSum * 70 + Math.min(30, bonus * 6))));
  return { percent, sharedClusters, matches };
}

function renderResult(){
  const w = el('div','wrap wide');
  w.appendChild(renderNav('mine'));
  w.appendChild(el('div','eyebrow', `Граф — ${state.user.name}`));
  w.appendChild(el('h1','', 'Вот из чего ты состоишь.'));

  const legend = el('div','legend');
  (state.graph.clusters || []).forEach(c=>{
    const item = el('div','legend-item');
    const dot = el('span','dot');
    dot.style.borderColor = colorForCluster(c, state.graph.clusters);
    item.appendChild(dot);
    item.appendChild(el('span','', c));
    legend.appendChild(item);
  });
  w.appendChild(legend);

  if(state.saveStatus === 'saving'){
    w.appendChild(el('div','footer-note','Сохраняем…'));
  } else if(state.saveStatus === 'saved'){
    w.appendChild(el('div','footer-note','Сохранено ✓ — теперь твоя схема видна во вкладке «Люди».'));
  } else if(state.saveStatus === 'error'){
    w.appendChild(el('div','err','Не сохранилось: ' + state.saveError));
  }

  const card = el('div','card graph-card-full');
  const svgWrap = document.createElement('div');
  svgWrap.style.width = '100%';
  svgWrap.style.height = '620px';
  card.appendChild(svgWrap);
  w.appendChild(card);

  const row = el('div','');
  row.style.display='flex'; row.style.gap='12px'; row.style.marginTop='20px'; row.style.flexWrap='wrap';
  const editBtn = el('button','btn ghost','Переписать текст о себе');
  editBtn.onclick = () => { state.screen='story'; render(); };
  const logoutBtn = el('button','btn ghost','Выйти');
  logoutBtn.onclick = () => {
    if(chatUnsubscribe){ chatUnsubscribe(); chatUnsubscribe = null; }
    if(otherLastReadUnsub){ otherLastReadUnsub(); otherLastReadUnsub = null; }
    stopNotificationPolling();
    stopListeningForIncomingCalls();
    if(currentCall) endCall(true);
    logoutUser();
    state = { screen: 'landing', user: null, text: '', graph: null, error: '', authMode: 'login' };
    render();
  };
  row.appendChild(editBtn);
  row.appendChild(logoutBtn);
  w.appendChild(row);

  root.appendChild(w);
  drawGraph(svgWrap, state.graph);
}

function cssVar(name){
  return getComputedStyle(document.body).getPropertyValue(name).trim() || '#000';
}

function drawGraph(container, graph){
  const width = container.clientWidth || 960;
  const height = container.clientHeight || 460;
  const padding = 24;
  const nodeFillColor = cssVar('--bg-soft');
  const labelColor = cssVar('--ink');
  const svg = d3.select(container).append('svg')
    .attr('width', '100%').attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

  const nodes = graph.nodes.map(n => ({ ...n, r: n.isHub ? 30 : (9 + (n.weight||1)*8) }));
  const nodeIds = new Set(nodes.map(n=>n.id));
  const links = (graph.edges || []).filter(e => nodeIds.has(e.source) && nodeIds.has(e.target)).map(e => ({...e}));

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d => 90 + Math.max(d.source.label?.length||0, d.target.label?.length||0)*2.6).strength(0.55))
    .force('charge', d3.forceManyBody().strength(d => d.isHub ? -700 : -420))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collide', d3.forceCollide(d => d.r + d.label.length * 3.6 + 6));

  const link = svg.append('g').selectAll('line')
    .data(links).enter().append('line')
    .attr('stroke', cssVar('--edge'))
    .attr('stroke-width', 1)
    .attr('opacity', 0.6);

  const node = svg.append('g').selectAll('circle')
    .data(nodes).enter().append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => d.isHub ? colorForCluster(d.cluster, graph.clusters) + '26' : nodeFillColor)
    .attr('stroke', d => colorForCluster(d.cluster, graph.clusters))
    .attr('stroke-width', d => d.isHub ? 3 : 2.5)
    .call(d3.drag()
      .on('start', (event,d)=>{ if(!event.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (event,d)=>{ d.fx=event.x; d.fy=event.y; })
      .on('end', (event,d)=>{ if(!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  const label = svg.append('g').selectAll('text')
    .data(nodes).enter().append('text')
    .attr('font-size', d => d.isHub ? 13 : 11)
    .attr('font-weight', d => d.isHub ? 700 : 400)
    .attr('fill', labelColor)
    .attr('text-anchor','middle')
    .attr('dy', d => -(d.r + 8))
    .text(d => d.label);

  sim.on('tick', () => {
    nodes.forEach(d => {
      d.x = Math.max(padding + d.r, Math.min(width - padding - d.r, d.x));
      d.y = Math.max(padding + d.r + 24, Math.min(height - padding - d.r, d.y));
    });
    link
      .attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)
      .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
    node.attr('cx', d=>d.x).attr('cy', d=>d.y);
    label.attr('x', d=>d.x).attr('y', d=>d.y);
  });
}

if(firebaseReady){
  auth.onAuthStateChanged(async (fbUser) => {
    if(fbUser && !state.user){
      try{
        const doc = await db.collection('users').doc(fbUser.uid).get();
        const data = doc.exists ? doc.data() : {};
        state.user = { uid: fbUser.uid, name: data.name || 'Без имени', login: data.login || data.name || '', theme: data.theme || 'dark' };
        state.graph = data.graph || null;
        state.text = data.text || '';
        state.profile = data.profile || null;
        state.isAdmin = data.isAdmin === true;
        applyTheme(data.theme || 'dark');
        applyBgMotion(state.profile?.bgMotion === true);
        if(state.screen === 'landing'){ openMessagesTab(); }
        refreshNotificationCounts().then(render);
        startNotificationPolling();
        listenForIncomingCalls();
      }catch(e){ console.error('session restore failed', e); }
    }
    render();
  });
} else {
  render();
}
