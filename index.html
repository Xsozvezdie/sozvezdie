<!DOCTYPE html>

<head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

    --panel: #161d2e;
    --line: #262f45;
    --ink: #e8ecf7;

    --gold: #f2c14e;

  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(ellipse at 30% 0%, #131a2c 0%, var(--bg) 55%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .wrap{
    max-width: 820px;
    margin: 0 auto;
    padding: 64px 24px 80px;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
  }
  .wrap.wide{ max-width: 1040px; }
  .eyebrow{
    font-family:'Space Grotesk',sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 18px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: clamp(30px, 5.5vw, 48px);
    line-height: 1.08;
    margin: 0 0 20px;

    font-size: 16px;

  .btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 600;
    font-size: 15px;
    background: var(--gold);
    color: #1a1406;
    border: none;
    padding: 14px 26px;
    border-radius: 10px;

  .btn.ghost{

  .btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .card{
    background: var(--panel);
    border: 1px solid var(--line);

    width:100%;

    background: var(--bg-soft);
    border:1px solid var(--line);

  input[type=text], input[type=password]{
    width:100%;
    background: var(--bg-soft);
    border:1px solid var(--line);
    color: var(--ink);

    border-radius: 10px;
    font-size: 16px;
    font-family:'Inter',sans-serif;
    margin-bottom: 14px;

  }
  input[type=text]:focus, input[type=password]:focus{ outline:none; border-color: var(--gold); }

  .counter{ font-size:12px; color: var(--ink-dim); margin-bottom: 18px; }

  .prompts{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 18px; }
  .prompt-chip{
    font-size:12px; color: var(--ink-dim);
    border:1px solid var(--line); border-radius:999px;
    padding: 6px 12px;
    background: var(--bg-soft);
  }

  .footer-note{
    margin-top: auto;
    padding-top: 40px;
    font-size: 13px;
    color: var(--ink-dim);
  }

  .legend{ display:flex; flex-wrap:wrap; gap:10px; margin: 18px 0 4px; }
  .legend-item{
    display:flex; align-items:center; gap:7px;
    font-size:13px; color: var(--ink-dim);
    border:1px solid var(--line); border-radius:999px;
    padding: 6px 12px;
  }
  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; background: transparent; border: 2px solid; box-sizing: border-box; }

  .loading-wrap{
    display:flex; flex-direction:column; align-items:flex-start; gap:14px;
    padding: 40px 0;
  }
  .spinner{
    width: 28px; height:28px; border-radius:50%;
    border: 3px solid var(--line);
    border-top-color: var(--gold);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  svg text{ font-family:'Inter',sans-serif; fill:#c3c9de; font-size:11px; }

  .err{ color:#ef6f8e; font-size:14px; margin-bottom:14px; word-break: break-word; }

  ::selection{ background: var(--gold); color:#1a1406; }

  @media (max-width: 640px){
    .wrap{ padding: 20px 16px 60px; }
    .card{ padding: 20px; }
    h1{ font-size: clamp(26px, 8vw, 36px); }
    .nav{ flex-direction: column; align-items: flex-start; gap: 12px; padding: 14px 16px; }
    .nav-links{ flex-wrap: wrap; gap: 14px; width: 100%; }
    .person-row{ flex-wrap: wrap; gap: 10px; }
    .chat-bubble{ max-width: 85%; }
    .hero-graph{ height: 150px; }
  }

  .nav{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 40px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 22px;
    position: sticky;
    top: 16px;
    z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .nav-brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    letter-spacing: -0.01em;
    cursor: pointer;
  }
  .nav-links{ display:flex; gap: 20px; align-items:center; }
  .nav-link{
    font-family:'Space Grotesk',sans-serif;
    font-size: 13px;
    color: var(--ink-dim);
    cursor: pointer;
    background:none; border:none;
    padding: 4px 2px;
    transition: color .15s ease, background .15s ease;
    border-radius: 999px;
  }
  .nav-link:hover, .nav-link.active{ color: var(--gold); }
  .nav-link.alert{
    color: #1a1406;
    background: var(--gold);
    font-weight: 700;
    padding: 6px 14px;
    animation: nav-alert-pulse 1.6s ease-in-out infinite;
  }
  @keyframes nav-alert-pulse{
    0%, 100% { box-shadow: 0 0 0 0 rgba(242,193,78,0.55); }
    50% { box-shadow: 0 0 0 6px rgba(242,193,78,0); }
  }

  .people-grid{ display:flex; flex-direction:column; gap:10px; margin-top: 20px; }
  .person-row{
    display:flex; justify-content:space-between; align-items:center;
    background: var(--bg-soft); border:1px solid var(--line);
    border-radius: 12px; padding: 16px 18px;
    cursor:pointer;
    transition: border-color .15s ease;
  }
  .person-row:hover{ border-color: var(--gold); }
  .person-row .name{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; }
  .person-row .meta{ font-size:12px; color: var(--ink-dim); margin-top:3px; }
  .person-row .arrow{ color: var(--ink-dim); font-size:18px; }
  .compat-badge{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--gold);
  }
  .meta{ font-size:12px; color: var(--ink-dim); margin-top:4px; }

  .chat-box{
    display:flex; flex-direction:column; gap:8px;
    max-height: 420px; min-height: 200px; overflow-y:auto;
    padding-right: 4px;
  }
  .chat-bubble{
    align-self: flex-start;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 12px 12px 12px 4px;
    padding: 10px 14px;
    font-size: 14px;
    max-width: 70%;
    word-break: break-word;
  }
  .chat-bubble.mine{
    align-self: flex-end;
    background: var(--gold);
    color: #1a1406;
    border-color: var(--gold);
    border-radius: 12px 12px 4px 12px;
  }
  .chat-image{ max-width: 220px; border-radius: 8px; display:block; overflow: hidden; }
  .demo-match{
    display:flex; align-items:center; gap:14px;
    background: var(--panel); border:1px solid var(--line); border-radius:14px;
    padding: 14px 18px; margin-bottom: 16px;
  }

  .icon-btn{
    width: 30px; height: 30px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    background: var(--bg-soft); border: 1px solid var(--line);
    font-size: 14px; cursor:pointer; padding:0;
  }
  .icon-btn:hover{ border-color: var(--gold); }
  .icon-btn.disabled{ opacity:.5; cursor:default; }

  .unread-row{ border-color: var(--gold); }
  .unread-dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold); flex-shrink: 0;
    box-shadow: 0 0 8px 1px rgba(242,193,78,0.6);
  }
  .unread-name{ font-weight: 700; color: var(--ink); }

  .chat-sender{
    font-size: 11px; color: var(--gold); font-weight:600; margin-bottom: 4px;
  }
  .seen-caption{
    align-self: flex-end;
    font-size: 11px;
    color: var(--ink-dim);
    font-style: italic;
    letter-spacing: 0.03em;
    margin: -4px 4px 4px 0;
  }

  .toast{
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px);
    background: var(--gold); color: #1a1406;
    padding: 14px 26px; border-radius: 999px;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    z-index: 999; opacity: 0;
    transition: opacity .3s ease, transform .3s ease;
    white-space: nowrap;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  .landing-section{ margin-top: 72px; }
  .landing-h2{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 4vw, 30px);
    margin: 6px 0 24px;
    line-height: 1.25;
  }

  .graph-card-full{
    width: 100vw;
    position: relative;
    left: 50%;
    margin-left: -50vw;
    border-radius: 0;
    border-left: none; border-right: none;
    box-sizing: border-box;
  }
  @media (min-width: 780px){
    .graph-card-full{ padding-left: 48px; padding-right: 48px; }
  }

  body.space{ background: #000000; }
  body.space .nav-brand, body.space .nav-link{ color: #cfd6e8; }
  body.space .nav-link:hover, body.space .nav-link.active{ color: #ffffff; }
  body.space .eyebrow{ color: #7a83a0; }
  body.space h1 span{ color: #ffffff; }

<body>
<div id="root"></div>

<script>
// ---------------- backend (Firebase Firestore) ----------------
// Вставь сюда свои ключи из консоли Firebase (Project settings -> General -> Your apps -> SDK setup).
const firebaseConfig = {
  apiKey: "AIzaSyAni9Eg6fIJoGPD_E5VDLCVuO8yYzCBMIc",
  authDomain: "sozvezdie-3f7e6.firebaseapp.com",
  projectId: "sozvezdie-3f7e6",
  storageBucket: "sozvezdie-3f7e6.firebasestorage.app",
  messagingSenderId: "845619165839",
  appId: "1:845619165839:web:051ce4b807386aa8e38efa"
};

let db = null;
let auth = null;
let firebaseReady = false;
try{
  if(firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('ВСТАВЬ') === -1){
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    firebaseReady = true;
  }
}catch(e){
  console.error('Firebase init failed', e);
}

function backendNotConfiguredError(){
  return new Error('База данных не подключена: вставь конфиг Firebase в начало <script> (переменная firebaseConfig).');
}

// Логины у нас без email, но Firebase Auth умеет только email+пароль,
// поэтому превращаем ник в служебный псевдо-адрес — пользователь его не видит.
function hashUsername(name){
  const s = name.toLowerCase().trim();
  let h = 0;
  for(let i = 0; i < s.length; i++){
    h = (h * 31 + s.codePointAt(i)) >>> 0;
  }
  return h.toString(36) + s.length.toString(36);
}
function usernameToEmail(name){
  return 'u' + hashUsername(name) + '@sozvezdie.local';
}

async function registerUser(username, password){
  if(!firebaseReady) throw backendNotConfiguredError();
  const email = usernameToEmail(username);
  let cred;
  try{
    cred = await auth.createUserWithEmailAndPassword(email, password);
  }catch(e){
    if(e.code === 'auth/email-already-in-use') throw new Error('Это имя уже занято — выбери другое.');
    if(e.code === 'auth/weak-password') throw new Error('Пароль слишком короткий — минимум 6 символов.');
    throw new Error(e.message);
  }
  await db.collection('users').doc(cred.user.uid).set({ name: username, ts: Date.now() });
  return { uid: cred.user.uid, name: username };
}

async function loginUser(username, password){
  if(!firebaseReady) throw backendNotConfiguredError();
  const email = usernameToEmail(username);
  let cred;
  try{
    cred = await auth.signInWithEmailAndPassword(email, password);
  }catch(e){
    if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password'){
      throw new Error('Неверный логин или пароль.');
    }
    throw new Error(e.message);
  }
  const doc = await db.collection('users').doc(cred.user.uid).get();
  const data = doc.exists ? doc.data() : {};
  return { uid: cred.user.uid, name: data.name || username, graph: data.graph || null, text: data.text || '', profile: data.profile || null, isAdmin: data.isAdmin === true };
}

function logoutUser(){
  if(auth) auth.signOut();
}

async function saveUserGraph(uid, text, graph){
  if(!firebaseReady) throw backendNotConfiguredError();
  await db.collection('users').doc(uid).set({ text, graph, ts: Date.now() }, { merge: true });
}

async function fetchAllUsers(){
  if(!firebaseReady) throw backendNotConfiguredError();
  const snap = await db.collection('users').orderBy('ts', 'desc').get();
  return snap.docs.map(d => ({ uid: d.id, ...d.data() })).filter(u => u.graph);
}

// ---------------- друзья ----------------
function pairId(uidA, uidB){
  return [uidA, uidB].sort().join('_');
}

async function getFriendRequestBetween(uidA, uidB){
  if(!firebaseReady) throw backendNotConfiguredError();
  const q1 = await db.collection('friendRequests').where('fromUid','==',uidA).where('toUid','==',uidB).limit(1).get();
  if(!q1.empty) return { id: q1.docs[0].id, ...q1.docs[0].data() };
  const q2 = await db.collection('friendRequests').where('fromUid','==',uidB).where('toUid','==',uidA).limit(1).get();
  if(!q2.empty) return { id: q2.docs[0].id, ...q2.docs[0].data() };
  return null;
}

async function sendFriendRequest(toUid, toName){
  if(!firebaseReady) throw backendNotConfiguredError();
  const me = state.user;
  const existing = await getFriendRequestBetween(me.uid, toUid);
  if(existing){
    if(existing.status === 'pending' && existing.fromUid === toUid){
      await db.collection('friendRequests').doc(existing.id).update({ status: 'accepted' });
      return { ...existing, status: 'accepted' };
    }
    return existing;
  }
  const doc = await db.collection('friendRequests').add({
    fromUid: me.uid, fromName: me.name, toUid, toName, status: 'pending', ts: Date.now()
  });
  return { id: doc.id, fromUid: me.uid, fromName: me.name, toUid, toName, status: 'pending' };
}

async function respondFriendRequest(requestId, accept){
  if(!firebaseReady) throw backendNotConfiguredError();
  if(accept){
    await db.collection('friendRequests').doc(requestId).update({ status: 'accepted' });
  } else {
    await db.collection('friendRequests').doc(requestId).delete();
  }
}

async function listIncomingRequests(){
  if(!firebaseReady) throw backendNotConfiguredError();
  const snap = await db.collection('friendRequests').where('toUid','==',state.user.uid).where('status','==','pending').get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function listFriends(){
  if(!firebaseReady) throw backendNotConfiguredError();
  const uid = state.user.uid;
  const [q1, q2] = await Promise.all([
    db.collection('friendRequests').where('fromUid','==',uid).where('status','==','accepted').get(),
    db.collection('friendRequests').where('toUid','==',uid).where('status','==','accepted').get(),
  ]);
  const friends = [];
  q1.docs.forEach(d => { const v = d.data(); friends.push({ uid: v.toUid, name: v.toName }); });
  q2.docs.forEach(d => { const v = d.data(); friends.push({ uid: v.fromUid, name: v.fromName }); });
  return friends;
}

// ---------------- сообщения (личные + групповые) ----------------
async function sendMessage(toUid, toName, text, imageData){
  if(!firebaseReady) throw backendNotConfiguredError();
  const me = state.user;
  const payload = {
    chatId: pairId(me.uid, toUid), fromUid: me.uid, fromName: me.name, toUid, toName, ts: Date.now()
  };
  if(text) payload.text = text;
  if(imageData) payload.imageData = imageData;
  await db.collection('messages').add(payload);
}

async function sendGroupMessage(groupId, text, imageData){
  if(!firebaseReady) throw backendNotConfiguredError();
  const me = state.user;
  const payload = {
    chatId: 'g_' + groupId, groupId, fromUid: me.uid, fromName: me.name, ts: Date.now()
  };
  if(text) payload.text = text;
  if(imageData) payload.imageData = imageData;
  await db.collection('messages').add(payload);
}

async function createGroup(name, memberUidsAndNames){
  if(!firebaseReady) throw backendNotConfiguredError();
  const me = state.user;
  const memberNames = { [me.uid]: me.name };
  const members = [me.uid];
  memberUidsAndNames.forEach(m => { members.push(m.uid); memberNames[m.uid] = m.name; });
  const doc = await db.collection('groups').add({ name, members, memberNames, createdBy: me.uid, ts: Date.now() });
  return doc.id;
}

async function markChatRead(chatId){
  if(!state.user) return;
  try{
    await db.collection('users').doc(state.user.uid).update({ ['lastRead.' + chatId]: Date.now() });
  }catch(e){ console.error('mark read failed', e); }
}

async function getUnreadChatsCount(){
  if(!state.user) return 0;
  const meDoc = await db.collection('users').doc(state.user.uid).get();
  const lastRead = (meDoc.exists && meDoc.data().lastRead) || {};
  const snap = await db.collection('messages').where('toUid','==',state.user.uid).get();
  const groupSnap = await db.collection('groups').where('members','array-contains',state.user.uid).get();
  const groupIds = new Set(groupSnap.docs.map(d => 'g_' + d.id));
  const latestByChat = {};
  snap.docs.forEach(d => {
    const m = d.data();
    if(!latestByChat[m.chatId] || m.ts > latestByChat[m.chatId]) latestByChat[m.chatId] = m.ts;
  });
  // групповые сообщения не от меня тоже считаем непрочитанными
  if(groupIds.size){
    const groupMsgsSnap = await Promise.all([...groupIds].map(gid => db.collection('messages').where('chatId','==',gid).get()));
    groupMsgsSnap.forEach(gs => gs.docs.forEach(d => {
      const m = d.data();
      if(m.fromUid === state.user.uid) return;
      if(!latestByChat[m.chatId] || m.ts > latestByChat[m.chatId]) latestByChat[m.chatId] = m.ts;
    }));
  }
  let count = 0;
  Object.keys(latestByChat).forEach(chatId => {
    if(latestByChat[chatId] > (lastRead[chatId] || 0)) count++;
  });
  return count;
}

async function refreshNotificationCounts(){
  if(!state.user) return;
  try{
    const [incoming, unread] = await Promise.all([listIncomingRequests(), getUnreadChatsCount()]);
    state.pendingRequestCount = incoming.length;
    state.unreadChatsCount = unread;
  }catch(e){ console.error('notif refresh failed', e); }
}

function listenToMessages(chatId, callback){
  return db.collection('messages').where('chatId','==',chatId)
    .onSnapshot(snap => {
      const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      msgs.sort((a,b) => (a.ts||0) - (b.ts||0));
      callback(msgs);
    }, err => console.error('chat listen failed', err));
}

function listenToChat(otherUid, callback){
  return listenToMessages(pairId(state.user.uid, otherUid), callback);
}

// Собирает список всех переписок (личных и групповых) с превью последнего сообщения.
async function listChatThreads(){
  const me = state.user.uid;
  const [sentSnap, receivedSnap, groupsSnap, meDoc] = await Promise.all([
    db.collection('messages').where('fromUid','==',me).get(),
    db.collection('messages').where('toUid','==',me).get(),
    db.collection('groups').where('members','array-contains',me).get(),
    db.collection('users').doc(me).get(),
  ]);
  const byChatId = {};
  function ingest(doc){
    const m = doc.data();
    const existing = byChatId[m.chatId];
    if(!existing || (m.ts||0) > (existing.latest?.ts||0)){
      byChatId[m.chatId] = {
        chatId: m.chatId,
        isGroup: !!m.groupId,
        groupId: m.groupId || null,
        otherUid: m.fromUid === me ? m.toUid : m.fromUid,
        otherName: m.fromUid === me ? m.toName : m.fromName,
        latest: m,
      };
    }
  }
  sentSnap.docs.forEach(ingest);
  receivedSnap.docs.forEach(ingest);

  const groupMsgLists = await Promise.all(groupsSnap.docs.map(d => db.collection('messages').where('chatId','==','g_'+d.id).get()));
  groupsSnap.docs.forEach((d, i) => {
    const g = d.data();
    const chatId = 'g_' + d.id;
    groupMsgLists[i].docs.forEach(md => {
      const m = md.data();
      const existing = byChatId[chatId];
      if(!existing || (m.ts||0) > (existing.latest?.ts||0)){
        byChatId[chatId] = { chatId, isGroup:true, groupId: d.id, groupName: g.name, latest: m };
      }
    });
    if(!byChatId[chatId]){
      byChatId[chatId] = { chatId, isGroup:true, groupId: d.id, groupName: g.name, latest: null };
    } else {
      byChatId[chatId].groupName = g.name;
    }
  });

  const lastRead = (meDoc.exists && meDoc.data().lastRead) || {};
  const threads = Object.values(byChatId).map(t => ({
    ...t,
    unread: !!(t.latest && t.latest.fromUid !== me && (t.latest.ts||0) > (lastRead[t.chatId]||0))
  }));
  threads.sort((a,b) => (b.latest?.ts||0) - (a.latest?.ts||0));
  return threads;
}

async function updateLastActive(){
  if(!state.user || !firebaseReady) return;
  try{ await db.collection('users').doc(state.user.uid).update({ lastActive: Date.now() }); }
  catch(e){ /* тихо игнорируем */ }

function formatLastSeen(ts){
  if(!ts) return 'давно не заходил(а)';
  const diffMin = (Date.now() - ts) / 60000;
  if(diffMin < 2) return 'в сети';
  if(diffMin < 60) return `был(а) в сети ${Math.round(diffMin)} мин назад`;
  const diffH = diffMin / 60;
  if(diffH < 24) return `был(а) в сети ${Math.round(diffH)} ч назад`;
  return `был(а) в сети ${Math.round(diffH/24)} дн назад`;
}

// Статус виден только если ОБА участника не скрыли его — как в Telegram.
async function getStatusText(otherUid){
  if(!state.user || !firebaseReady) return null;
  try{
    const [meDoc, otherDoc] = await Promise.all([
      db.collection('users').doc(state.user.uid).get(),
      db.collection('users').doc(otherUid).get(),
    ]);
    const myShow = !meDoc.exists || meDoc.data().showStatus !== false;
    if(!myShow) return null;
    if(!otherDoc.exists) return null;
    const otherShow = otherDoc.data().showStatus !== false;
    if(!otherShow) return null;
    return formatLastSeen(otherDoc.data().lastActive);
  }catch(e){ return null; }
}

let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
});
function triggerInstallPrompt(){
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    deferredInstallPrompt = null;
  } else {
    alert('Установка приложения скоро появится — сейчас в разработке.');

function showToast(msg){
  const t = el('div','toast', msg);
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 350);
  }, 2400);
}

function renderPeople(){
  const w = el('div','wrap');
  w.appendChild(renderNav('people'));
  w.appendChild(el('h1','', 'Пользователи'));
  w.appendChild(el('p','lead', state.graph
    ? 'Отсортировано по тому, насколько ваши схемы похожи — сверху те, с кем совпадений больше.'
    : 'Заполни свою схему, и здесь появится сортировка по совместимости.'));

  if(!state.peopleLoading && !state.peopleError && state.people && state.people.length){
    const searchRow = el('div','');
    searchRow.style.display='flex'; searchRow.style.gap='12px'; searchRow.style.flexWrap='wrap'; searchRow.style.marginBottom='16px';

    const searchInput = document.createElement('input');
    searchInput.type = 'text';
    searchInput.placeholder = 'Поиск по имени';
    searchInput.value = state.peopleSearch || '';
    searchInput.style.marginBottom = '0'; searchInput.style.flex='1'; searchInput.style.minWidth='180px';

    const interestInput = document.createElement('input');
    interestInput.type = 'text';
    interestInput.placeholder = 'Поиск по интересу';
    interestInput.value = state.peopleInterestSearch || '';
    interestInput.style.marginBottom = '0'; interestInput.style.flex='1'; interestInput.style.minWidth='220px';

    searchRow.appendChild(searchInput);
    searchRow.appendChild(interestInput);
    w.appendChild(searchRow);

    searchInput.addEventListener('input', () => { state.peopleSearch = searchInput.value; renderGrid(); });
    interestInput.addEventListener('input', () => { state.peopleInterestSearch = interestInput.value; renderGrid(); });
  }

  const card = el('div','card');
  w.appendChild(card);
  root.appendChild(w);

  function renderGrid(){
    card.innerHTML = '';
    if(state.peopleLoading){
      card.appendChild(el('div','footer-note','Загружаем…'));
      return;
    }
    if(state.peopleError){
      card.appendChild(el('div','err', state.peopleError));
      return;
    }
    if(!state.people || state.people.length === 0){
      card.appendChild(el('div','empty','Пока никого нет. Будь первой.'));
      return;
    }
    const query = (state.peopleSearch || '').trim().toLowerCase();
    const interestQuery = (state.peopleInterestSearch || '').trim().toLowerCase();
    let others = state.user ? state.people.filter(p => p.name.toLowerCase() !== state.user.name.toLowerCase()) : state.people;
    if(query){ others = others.filter(p => p.name.toLowerCase().includes(query)); }
    let matchedInterestByUid = {};
    let matchCountByUid = {};
    if(interestQuery){
      others = others.filter(p => {
        const leafHits = (p.graph.nodes||[]).filter(n => !n.isHub && labelMatchesQuery(n.label, interestQuery));
        const clusterHit = (p.graph.clusters||[]).find(c => labelMatchesQuery(c, interestQuery));
        const key = p.uid || p.name;
        if(leafHits.length){
          matchedInterestByUid[key] = leafHits.map(n => n.label).join(', ');
          matchCountByUid[key] = leafHits.length;
          return true;
        }
        if(clusterHit){
          matchedInterestByUid[key] = clusterHit;
          matchCountByUid[key] = 1;
          return true;
        }
        return false;
      });
    }
    if(others.length === 0){
      const emptyMsg = interestQuery ? 'Никто не упоминал такой интерес.' : (query ? 'Никого не нашли по этому запросу.' : 'Кроме тебя пока никого нет.');
      card.appendChild(el('div','empty', emptyMsg));
      return;
    }
    const withScores = others.map(p => ({
      p,
      compat: state.graph ? computeCompatibility(state.graph, p.graph) : null
    }));
    if(interestQuery){
      withScores.sort((x, y) => (matchCountByUid[y.p.uid || y.p.name]||0) - (matchCountByUid[x.p.uid || x.p.name]||0));
    } else if(state.graph){
      withScores.sort((x, y) => y.compat.percent - x.compat.percent);
    }
    const grid = el('div','people-grid');
    withScores.forEach(({ p, compat }) => {
      const row = el('div','person-row');
      const left = el('div');
      left.appendChild(el('div','name', p.name));
      let metaText = (p.graph.nodes||[]).filter(n=>!n.isHub).length + ' узлов · ' + (p.graph.clusters||[]).length + ' тем';
      const key = p.uid || p.name;
      if(matchedInterestByUid[key]){
        const cnt = matchCountByUid[key] || 1;
        metaText += ` · совпадений: ${cnt} (${matchedInterestByUid[key]})`;
      }
      if(compat && compat.sharedClusters.length){
        metaText += ' · общее: ' + compat.sharedClusters.join(', ');
      }
      left.appendChild(el('div','meta', metaText));
      row.appendChild(left);

      const right = el('div','');
      right.style.display='flex'; right.style.alignItems='center'; right.style.gap='12px'; right.style.flexShrink='0';
      if(compat){
        right.appendChild(el('div','compat-badge', compat.percent + '%'));
      }
      const iconsBox = el('div','');
      iconsBox.style.display='flex'; iconsBox.style.gap='6px';
      right.appendChild(iconsBox);
      renderQuickIcons(iconsBox, p);
      right.appendChild(el('div','arrow','→'));
      row.appendChild(right);

      row.onclick = () => { state.selectedPerson = p; state.screen = 'personView'; render(); };
      grid.appendChild(row);
    });
    card.appendChild(grid);
  }

  renderGrid();
}

function compressImageToDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const maxW = 480;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

let otherLastReadUnsub = null;

function openChat(uid, name){
  if(chatUnsubscribe){ chatUnsubscribe(); chatUnsubscribe = null; }
  if(otherLastReadUnsub){ otherLastReadUnsub(); otherLastReadUnsub = null; }
  state.screen = 'chat';
  state.chatWith = { uid, name, isGroup: false };
  state.chatMessages = [];
  state.otherLastRead = 0;
  state.chatStatusText = '';
  render();
  const chatId = pairId(state.user.uid, uid);
  markChatRead(chatId).then(() => refreshNotificationCounts().then(() => {
    if(state.screen === 'chat') renderChatNavOnly();
  }));
  chatUnsubscribe = listenToChat(uid, (msgs) => {
    state.chatMessages = msgs;
    if(state.screen === 'chat' && state.chatWith && state.chatWith.uid === uid){
      renderChatMessages();
      markChatRead(chatId);
    }
  });
  // видит ли собеседник мои сообщения — обновляем "просмотрено" в реальном времени
  otherLastReadUnsub = db.collection('users').doc(uid).onSnapshot(doc => {
    const lr = (doc.exists && doc.data().lastRead) || {};
    state.otherLastRead = lr[chatId] || 0;
    if(state.screen === 'chat') renderChatMessages();
  });
  getStatusText(uid).then(txt => {
    state.chatStatusText = txt;
    if(state.screen === 'chat') renderChatHeaderStatus();
  });
}

function renderChatMessages(){
  const box = document.getElementById('chat-messages');
  if(!box) return;
  box.innerHTML = '';
  // индекс последнего МОЕГО сообщения, которое собеседник уже видел (для подписи "просмотрено")
  let lastSeenMineIndex = -1;
  if(!state.chatWith.isGroup){
    state.chatMessages.forEach((m, i) => {
      if(m.fromUid === state.user.uid && (m.ts||0) <= (state.otherLastRead||0)) lastSeenMineIndex = i;
    });
  }
  state.chatMessages.forEach((m, i) => {
    const mine = m.fromUid === state.user.uid;
    const bubble = el('div','chat-bubble' + (mine ? ' mine' : ''));
    if(state.chatWith.isGroup && !mine){
      bubble.appendChild(el('div','chat-sender', m.fromName));
    }
    if(m.imageData){
      const img = document.createElement('img');
      img.src = m.imageData;
      img.className = 'chat-image';
      bubble.appendChild(img);
    }
    if(m.text){
      const textEl = document.createElement('div');
      textEl.textContent = m.text;
      if(m.imageData) textEl.style.marginTop = '6px';
      bubble.appendChild(textEl);
    }
    box.appendChild(bubble);
    if(i === lastSeenMineIndex){
      box.appendChild(el('div','seen-caption','просмотрено ·˖✧'));
    }
  });
  box.scrollTop = box.scrollHeight;
}

function timeAgoShort(ts){
  if(!ts) return '';
  const diffMin = (Date.now() - ts) / 60000;
  if(diffMin < 1) return 'сейчас';
  if(diffMin < 60) return Math.round(diffMin) + ' мин';
  const diffH = diffMin / 60;
  if(diffH < 24) return Math.round(diffH) + ' ч';
  return Math.round(diffH / 24) + ' дн';
}

const STOPWORDS = new Set(['я','и','в','во','на','с','со','что','чтобы','это','эта','эти','этот','этом','этой','этих','эту','меня','мне','мной','мой','моя','моё','мои','моего','моей','моих','к','ко','по','из','изо','у','а','но','как','то','же','бы','для','от','ото','до','об','обо','о','не','ни','так','вот','ещё','уже','очень','тоже','его','её','их','ему','ей','им','он','она','они','мы','вы','ты','нас','вас','нам','вам','когда','если','или','там','тут','где','куда','который','которая','которое','которые','которых','которым','которой','которыми','себя','себе','собой','быть','был','была','было','были','есть','нет','да','ведь','лишь','только','всё','все','всех','всем','всей','всего','такой','такая','такое','такие','потому','поэтому','кто','чем','чём','чего','ним','ней','них','один','одна','одно','одни','одной','одних','одним','одному']);

const GENERIC_FILLER = new Set(['помогает','помогло','начал','начала','начали','вижу','вижу','чувствую','кажется','стараюсь','пытаюсь','хочу','хочет','буду','будет','можно','нужно','нравится','стало','является','являются','можем','смогу','делаю','делает','говорю','говорит','думаю','думает','знаю','знает']);

// Слова, которые формально совпадают с темой категории, но сами по себе — не тезис (просто глагол-самоотсылка).
// Такие слова не должны становиться единственным словом узла — им всегда нужен сосед по смыслу.
const WEAK_ANCHORS = new Set(['учусь','учится','работаю','работает','занимаюсь','занимается','увлекаюсь','увлекается','провожу','играю','смотрю','читаю','являюсь']);

const CATEGORY_KEYWORDS = {
  'Работа и учёба': ['работ','учё','учус','проект','клиент','должност','карьер','профессионал','начальник','коллег','бизнес','продаж','юрист','подбор','производств','задач','менеджер','студент','универ','диплом'],
  'Увлечения': ['увлека','хобби','игра','играю','занима','трейдинг','шахмат','спорт','рисова','готов','путешеств','музык','творчеств','фотограф'],
  'Люди рядом': ['друз','семь','брат','сестр','партнер','парен','девушк','муж','жена','родител','отношени','близк'],
  'Ценности': ['важно','ценю','принцип','раздража','не люблю','терпеть не могу','верю','считаю','смысл','честност'],
  'Медиа и мысли': ['читаю','смотрю','книг','фильм','сериал','подкаст','антиутоп','истори'],
};

function cleanToken(w){
  return w.replace(/[^\p{L}\p{N}]/gu, '');
}

function splitIntoClauses(text){
  const rawSentences = text.split(/(?<=[.!?])\s+|\n+/).map(s=>s.trim()).filter(Boolean);
  let clauses = [];
  rawSentences.forEach(s=>{
    const wordCount = s.split(/\s+/).filter(Boolean).length;
    if(wordCount > 14 && s.includes(',')){
      clauses.push(...s.split(',').map(c=>c.trim()).filter(Boolean));
    } else {
      clauses.push(s);
    }
  });
  return clauses.filter(c => c.split(/\s+/).filter(Boolean).length >= 3);
}

function categorize(clause){
  const lower = clause.toLowerCase();
  let best = null, bestScore = 0;
  for(const [cat, words] of Object.entries(CATEGORY_KEYWORDS)){
    let score = 0;
    words.forEach(w => { if(lower.includes(w)) score++; });
    if(score > bestScore){ bestScore = score; best = cat; }
  }
  return best || 'О себе';
}

function wordImportance(rawWord){
  const token = cleanToken(rawWord);
  if(!token) return { token: '', score: -1 };
  const lower = token.toLowerCase();
  if(STOPWORDS.has(lower)) return { token, score: -1 };
  if(GENERIC_FILLER.has(lower)) return { token, score: 0 };

  let score = 1;
  for(const words of Object.values(CATEGORY_KEYWORDS)){
    if(words.some(w => lower.includes(w))){ score += 5; break; }
  }
  if(/^[A-ZА-Я]{2,}$/.test(token)) score += 4; // acronyms like CS
  else if(/^[A-ZА-Я]/.test(rawWord) && lower !== rawWord.toLowerCase()) score += 1; // capitalized proper-noun-ish
  if(token.length >= 9) score += 3;
  else if(token.length >= 6) score += 2;
  else if(token.length <= 2) score -= 1;

  return { token, score };
}

function makeLabel(clause){
  const rawWords = clause.split(/\s+/).filter(Boolean);
  const scored = rawWords.map((w, i) => ({ ...wordImportance(w), pos: i }))
    .filter(w => w.token && w.score >= 0);

  if(scored.length === 0){
    const fallback = rawWords.map(cleanToken).filter(Boolean).slice(0, 2).join(' ');
    return capitalizeLabel(fallback) || clause.slice(0, 30);
  }

  const sorted = [...scored].sort((a,b) => (b.score - a.score) || (b.token.length - a.token.length));
  const top = sorted[0];
  const KEYWORD_THRESHOLD = 6;
  const topIsWeak = WEAK_ANCHORS.has(top.token.toLowerCase());

  let chosenWords;
  if(top.score >= KEYWORD_THRESHOLD && !topIsWeak){
    chosenWords = [top];
  } else if(sorted.length >= 2){
    chosenWords = [sorted[0], sorted[1]].sort((a,b) => a.pos - b.pos);
  } else {
    chosenWords = [top];
  }

  const label = chosenWords.map(w => w.token).join(' ');
  return capitalizeLabel(label) || clause.slice(0, 30);
}

function capitalizeLabel(label){
  if(!label) return label;
  return label[0].toUpperCase() + label.slice(1);
}

function extractGraphLocally(text){
  const clauses = splitIntoClauses(text);
  const usable = clauses.length ? clauses : [text];

  const leafNodes = [];
  const seenLabels = new Set();
  usable.forEach((clause, i) => {
    const cluster = categorize(clause);
    let label = makeLabel(clause);
    let uniqueLabel = label;
    let dupeCount = 1;
    while(seenLabels.has(uniqueLabel.toLowerCase())){
      dupeCount++;
      uniqueLabel = label + ' ' + dupeCount;
    }
    seenLabels.add(uniqueLabel.toLowerCase());
    const weight = Math.min(3, 1 + Math.floor(clause.split(/\s+/).length / 8));
    leafNodes.push({ id: 'n' + i, label: uniqueLabel, cluster, weight });
  });

  const clusters = [...new Set(leafNodes.map(n => n.cluster))];
  const nodes = [];
  const edges = [];

  clusters.forEach((cluster, ci) => {
    const members = leafNodes.filter(n => n.cluster === cluster);
    if(members.length >= 2){
      // Хаб — главная точка темы, к которой цепляются все её узлы.
      const hubId = 'hub' + ci;
      nodes.push({ id: hubId, label: cluster, cluster, weight: 3, isHub: true });
      members.forEach(m => {
        nodes.push(m);
        edges.push({ source: hubId, target: m.id });
      });
    } else {
      // Один узел в теме — хаб не нужен, он сам себе главная точка.
      nodes.push(...members);
    }
  });

  return { clusters, nodes, edges };
}

async function buildGraph(text){
  await new Promise(r => setTimeout(r, 400)); // brief pause so the loading state doesn't flash

  let parsed = null;
  try{
    parsed = extractGraphLocally(text);
    if(!parsed.nodes.length) throw new Error('empty');
  }catch(e){
    console.error('local extraction failed', e);
    state.error = 'Не получилось разобрать текст. Попробуй переформулировать несколькими отдельными предложениями.';
    state.screen = 'story';
    render();
    return;
  }

  state.graph = parsed;
  state.saveStatus = 'saving';
  render();

  try{
    await saveUserGraph(state.user.uid, text, parsed);
    state.saveStatus = 'saved';
  }catch(e){
    console.error('save failed', e);
    state.saveStatus = 'error';
    state.saveError = e.message;
  }

  state.screen = 'result';
  render();
}

const PALETTE = ['#7c9eff','#4fd8c4','#ff8fa3','#c792ea','#ffb37a','#7fe0a0','#6fb8ff'];
// Грубое сравнение по основе слова — устойчиво к русским окончаниям
// ("шахматы" находит "шахматами", "шахматист" и т.п.), без словаря синонимов.
function stemMatch(a, b, minLen){
  minLen = minLen || 4;
  const la = a.toLowerCase(), lb = b.toLowerCase();
  if(la === lb) return true;
  const cut = Math.min(6, la.length, lb.length);
  if(cut < minLen) return false;
  return la.slice(0, cut) === lb.slice(0, cut);
}

function labelMatchesQuery(label, query){
  const queryWords = query.toLowerCase().split(/\s+/).filter(Boolean);
  const labelWords = label.toLowerCase().split(/\s+/).filter(Boolean);
  return queryWords.some(qw => labelWords.some(lw => stemMatch(qw, lw)));
}

function colorForCluster(clusterName, clusters){
  const idx = clusters.indexOf(clusterName);
  return PALETTE[idx % PALETTE.length] || '#888';
}

// ---------------- совместимость между людьми ----------------
// Фиксированный список тем — чтобы сравнивать распределения по одинаковым осям,
// даже если у кого-то в графе какой-то темы вообще нет.
const ALL_CLUSTERS = [...Object.keys(CATEGORY_KEYWORDS), 'О себе'];

function clusterDistribution(graph){
  const leaf = (graph.nodes || []).filter(n => !n.isHub);
  const totals = {};
  ALL_CLUSTERS.forEach(c => totals[c] = 0);
  let sum = 0;
  leaf.forEach(n => {
    const w = n.weight || 1;
    totals[n.cluster] = (totals[n.cluster] || 0) + w;
    sum += w;
  });
  if(sum > 0){ ALL_CLUSTERS.forEach(c => totals[c] = totals[c] / sum); }
  return totals;
}

function normalizeLabelTokens(label){
  return label.toLowerCase().split(/\s+/).map(cleanToken).filter(t => t.length >= 4 && !STOPWORDS.has(t));
}

// Считает процент совместимости в два слоя:
// 1) насколько похоже распределение по темам (работа/увлечения/люди/ценности/медиа) —
//    ловит "похоже по сути", даже если конкретные слова разные (Паразиты vs антиутопии — оба в "Медиа и мысли").
// 2) бонус за реально совпадающие или пересекающиеся по словам конкретные узлы.
// Итог — оценка, а не точное измерение, поэтому специально не даём 100% почти никогда.
function computeCompatibility(graphA, graphB){
  if(!graphA || !graphB || !(graphA.nodes||[]).length || !(graphB.nodes||[]).length){
    return { percent: 0, sharedClusters: [], matches: [] };
  }

  const distA = clusterDistribution(graphA);
  const distB = clusterDistribution(graphB);
  let overlapSum = 0;
  const sharedClusters = [];
  ALL_CLUSTERS.forEach(c => {
    const m = Math.min(distA[c], distB[c]);
    overlapSum += m;
    if(m > 0.08) sharedClusters.push(c);
  });

  const leafA = (graphA.nodes||[]).filter(n => !n.isHub);
  const leafB = (graphB.nodes||[]).filter(n => !n.isHub);
  const usedB = new Set();
  const matches = [];
  let bonus = 0;

  leafA.forEach(a => {
    const aLower = a.label.toLowerCase();
    const hit = leafB.find(b => !usedB.has(b.id) && b.label.toLowerCase() === aLower);
    if(hit){ usedB.add(hit.id); matches.push({ a: a.label, b: hit.label, type: 'exact' }); bonus += 1; }
  });
  leafA.forEach(a => {
    if(matches.some(m => m.a === a.label)) return;
    const aTokens = normalizeLabelTokens(a.label);
    if(!aTokens.length) return;
    const hit = leafB.find(b => !usedB.has(b.id) && normalizeLabelTokens(b.label).some(t => aTokens.includes(t)));
    if(hit){ usedB.add(hit.id); matches.push({ a: a.label, b: hit.label, type: 'related' }); bonus += 0.4; }
  });

  const percent = Math.round(Math.max(0, Math.min(100, overlapSum * 70 + Math.min(30, bonus * 6))));
  return { percent, sharedClusters, matches };
}

function drawGraph(container, graph){
  const width = container.clientWidth || 960;
  const height = container.clientHeight || 460;
  const padding = 24;
  const svg = d3.select(container).append('svg')
    .attr('width', '100%').attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

  const nodes = graph.nodes.map(n => ({ ...n, r: n.isHub ? 30 : (9 + (n.weight||1)*8) }));
  const nodeIds = new Set(nodes.map(n=>n.id));
  const links = (graph.edges || []).filter(e => nodeIds.has(e.source) && nodeIds.has(e.target)).map(e => ({...e}));

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d => 90 + Math.max(d.source.label?.length||0, d.target.label?.length||0)*2.6).strength(0.55))
    .force('charge', d3.forceManyBody().strength(d => d.isHub ? -700 : -420))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collide', d3.forceCollide(d => d.r + d.label.length * 3.6 + 6));

  const link = svg.append('g').selectAll('line')
    .data(links).enter().append('line')
    .attr('stroke', 'var(--edge)')
    .attr('stroke-width', 1)
    .attr('opacity', 0.6);

  const node = svg.append('g').selectAll('circle')
    .data(nodes).enter().append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => d.isHub ? colorForCluster(d.cluster, graph.clusters) + '26' : '#0f1424')
    .attr('stroke', d => colorForCluster(d.cluster, graph.clusters))
    .attr('stroke-width', d => d.isHub ? 3 : 2.5)
    .call(d3.drag()
      .on('start', (event,d)=>{ if(!event.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (event,d)=>{ d.fx=event.x; d.fy=event.y; })
      .on('end', (event,d)=>{ if(!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  const label = svg.append('g').selectAll('text')
    .data(nodes).enter().append('text')
    .attr('font-size', d => d.isHub ? 13 : 11)
    .attr('font-weight', d => d.isHub ? 700 : 400)
    .attr('fill', d => d.isHub ? '#f5f7fc' : '#c3c9de')
    .attr('text-anchor','middle')
    .attr('dy', d => -(d.r + 8))
    .text(d => d.label);

  sim.on('tick', () => {
    nodes.forEach(d => {
      d.x = Math.max(padding + d.r, Math.min(width - padding - d.r, d.x));
      d.y = Math.max(padding + d.r + 14, Math.min(height - padding - d.r, d.y));
    });
    link
      .attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)
      .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
    node.attr('cx', d=>d.x).attr('cy', d=>d.y);
    label.attr('x', d=>d.x).attr('y', d=>d.y);
  });
}

        state.graph = data.graph || null;
        state.text = data.text || '';
        state.profile = data.profile || null;
        state.isAdmin = data.isAdmin === true;
        if(state.screen === 'landing'){ state.screen = state.graph ? 'result' : 'story'; }
        refreshNotificationCounts().then(render);
        startNotificationPolling();
      }catch(e){ console.error('session restore failed', e); }
    }
    render();
  });
} else {
  render();
}
</script>
</body>
</html>
