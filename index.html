<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Схема о себе</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #0b0f19;
    --bg-soft: #111827;
    --panel: #161d2e;
    --line: #262f45;
    --ink: #e8ecf7;
    --ink-dim: #8892ad;
    --gold: #f2c14e;
    --edge: #4b3f78;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(ellipse at 30% 0%, #131a2c 0%, var(--bg) 55%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .wrap{
    max-width: 820px;
    margin: 0 auto;
    padding: 64px 24px 80px;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
  }
  .wrap.wide{ max-width: 1040px; }
  .eyebrow{
    font-family:'Space Grotesk',sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 18px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: clamp(30px, 5.5vw, 48px);
    line-height: 1.08;
    margin: 0 0 20px;
    letter-spacing: -0.01em;
  }
  h1 span{ color: var(--gold); }
  p.lead{
    font-size: 16px;
    line-height: 1.6;
    color: #c3c9de;
    max-width: 600px;
    margin: 0 0 32px;
  }
  .btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 600;
    font-size: 15px;
    background: var(--gold);
    color: #1a1406;
    border: none;
    padding: 14px 26px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{ transform: translateY(-1px); box-shadow: 0 6px 24px rgba(242,193,78,0.25); }
  .btn.ghost{
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn.ghost:hover{ border-color: var(--gold); box-shadow:none; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .hero-graph{ width:100%; height: 200px; margin: 4px 0 8px; opacity:.9; }

  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px;
  }

  textarea{
    width:100%;
    min-height: 220px;
    background: var(--bg-soft);
    border:1px solid var(--line);
    color: var(--ink);
    padding: 18px;
    border-radius: 12px;
    font-size: 15.5px;
    line-height: 1.55;
    font-family:'Inter',sans-serif;
    resize: vertical;
    margin-bottom: 14px;
  }
  textarea:focus{ outline:none; border-color: var(--gold); }

  input[type=text]{
    width:100%;
    background: var(--bg-soft);
    border:1px solid var(--line);
    color: var(--ink);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 16px;
    font-family:'Inter',sans-serif;
    margin-bottom: 18px;
  }
  input[type=text]:focus{ outline:none; border-color: var(--gold); }

  .counter{ font-size:12px; color: var(--ink-dim); margin-bottom: 18px; }

  .prompts{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 18px; }
  .prompt-chip{
    font-size:12px; color: var(--ink-dim);
    border:1px solid var(--line); border-radius:999px;
    padding: 6px 12px;
    background: var(--bg-soft);
  }

  .footer-note{
    margin-top: auto;
    padding-top: 40px;
    font-size: 13px;
    color: var(--ink-dim);
  }

  .legend{ display:flex; flex-wrap:wrap; gap:10px; margin: 18px 0 4px; }
  .legend-item{
    display:flex; align-items:center; gap:7px;
    font-size:13px; color: var(--ink-dim);
    border:1px solid var(--line); border-radius:999px;
    padding: 6px 12px;
  }
  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; background: transparent; border: 2px solid; box-sizing: border-box; }

  .loading-wrap{
    display:flex; flex-direction:column; align-items:flex-start; gap:14px;
    padding: 40px 0;
  }
  .spinner{
    width: 28px; height:28px; border-radius:50%;
    border: 3px solid var(--line);
    border-top-color: var(--gold);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  svg text{ font-family:'Inter',sans-serif; fill:#c3c9de; font-size:11px; }

  .err{ color:#ef6f8e; font-size:14px; margin-bottom:14px; word-break: break-word; }

  ::selection{ background: var(--gold); color:#1a1406; }

  .nav{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 48px;
  }
  .nav-brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    letter-spacing: -0.01em;
    cursor: pointer;
  }
  .nav-links{ display:flex; gap: 22px; }
  .nav-link{
    font-family:'Space Grotesk',sans-serif;
    font-size: 13px;
    color: var(--ink-dim);
    cursor: pointer;
    background:none; border:none;
    padding: 0;
    transition: color .15s ease;
  }
  .nav-link:hover, .nav-link.active{ color: var(--gold); }

  .people-grid{ display:flex; flex-direction:column; gap:10px; margin-top: 20px; }
  .person-row{
    display:flex; justify-content:space-between; align-items:center;
    background: var(--bg-soft); border:1px solid var(--line);
    border-radius: 12px; padding: 16px 18px;
    cursor:pointer;
    transition: border-color .15s ease;
  }
  .person-row:hover{ border-color: var(--gold); }
  .person-row .name{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; }
  .person-row .meta{ font-size:12px; color: var(--ink-dim); margin-top:3px; }
  .person-row .arrow{ color: var(--ink-dim); font-size:18px; }

  body.space{ background: #000000; }
  body.space .nav-brand, body.space .nav-link{ color: #cfd6e8; }
  body.space .nav-link:hover, body.space .nav-link.active{ color: #ffffff; }
  body.space .eyebrow{ color: #7a83a0; }
  body.space h1 span{ color: #ffffff; }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ---------------- backend (Firebase Firestore) ----------------
// Вставь сюда свои ключи из консоли Firebase (Project settings -> General -> Your apps -> SDK setup).
const firebaseConfig = {
  apiKey: "AIzaSyAni9Eg6fIJoGPD_E5VDLCVuO8yYzCBMIc",
  authDomain: "sozvezdie-3f7e6.firebaseapp.com",
  projectId: "sozvezdie-3f7e6",
  storageBucket: "sozvezdie-3f7e6.firebasestorage.app",
  messagingSenderId: "845619165839",
  appId: "1:845619165839:web:051ce4b807386aa8e38efa"
};

let db = null;
let auth = null;
let firebaseReady = false;
try{
  if(firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('ВСТАВЬ') === -1){
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    firebaseReady = true;
  }
}catch(e){
  console.error('Firebase init failed', e);
}

function backendNotConfiguredError(){
  return new Error('База данных не подключена: вставь конфиг Firebase в начало <script> (переменная firebaseConfig).');
}

// Логины у нас без email, но Firebase Auth умеет только email+пароль,
// поэтому превращаем ник в служебный псевдо-адрес — пользователь его не видит.
function hashUsername(name){
  const s = name.toLowerCase().trim();
  let h = 0;
  for(let i = 0; i < s.length; i++){
    h = (h * 31 + s.codePointAt(i)) >>> 0;
  }
  return h.toString(36) + s.length.toString(36);
}
function usernameToEmail(name){
  return 'u' + hashUsername(name) + '@sozvezdie.local';
}

async function registerUser(username, password){
  if(!firebaseReady) throw backendNotConfiguredError();
  const email = usernameToEmail(username);
  let cred;
  try{
    cred = await auth.createUserWithEmailAndPassword(email, password);
  }catch(e){
    if(e.code === 'auth/email-already-in-use') throw new Error('Это имя уже занято — выбери другое.');
    if(e.code === 'auth/weak-password') throw new Error('Пароль слишком короткий — минимум 6 символов.');
    throw new Error(e.message);
  }
  await db.collection('users').doc(cred.user.uid).set({ name: username, ts: Date.now() });
  return { uid: cred.user.uid, name: username };
}

async function loginUser(username, password){
  if(!firebaseReady) throw backendNotConfiguredError();
  const email = usernameToEmail(username);
  let cred;
  try{
    cred = await auth.signInWithEmailAndPassword(email, password);
  }catch(e){
    if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password'){
      throw new Error('Неверный логин или пароль.');
    }
    throw new Error(e.message);
  }
  const doc = await db.collection('users').doc(cred.user.uid).get();
  const data = doc.exists ? doc.data() : {};
  return { uid: cred.user.uid, name: data.name || username, graph: data.graph || null, text: data.text || '' };
}

function logoutUser(){
  if(auth) auth.signOut();
}

async function saveUserGraph(uid, text, graph){
  if(!firebaseReady) throw backendNotConfiguredError();
  await db.collection('users').doc(uid).set({ text, graph, ts: Date.now() }, { merge: true });
}

async function fetchAllUsers(){
  if(!firebaseReady) throw backendNotConfiguredError();
  const snap = await db.collection('users').orderBy('ts', 'desc').get();
  return snap.docs.map(d => d.data()).filter(u => u.graph);
}

// ---------------- state ----------------
const root = document.getElementById('root');
let state = { screen: 'landing', user: null, text: '', graph: null, error: '', authMode: 'login' };

function render(){
  root.innerHTML = '';
  document.body.classList.toggle('space', state.screen === 'landing');
  if(state.screen === 'landing') renderLanding();
  else if(state.screen === 'auth') renderAuth();
  else if(state.screen === 'story') renderStory();
  else if(state.screen === 'loading') renderLoading();
  else if(state.screen === 'result') renderResult();
  else if(state.screen === 'people') renderPeople();
  else if(state.screen === 'personView') renderPersonView();
}

function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}

function heroGraphSVG(){
  return `<svg viewBox="0 0 700 220" class="hero-graph" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#ffffff" stroke-width="1" opacity="0.35">
      <line x1="120" y1="70" x2="260" y2="110"/>
      <line x1="260" y1="110" x2="420" y2="55"/>
      <line x1="260" y1="110" x2="380" y2="165"/>
      <line x1="420" y1="55" x2="560" y2="95"/>
      <line x1="380" y1="165" x2="560" y2="95"/>
      <line x1="120" y1="70" x2="55" y2="145"/>
      <line x1="380" y1="165" x2="495" y2="180"/>
      <line x1="260" y1="110" x2="175" y2="160"/>
      <line x1="560" y1="95" x2="640" y2="60"/>
      <line x1="55" y1="145" x2="20" y2="80"/>
    </g>
    <g fill="#ffffff">
      <circle cx="120" cy="70" r="2.5" opacity="0.9"/>
      <circle cx="260" cy="110" r="3.5" opacity="1"/>
      <circle cx="420" cy="55" r="2" opacity="0.8"/>
      <circle cx="380" cy="165" r="2.8" opacity="0.9"/>
      <circle cx="560" cy="95" r="2.3" opacity="0.85"/>
      <circle cx="55" cy="145" r="1.8" opacity="0.7"/>
      <circle cx="495" cy="180" r="1.6" opacity="0.6"/>
      <circle cx="175" cy="160" r="1.6" opacity="0.6"/>
      <circle cx="640" cy="60" r="1.4" opacity="0.5"/>
      <circle cx="20" cy="80" r="1.4" opacity="0.5"/>
      <circle cx="610" cy="150" r="1.2" opacity="0.4"/>
      <circle cx="320" cy="30" r="1.2" opacity="0.4"/>
      <circle cx="30" cy="190" r="1.2" opacity="0.4"/>
      <circle cx="470" cy="20" r="1.1" opacity="0.35"/>
    </g>
  </svg>`;
}

// ---------------- screens ----------------
function renderNav(active){
  const nav = el('div','nav');
  const brand = el('div','nav-brand','Схема о себе');
  brand.onclick = () => { state.screen='landing'; render(); };
  const links = el('div','nav-links');

  if(state.user){
    const myLink = el('button','nav-link' + (active==='mine' ? ' active' : ''), state.graph ? 'Моя схема' : 'Написать о себе');
    myLink.onclick = () => { state.screen = state.graph ? 'result' : 'story'; render(); };
    const peopleLink = el('button','nav-link' + (active==='people' ? ' active' : ''), 'Люди');
    peopleLink.onclick = () => { openPeople(); };
    const logoutLink = el('button','nav-link','Выйти');
    logoutLink.onclick = () => {
      logoutUser();
      state = { screen: 'landing', user: null, text: '', graph: null, error: '', authMode: 'login' };
      render();
    };
    links.appendChild(myLink);
    links.appendChild(peopleLink);
    links.appendChild(logoutLink);
  } else {
    const loginLink = el('button','nav-link','Войти');
    loginLink.onclick = () => { state.authMode = 'login'; state.error=''; state.screen='auth'; render(); };
    const registerLink = el('button','nav-link','Регистрация');
    registerLink.onclick = () => { state.authMode = 'register'; state.error=''; state.screen='auth'; render(); };
    links.appendChild(loginLink);
    links.appendChild(registerLink);
  }

  nav.appendChild(brand);
  nav.appendChild(links);
  return nav;
}

async function openPeople(){
  state.screen = 'people';
  state.peopleLoading = true;
  state.peopleError = '';
  render();
  try{
    state.people = await fetchAllUsers();
  }catch(e){
    console.error('people list failed', e);
    state.people = [];
    state.peopleError = e.message;
  }
  state.peopleLoading = false;
  render();
}

function renderPeople(){
  const w = el('div','wrap');
  w.appendChild(renderNav('people'));
  w.appendChild(el('h1','', 'Люди'));

  const card = el('div','card');
  if(state.peopleLoading){
    card.appendChild(el('div','footer-note','Загружаем…'));
  } else if(state.peopleError){
    card.appendChild(el('div','err', state.peopleError));
  } else if(!state.people || state.people.length === 0){
    card.appendChild(el('div','empty','Пока никого нет. Будь первой.'));
  } else {
    const grid = el('div','people-grid');
    state.people.forEach(p => {
      const row = el('div','person-row');
      const left = el('div');
      left.appendChild(el('div','name', p.name));
      left.appendChild(el('div','meta', (p.graph.nodes||[]).length + ' узлов · ' + (p.graph.clusters||[]).length + ' кластеров'));
      row.appendChild(left);
      row.appendChild(el('div','arrow','→'));
      row.onclick = () => { state.selectedPerson = p; state.screen = 'personView'; render(); };
      grid.appendChild(row);
    });
    card.appendChild(grid);
  }
  w.appendChild(card);
  root.appendChild(w);
}

function renderPersonView(){
  const p = state.selectedPerson;
  const w = el('div','wrap wide');
  w.appendChild(renderNav('people'));
  const back = el('button','btn ghost','← Ко всем людям');
  back.style.marginBottom = '20px';
  back.onclick = () => { state.screen = 'people'; render(); };
  w.appendChild(back);
  w.appendChild(el('div','eyebrow', 'Схема — ' + p.name));
  w.appendChild(el('h1','', p.name));

  const legend = el('div','legend');
  (p.graph.clusters || []).forEach(c=>{
    const item = el('div','legend-item');
    const dot = el('span','dot');
    dot.style.borderColor = colorForCluster(c, p.graph.clusters);
    item.appendChild(dot);
    item.appendChild(el('span','', c));
    legend.appendChild(item);
  });
  w.appendChild(legend);

  const card = el('div','card');
  const svgWrap = document.createElement('div');
  svgWrap.style.width = '100%';
  svgWrap.style.height = '460px';
  card.appendChild(svgWrap);
  w.appendChild(card);
  root.appendChild(w);
  drawGraph(svgWrap, p.graph);
}

function renderLanding(){
  const w = el('div','wrap');
  w.appendChild(renderNav('landing'));
  w.appendChild(el('div','eyebrow','Схема о себе'));
  const h = el('h1'); h.innerHTML = 'Опиши себя.<br>Получи <span>схему</span>.';
  w.appendChild(h);
  w.appendChild(el('div','', heroGraphSVG()));
  const btn = el('button','btn', state.user ? 'Продолжить →' : 'Начать →');
  btn.onclick = () => {
    if(state.user){ state.screen = state.graph ? 'result' : 'story'; }
    else { state.authMode = 'register'; state.screen = 'auth'; }
    render();
  };
  w.appendChild(btn);
  root.appendChild(w);
}

function renderAuth(){
  const w = el('div','wrap');
  w.appendChild(renderNav('auth'));
  const isLogin = state.authMode === 'login';
  w.appendChild(el('h1','', isLogin ? 'Вход' : 'Регистрация'));

  const card = el('div','card');
  if(state.error) card.appendChild(el('div','err', state.error));

  const userInput = document.createElement('input');
  userInput.type = 'text'; userInput.placeholder = 'Логин'; userInput.maxLength = 30;
  card.appendChild(userInput);

  const passInput = document.createElement('input');
  passInput.type = 'password'; passInput.placeholder = 'Пароль';
  card.appendChild(passInput);

  const btn = el('button','btn', isLogin ? 'Войти →' : 'Зарегистрироваться →');
  btn.onclick = async () => {
    const username = userInput.value.trim();
    const password = passInput.value;
    if(!username || !password){
      state.error = 'Заполни логин и пароль.';
      render();
      return;
    }
    state.error = '';
    btn.disabled = true;
    btn.textContent = 'Подождите…';
    try{
      const user = isLogin ? await loginUser(username, password) : await registerUser(username, password);
      state.user = { uid: user.uid, name: user.name };
      state.graph = user.graph || null;
      state.text = user.text || '';
      state.screen = state.graph ? 'result' : 'story';
      render();
    }catch(e){
      state.error = e.message;
      render();
    }
  };
  passInput.addEventListener('keydown', e=>{ if(e.key==='Enter') btn.click(); });
  card.appendChild(btn);

  const switchLink = el('button','nav-link', isLogin ? 'Ещё нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти');
  switchLink.style.marginTop = '18px';
  switchLink.onclick = () => { state.authMode = isLogin ? 'register' : 'login'; state.error=''; render(); };
  card.appendChild(switchLink);

  w.appendChild(card);
  root.appendChild(w);
}

function renderStory(){
  const w = el('div','wrap');
  w.appendChild(renderNav('mine'));
  w.appendChild(el('h1','', 'Теперь — о себе.'));

  const chips = el('div','prompts');
  ['работа и то, что в ней держит','увлечения и как проводишь свободное время','что читаешь / смотришь','ценности и то, что раздражает','отношения и люди рядом']
    .forEach(t=>chips.appendChild(el('span','prompt-chip', t)));
  w.appendChild(chips);

  const card = el('div','card');
  if(state.error) card.appendChild(el('div','err', state.error));
  const ta = document.createElement('textarea');
  ta.placeholder = 'Например: чем занимаюсь по работе или учёбе, что делаю в свободное время, что читаю или смотрю, что для меня важно в людях, а что раздражает...';
  ta.value = state.text;
  card.appendChild(ta);
  const counter = el('div','counter','0 символов');
  card.appendChild(counter);
  ta.addEventListener('input', ()=>{ counter.textContent = ta.value.length + ' символов'; });

  const btn = el('button','btn','Построить граф →');
  btn.onclick = () => {
    const val = ta.value.trim();
    if(!val){
      state.error = 'Напиши хоть что-нибудь — даже пару слов.';
      render();
      return;
    }
    state.error = '';
    state.text = val;
    state.screen = 'loading';
    render();
    buildGraph(val);
  };
  card.appendChild(btn);
  w.appendChild(card);
  root.appendChild(w);
}

function renderLoading(){
  const w = el('div','wrap');
  w.appendChild(el('h1','', 'Читаем и раскладываем по темам…'));
  const lw = el('div','loading-wrap');
  lw.appendChild(el('div','spinner'));
  w.appendChild(lw);
  root.appendChild(w);
}

const STOPWORDS = new Set(['я','и','в','во','на','с','со','что','чтобы','это','эта','эти','этот','этом','этой','этих','эту','меня','мне','мной','мой','моя','моё','мои','моего','моей','моих','к','ко','по','из','изо','у','а','но','как','то','же','бы','для','от','ото','до','об','обо','о','не','ни','так','вот','ещё','уже','очень','тоже','его','её','их','ему','ей','им','он','она','они','мы','вы','ты','нас','вас','нам','вам','когда','если','или','там','тут','где','куда','который','которая','которое','которые','которых','которым','которой','которыми','себя','себе','собой','быть','был','была','было','были','есть','нет','да','ведь','лишь','только','всё','все','всех','всем','всей','всего','такой','такая','такое','такие','потому','поэтому','кто','чем','чём','чего','ним','ней','них','один','одна','одно','одни','одной','одних','одним','одному']);

const GENERIC_FILLER = new Set(['помогает','помогло','начал','начала','начали','вижу','вижу','чувствую','кажется','стараюсь','пытаюсь','хочу','хочет','буду','будет','можно','нужно','нравится','стало','является','являются','можем','смогу','делаю','делает','говорю','говорит','думаю','думает','знаю','знает']);

// Слова, которые формально совпадают с темой категории, но сами по себе — не тезис (просто глагол-самоотсылка).
// Такие слова не должны становиться единственным словом узла — им всегда нужен сосед по смыслу.
const WEAK_ANCHORS = new Set(['учусь','учится','работаю','работает','занимаюсь','занимается','увлекаюсь','увлекается','провожу','играю','смотрю','читаю','являюсь']);

const CATEGORY_KEYWORDS = {
  'Работа и учёба': ['работ','учё','учус','проект','клиент','должност','карьер','профессионал','начальник','коллег','бизнес','продаж','юрист','подбор','производств','задач','менеджер','студент','универ','диплом'],
  'Увлечения': ['увлека','хобби','игра','играю','занима','трейдинг','шахмат','спорт','рисова','готов','путешеств','музык','творчеств','фотограф'],
  'Люди рядом': ['друз','семь','брат','сестр','партнер','парен','девушк','муж','жена','родител','отношени','близк'],
  'Ценности': ['важно','ценю','принцип','раздража','не люблю','терпеть не могу','верю','считаю','смысл','честност'],
  'Медиа и мысли': ['читаю','смотрю','книг','фильм','сериал','подкаст','антиутоп','истори'],
};

function cleanToken(w){
  return w.replace(/[^\p{L}\p{N}]/gu, '');
}

function splitIntoClauses(text){
  const rawSentences = text.split(/(?<=[.!?])\s+|\n+/).map(s=>s.trim()).filter(Boolean);
  let clauses = [];
  rawSentences.forEach(s=>{
    const wordCount = s.split(/\s+/).filter(Boolean).length;
    if(wordCount > 14 && s.includes(',')){
      clauses.push(...s.split(',').map(c=>c.trim()).filter(Boolean));
    } else {
      clauses.push(s);
    }
  });
  return clauses.filter(c => c.split(/\s+/).filter(Boolean).length >= 3);
}

function categorize(clause){
  const lower = clause.toLowerCase();
  let best = null, bestScore = 0;
  for(const [cat, words] of Object.entries(CATEGORY_KEYWORDS)){
    let score = 0;
    words.forEach(w => { if(lower.includes(w)) score++; });
    if(score > bestScore){ bestScore = score; best = cat; }
  }
  return best || 'О себе';
}

function wordImportance(rawWord){
  const token = cleanToken(rawWord);
  if(!token) return { token: '', score: -1 };
  const lower = token.toLowerCase();
  if(STOPWORDS.has(lower)) return { token, score: -1 };
  if(GENERIC_FILLER.has(lower)) return { token, score: 0 };

  let score = 1;
  for(const words of Object.values(CATEGORY_KEYWORDS)){
    if(words.some(w => lower.includes(w))){ score += 5; break; }
  }
  if(/^[A-ZА-Я]{2,}$/.test(token)) score += 4; // acronyms like CS
  else if(/^[A-ZА-Я]/.test(rawWord) && lower !== rawWord.toLowerCase()) score += 1; // capitalized proper-noun-ish
  if(token.length >= 9) score += 3;
  else if(token.length >= 6) score += 2;
  else if(token.length <= 2) score -= 1;

  return { token, score };
}

function makeLabel(clause){
  const rawWords = clause.split(/\s+/).filter(Boolean);
  const scored = rawWords.map((w, i) => ({ ...wordImportance(w), pos: i }))
    .filter(w => w.token && w.score >= 0);

  if(scored.length === 0){
    const fallback = rawWords.map(cleanToken).filter(Boolean).slice(0, 2).join(' ');
    return capitalizeLabel(fallback) || clause.slice(0, 30);
  }

  const sorted = [...scored].sort((a,b) => (b.score - a.score) || (b.token.length - a.token.length));
  const top = sorted[0];
  const KEYWORD_THRESHOLD = 6;
  const topIsWeak = WEAK_ANCHORS.has(top.token.toLowerCase());

  let chosenWords;
  if(top.score >= KEYWORD_THRESHOLD && !topIsWeak){
    chosenWords = [top];
  } else if(sorted.length >= 2){
    chosenWords = [sorted[0], sorted[1]].sort((a,b) => a.pos - b.pos);
  } else {
    chosenWords = [top];
  }

  const label = chosenWords.map(w => w.token).join(' ');
  return capitalizeLabel(label) || clause.slice(0, 30);
}

function capitalizeLabel(label){
  if(!label) return label;
  return label[0].toUpperCase() + label.slice(1);
}

function extractGraphLocally(text){
  const clauses = splitIntoClauses(text);
  const usable = clauses.length ? clauses : [text];

  const leafNodes = [];
  const seenLabels = new Set();
  usable.forEach((clause, i) => {
    const cluster = categorize(clause);
    let label = makeLabel(clause);
    let uniqueLabel = label;
    let dupeCount = 1;
    while(seenLabels.has(uniqueLabel.toLowerCase())){
      dupeCount++;
      uniqueLabel = label + ' ' + dupeCount;
    }
    seenLabels.add(uniqueLabel.toLowerCase());
    const weight = Math.min(3, 1 + Math.floor(clause.split(/\s+/).length / 8));
    leafNodes.push({ id: 'n' + i, label: uniqueLabel, cluster, weight });
  });

  const clusters = [...new Set(leafNodes.map(n => n.cluster))];
  const nodes = [];
  const edges = [];

  clusters.forEach((cluster, ci) => {
    const members = leafNodes.filter(n => n.cluster === cluster);
    if(members.length >= 2){
      // Хаб — главная точка темы, к которой цепляются все её узлы.
      const hubId = 'hub' + ci;
      nodes.push({ id: hubId, label: cluster, cluster, weight: 3, isHub: true });
      members.forEach(m => {
        nodes.push(m);
        edges.push({ source: hubId, target: m.id });
      });
    } else {
      // Один узел в теме — хаб не нужен, он сам себе главная точка.
      nodes.push(...members);
    }
  });

  return { clusters, nodes, edges };
}

async function buildGraph(text){
  await new Promise(r => setTimeout(r, 400)); // brief pause so the loading state doesn't flash

  let parsed = null;
  try{
    parsed = extractGraphLocally(text);
    if(!parsed.nodes.length) throw new Error('empty');
  }catch(e){
    console.error('local extraction failed', e);
    state.error = 'Не получилось разобрать текст. Попробуй переформулировать несколькими отдельными предложениями.';
    state.screen = 'story';
    render();
    return;
  }

  state.graph = parsed;
  state.saveStatus = 'saving';
  render();

  try{
    await saveUserGraph(state.user.uid, text, parsed);
    state.saveStatus = 'saved';
  }catch(e){
    console.error('save failed', e);
    state.saveStatus = 'error';
    state.saveError = e.message;
  }

  state.screen = 'result';
  render();
}

const PALETTE = ['#e8935c','#4fc9b8','#ef6f8e','#e8c25c','#8c9eff','#c792ea','#7fd88f'];
function colorForCluster(clusterName, clusters){
  const idx = clusters.indexOf(clusterName);
  return PALETTE[idx % PALETTE.length] || '#888';
}

function renderResult(){
  const w = el('div','wrap wide');
  w.appendChild(renderNav('mine'));
  w.appendChild(el('div','eyebrow', `Граф — ${state.user.name}`));
  w.appendChild(el('h1','', 'Вот из чего ты состоишь.'));

  const legend = el('div','legend');
  (state.graph.clusters || []).forEach(c=>{
    const item = el('div','legend-item');
    const dot = el('span','dot');
    dot.style.borderColor = colorForCluster(c, state.graph.clusters);
    item.appendChild(dot);
    item.appendChild(el('span','', c));
    legend.appendChild(item);
  });
  w.appendChild(legend);

  if(state.saveStatus === 'saving'){
    w.appendChild(el('div','footer-note','Сохраняем…'));
  } else if(state.saveStatus === 'saved'){
    w.appendChild(el('div','footer-note','Сохранено ✓ — теперь твоя схема видна во вкладке «Люди».'));
  } else if(state.saveStatus === 'error'){
    w.appendChild(el('div','err','Не сохранилось: ' + state.saveError));
  }

  const card = el('div','card');
  const svgWrap = document.createElement('div');
  svgWrap.style.width = '100%';
  svgWrap.style.height = '460px';
  card.appendChild(svgWrap);
  w.appendChild(card);

  const row = el('div','');
  row.style.display='flex'; row.style.gap='12px'; row.style.marginTop='20px'; row.style.flexWrap='wrap';
  const editBtn = el('button','btn ghost','Переписать текст о себе');
  editBtn.onclick = () => { state.screen='story'; render(); };
  const logoutBtn = el('button','btn ghost','Выйти');
  logoutBtn.onclick = () => {
    logoutUser();
    state = { screen: 'landing', user: null, text: '', graph: null, error: '', authMode: 'login' };
    render();
  };
  row.appendChild(editBtn);
  row.appendChild(logoutBtn);
  w.appendChild(row);

  root.appendChild(w);
  drawGraph(svgWrap, state.graph);
}

function drawGraph(container, graph){
  const width = container.clientWidth || 960;
  const height = 460;
  const padding = 24;
  const svg = d3.select(container).append('svg')
    .attr('width', '100%').attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

  const nodes = graph.nodes.map(n => ({ ...n, r: n.isHub ? 20 : (8 + (n.weight||1)*4) }));
  const nodeIds = new Set(nodes.map(n=>n.id));
  const links = (graph.edges || []).filter(e => nodeIds.has(e.source) && nodeIds.has(e.target)).map(e => ({...e}));

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d => 70 + Math.max(d.source.label?.length||0, d.target.label?.length||0)*2.2).strength(0.6))
    .force('charge', d3.forceManyBody().strength(d => d.isHub ? -520 : -300))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collide', d3.forceCollide(d => d.r + d.label.length * 3.6 + 6));

  const link = svg.append('g').selectAll('line')
    .data(links).enter().append('line')
    .attr('stroke', 'var(--edge)')
    .attr('stroke-width', 1)
    .attr('opacity', 0.6);

  const node = svg.append('g').selectAll('circle')
    .data(nodes).enter().append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => d.isHub ? colorForCluster(d.cluster, graph.clusters) + '26' : '#0f1424')
    .attr('stroke', d => colorForCluster(d.cluster, graph.clusters))
    .attr('stroke-width', d => d.isHub ? 3 : 2.5)
    .call(d3.drag()
      .on('start', (event,d)=>{ if(!event.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (event,d)=>{ d.fx=event.x; d.fy=event.y; })
      .on('end', (event,d)=>{ if(!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  const label = svg.append('g').selectAll('text')
    .data(nodes).enter().append('text')
    .attr('font-size', d => d.isHub ? 13 : 11)
    .attr('font-weight', d => d.isHub ? 700 : 400)
    .attr('fill', d => d.isHub ? '#f5f7fc' : '#c3c9de')
    .attr('text-anchor','middle')
    .attr('dy', d => -(d.r + 8))
    .text(d => d.label);

  sim.on('tick', () => {
    nodes.forEach(d => {
      d.x = Math.max(padding + d.r, Math.min(width - padding - d.r, d.x));
      d.y = Math.max(padding + d.r + 14, Math.min(height - padding - d.r, d.y));
    });
    link
      .attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)
      .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
    node.attr('cx', d=>d.x).attr('cy', d=>d.y);
    label.attr('x', d=>d.x).attr('y', d=>d.y);
  });
}

if(firebaseReady){
  auth.onAuthStateChanged(async (fbUser) => {
    if(fbUser && !state.user){
      try{
        const doc = await db.collection('users').doc(fbUser.uid).get();
        const data = doc.exists ? doc.data() : {};
        state.user = { uid: fbUser.uid, name: data.name || 'Без имени' };
        state.graph = data.graph || null;
        state.text = data.text || '';
        if(state.screen === 'landing'){ state.screen = state.graph ? 'result' : 'story'; }
      }catch(e){ console.error('session restore failed', e); }
    }
    render();
  });
} else {
  render();
}
</script>
