<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Созвездие</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #0b0f19;
    --bg-soft: #111827;
    --panel: #161d2e;
    --line: #262f45;
    --ink: #e8ecf7;
    --ink-dim: #8892ad;
    --gold: #f2c14e;
    --edge: #4b3f78;
    --bg-glow: #131a2c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(ellipse at 30% 0%, var(--bg-glow) 0%, var(--bg) 55%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .wrap{
    max-width: 820px;
    margin: 0 auto;
    padding: 64px 24px 80px;
    min-height: 100vh;
    display:flex;
    flex-direction:column;
  }
  .wrap.wide{ max-width: 1040px; }
  .eyebrow{
    font-family:'Space Grotesk',sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 18px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: clamp(30px, 5.5vw, 48px);
    line-height: 1.08;
    margin: 0 0 20px;
    letter-spacing: -0.01em;
  }
  h1 span{ color: var(--gold); }
  p.lead{
    font-size: 16px;
    line-height: 1.6;
    color: #c3c9de;
    max-width: 600px;
    margin: 0 0 32px;
  }
  .btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 600;
    font-size: 15px;
    background: var(--gold);
    color: #1a1406;
    border: none;
    padding: 14px 26px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{ transform: translateY(-1px); box-shadow: 0 6px 24px rgba(242,193,78,0.25); }
  .btn.ghost{
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn.ghost:hover{ border-color: var(--gold); box-shadow:none; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .hero-graph{ width:100%; height: 200px; margin: 4px 0 8px; opacity:.9; }

  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px;
  }

  textarea{
    width:100%;
    min-height: 220px;
    background: var(--bg-soft);
    border:1px solid var(--line);
    color: var(--ink);
    padding: 18px;
    border-radius: 12px;
    font-size: 15.5px;
    line-height: 1.55;
    font-family:'Inter',sans-serif;
    resize: vertical;
    margin-bottom: 14px;
  }
  textarea:focus{ outline:none; border-color: var(--gold); }

  input[type=text], input[type=password]{
    width:100%;
    background: var(--bg-soft);
    border:1px solid var(--line);
    color: var(--ink);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 16px;
    font-family:'Inter',sans-serif;
    margin-bottom: 14px;
    display: block;
  }
  input[type=text]:focus, input[type=password]:focus{ outline:none; border-color: var(--gold); }

  select{
    width:100%;
    background: var(--bg-soft);
    border:1px solid var(--line);
    color: var(--ink);
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 15px;
    font-family:'Inter',sans-serif;
    margin-bottom: 14px;
    display: block;
  }
  select:focus{ outline:none; border-color: var(--gold); }

  .counter{ font-size:12px; color: var(--ink-dim); margin-bottom: 18px; }

  .prompts{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 18px; }
  .prompt-chip{
    font-size:12px; color: var(--ink-dim);
    border:1px solid var(--line); border-radius:999px;
    padding: 6px 12px;
    background: var(--bg-soft);
  }

  .footer-note{
    margin-top: auto;
    padding-top: 40px;
    font-size: 13px;
    color: var(--ink-dim);
  }

  .legend{ display:flex; flex-wrap:wrap; gap:10px; margin: 18px 0 4px; }
  .legend-item{
    display:flex; align-items:center; gap:7px;
    font-size:13px; color: var(--ink-dim);
    border:1px solid var(--line); border-radius:999px;
    padding: 6px 12px;
  }
  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; background: transparent; border: 2px solid; box-sizing: border-box; }

  .loading-wrap{
    display:flex; flex-direction:column; align-items:flex-start; gap:14px;
    padding: 40px 0;
  }
  .spinner{
    width: 28px; height:28px; border-radius:50%;
    border: 3px solid var(--line);
    border-top-color: var(--gold);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  svg text{ font-family:'Inter',sans-serif; fill:#c3c9de; font-size:11px; }

  .err{ color:#ef6f8e; font-size:14px; margin-bottom:14px; word-break: break-word; }

  ::selection{ background: var(--gold); color:#1a1406; }

  /* ---------------- темы оформления ---------------- */
  @keyframes theme-shift{
    0%{ background-position: 0% 50%; }
    50%{ background-position: 100% 50%; }
    100%{ background-position: 0% 50%; }
  }
  body[data-theme]::before{
    content: ''; position: fixed; inset: 0; z-index: -1;
  }

  body[data-theme="light"]{
    --bg: #f3f4fa; --bg-soft: #ffffff; --panel: #ffffff; --line: #e1e3ee;
    --ink: #1b2030; --ink-dim: #6b7280; --edge: #d7d9ea;
    --gold: #3457d5; --bg-glow: #f3f4fa;
  }
  body[data-theme="light"] .card, body[data-theme="light"] .nav, body[data-theme="light"] .chat-bubble{
    box-shadow: 0 2px 10px rgba(20,20,40,0.06);
  }

  body[data-theme="nebula"]{
    --gold: #e0559c; --bg: #fdf5f9; --panel: #ffffff; --bg-soft: #ffffff;
    --line: #f0dde8; --ink: #2b1620; --ink-dim: #8a6b78; --bg-glow: #fdf5f9;
  }
  body[data-theme="nebula"] .btn, body[data-theme="nebula"] .chat-bubble.mine, body[data-theme="nebula"] .nav-link.alert{
    color: #ffffff;
  }

  .theme-grid{ display:flex; flex-wrap:wrap; gap:12px; margin-top: 10px; }
  .theme-swatch{
    width: 74px; cursor:pointer; text-align:center; font-size:11px; color: var(--ink-dim);
  }
  .theme-swatch-circle{
    width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 6px;
    border: 2px solid var(--line);
  }
  .theme-swatch.active .theme-swatch-circle{ border-color: var(--gold); box-shadow: 0 0 0 2px rgba(242,193,78,0.3); }
  .theme-swatch.active{ color: var(--ink); font-weight:600; }

  @media (max-width: 640px){
    .wrap{ padding: 20px 16px 60px; }
    .card{ padding: 20px; }
    h1{ font-size: clamp(26px, 8vw, 36px); }
    .nav{ padding: 8px; }
    .nav-link{ font-size: 11px; padding: 6px 9px; }
    .person-row{ flex-wrap: wrap; gap: 10px; }
    .msg-row{ max-width: 88%; }
    .hero-graph{ height: 150px; }
    .call-grid{ flex-direction: column; }
    .call-ctrl-btn-labeled span{ display:none; }
  }

  .nav-wrapper{
    position: sticky; top: 16px; z-index: 50; margin-bottom: 40px;
  }
  .brand-row{ margin-bottom: 10px; }
  .nav{
    display:flex; align-items:center; flex-wrap: wrap;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .nav-brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--ink);
    letter-spacing: -0.01em;
    cursor: pointer;
    display: inline-block;
  }
  .nav-links{ display:flex; gap: 6px; align-items:center; flex-wrap: nowrap; overflow-x: auto; width: 100%; scrollbar-width: none; }
  .nav-links::-webkit-scrollbar{ display:none; }
  .nav-link{
    font-family:'Space Grotesk',sans-serif;
    font-size: 12px;
    color: var(--ink-dim);
    cursor: pointer;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 8px 11px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: color .15s ease, background .15s ease, border-color .15s ease;
    border-radius: 10px;
  }
  .nav-link:hover{ color: var(--gold); border-color: var(--gold); }
  .nav-link.active{ color: var(--gold); border-color: var(--gold); background: color-mix(in srgb, var(--gold) 10%, transparent); }
  .nav-link.alert{
    color: #1a1406;
    background: var(--gold);
    border-color: var(--gold);
    font-weight: 700;
    animation: nav-alert-pulse 1.6s ease-in-out infinite;
  }
  @keyframes nav-alert-pulse{
    0%, 100% { box-shadow: 0 0 0 0 rgba(242,193,78,0.55); }
    50% { box-shadow: 0 0 0 6px rgba(242,193,78,0); }
  }

  .people-grid{ display:flex; flex-direction:column; gap:10px; margin-top: 20px; }
  .person-row{
    display:flex; justify-content:space-between; align-items:center;
    background: var(--bg-soft); border:1px solid var(--line);
    border-radius: 12px; padding: 16px 18px;
    cursor:pointer;
    transition: border-color .15s ease;
  }
  .person-row:hover{ border-color: var(--gold); }
  .person-row .name{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; }
  .person-row .meta{ font-size:12px; color: var(--ink-dim); margin-top:3px; }
  .person-row .arrow{ color: var(--ink-dim); font-size:18px; }
  .compat-badge{
    font-family:'Space Grotesk',sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--gold);
  }
  .meta{ font-size:12px; color: var(--ink-dim); margin-top:4px; }

  .chat-box{
    display:flex; flex-direction:column; gap:8px;
    max-height: 420px; min-height: 200px; overflow-y:auto;
    padding-right: 4px;
  }
  .chat-bubble{
    background: rgba(17,24,40,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px 12px 12px 4px;
    padding: 10px 14px;
    font-size: 14px;
    max-width: 100%;
    word-break: break-word;
  }
  .chat-bubble.mine{
    background: var(--gold);
    background: color-mix(in srgb, var(--gold) 62%, transparent);
    color: #1a1406;
    border-color: var(--gold);
    border-radius: 12px 12px 4px 12px;
  }
  .chat-bubble.bare-media{
    background: transparent; border: none; padding: 0;
    max-width: none;
  }
  .chat-bubble.mine.bare-media{ color: var(--ink); }
  .chat-bubble.bare-media .voice-play{ background: var(--bg-soft); border: 1px solid var(--line); }
  .chat-image{ max-width: 220px; border-radius: 8px; display:block; overflow: hidden; }
  .demo-match{
    display:flex; align-items:center; gap:14px;
    background: var(--panel); border:1px solid var(--line); border-radius:14px;
    padding: 14px 18px; margin-bottom: 16px;
  }
  .eye-toggle{
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 16px;
    padding: 4px; line-height: 1;
  }

  .demo-chat-header{
    display:flex; align-items:center; gap:12px;
    padding-bottom: 14px; margin-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .demo-avatar{
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #7c9eff, #c792ea);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700; color:#0b0f19; font-size:16px;
  }
  .chat-photo-img{
    width: 220px; max-width: 100%; border-radius: 10px; display:block;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
  }

  .voice-bubble{
    display:flex; align-items:center; gap:10px; min-width: 180px;
  }
  .voice-play{
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--bg-soft); border: 1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size: 12px; flex-shrink:0; cursor:pointer; color: var(--ink);
  }
  .chat-bubble.mine .voice-play{ background: rgba(0,0,0,0.2); border-color: transparent; color: #1a1406; }
  .voice-waveform-wrap{ position: relative; flex:1; height: 28px; }
  .voice-waveform{
    position:absolute; inset:0; display:flex; align-items:center; gap:2px;
  }
  .voice-waveform span{
    flex:1; min-width: 2px; border-radius: 2px; height: 20%;
    background: currentColor; opacity: 0.35;
    align-self: center;
  }
  .voice-waveform span.played{ opacity: 0.95; }
  .voice-seek-overlay{
    position:absolute; inset:0; width:100%; height:100%;
    margin:0; opacity:0; cursor:pointer;
    -webkit-appearance: none; appearance:none; background:transparent;
  }

<body>
<div id="root"></div>

<script>
function backendNotConfiguredError(){
  return new Error('База данных не подключена: проверь supabaseConfig в начале <script>.');
}

// ---------------- backend (Supabase) ----------------
const supabaseConfig = {
  url: "https://lbjtrwiutmboiyspwrvx.supabase.co",
  anonKey: "sb_publishable_cBSuHVV-F0zA_32Ak5yJYw_Fsw1dDAS",
};

let sb = null;
let supabaseReady = false;
try{
  if(supabaseConfig.url && supabaseConfig.anonKey){
    sb = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);
    supabaseReady = true;
  }
}catch(e){
  console.error('Supabase init failed', e);
}

// Логины у нас без email, но Firebase Auth умеет только email+пароль,
// поэтому превращаем ник в служебный псевдо-адрес — пользователь его не видит.
function hashUsername(name){
  const s = name.toLowerCase().trim();
  let h = 0;
  for(let i = 0; i < s.length; i++){
    h = (h * 31 + s.codePointAt(i)) >>> 0;
  }
  return h.toString(36) + s.length.toString(36);
}
function usernameToEmail(name){
  return 'u' + hashUsername(name) + '@sozvezdie.local';
}

async function registerUser(username, password){
  if(!supabaseReady) throw backendNotConfiguredError();
  const email = usernameToEmail(username);
  const { data, error } = await sb.auth.signUp({ email, password });
  if(error){
    if(error.status === 422 || /already registered|already exists/i.test(error.message)) throw new Error('Это имя уже занято — выбери другое.');
    if(/password/i.test(error.message)) throw new Error('Пароль слишком короткий — минимум 6 символов.');
    throw new Error(error.message);
  }
  const uid = data.user.id;
  const { error: profileError } = await sb.from('profiles').insert({ id: uid, login: username, name: username });
  if(profileError) throw new Error(profileError.message);
  return { uid, name: username, login: username };
}

async function loginUser(username, password){
  if(!supabaseReady) throw backendNotConfiguredError();
  const email = usernameToEmail(username);
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){
    throw new Error('Неверный логин или пароль.');
  }
  const uid = data.user.id;
  const { data: profileRow } = await sb.from('profiles').select('*').eq('id', uid).single();
  return {
    uid,
    name: profileRow?.name || username,
    login: profileRow?.login || username,
    graph: profileRow?.graph || null,
    text: profileRow?.bio_text || '',
    profile: profileRow?.profile || null,
    isAdmin: profileRow?.is_admin === true,
    theme: profileRow?.theme || 'dark',
  };
}

function logoutUser(){
  if(sb) sb.auth.signOut();
}

async function changeLogin(newLogin, currentPassword){
  if(!supabaseReady) throw backendNotConfiguredError();
  const oldEmail = usernameToEmail(state.user.login);
  const { error: reauthError } = await sb.auth.signInWithPassword({ email: oldEmail, password: currentPassword });
  if(reauthError) throw new Error('Неверный текущий пароль.');
  const newEmail = usernameToEmail(newLogin);
  const { error } = await sb.auth.updateUser({ email: newEmail });
  if(error){
    if(/already registered|exists/i.test(error.message)) throw new Error('Такой логин уже занят.');
    throw new Error(error.message);
  }
  const { error: profileError } = await sb.from('profiles').update({ login: newLogin }).eq('id', state.user.uid);
  if(profileError) throw new Error(profileError.message);
}

async function changeDisplayName(newName){
  if(!supabaseReady) throw backendNotConfiguredError();
  const { error } = await sb.from('profiles').update({ name: newName }).eq('id', state.user.uid);
  if(error) throw new Error(error.message);
}

async function saveUserGraph(uid, text, graph){
  if(!supabaseReady) throw backendNotConfiguredError();
  const { error } = await sb.from('profiles').update({ bio_text: text, graph }).eq('id', uid);
  if(error) throw new Error(error.message);
}

async function fetchAllUsers(){
  if(!supabaseReady) throw backendNotConfiguredError();
  const { data, error } = await sb.from('profiles').select('*').not('graph', 'is', null).order('created_at', { ascending: false });
  if(error) throw new Error(error.message);
  return data.map(u => ({ uid: u.id, ...u }));
}

// ---------------- друзья ----------------
// ---------------- звонки (WebRTC + Supabase Realtime как канал сигнализации) ----------------
// Без своего сервера сигнализации: договариваемся о соединении через строки в базе,
// а сам голос/видео потом идёт напрямую между браузерами (peer-to-peer).
// Ограничение: используется только публичный STUN, без TURN — в редких случаях
// (жёсткий NAT/корпоративная сеть) соединение может не установиться напрямую.
const RTC_CONFIG = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

let currentCall = null; // { callId, pc, localStream, remoteStream, unsubs:[], role, type }
let incomingCallUnsub = null;
let incomingCallDoc = null;

function listenForIncomingCalls(){
  if(incomingCallUnsub || !state.user) return;
  async function refetch(){
    const { data } = await sb.from('calls').select('*').eq('to_uid', state.user.uid).eq('status', 'ringing').limit(1);
    const row = data && data[0];
    if(row && !currentCall){
      incomingCallDoc = { id: row.id, fromUid: row.from_uid, fromName: row.from_name, toUid: row.to_uid, toName: row.to_name, type: row.type, offer: row.offer };
      renderIncomingCallBanner();
    } else if(!row && incomingCallDoc){
      incomingCallDoc = null;
      renderIncomingCallBanner();
    }
  }
  refetch();
  const channel = sb.channel('incoming-calls-' + state.user.uid)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'calls', filter: `to_uid=eq.${state.user.uid}` }, refetch)
    .subscribe();
  incomingCallUnsub = () => sb.removeChannel(channel);
}

function stopListeningForIncomingCalls(){
  if(incomingCallUnsub){ incomingCallUnsub(); incomingCallUnsub = null; }
  incomingCallDoc = null;
  renderIncomingCallBanner();
}

async function startCall(toUid, toName, type){
  if(!supabaseReady) throw backendNotConfiguredError();
  if(currentCall){ showToast('Уже есть активный звонок'); return; }
  const constraints = type === 'video' ? { audio: true, video: true } : { audio: true };
  let localStream;
  try{
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
  }catch(e){
    showToast('Нет доступа к микрофону/камере: ' + (e.name || e.message));
    return;
  }
  const pc = new RTCPeerConnection(RTC_CONFIG);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  const remoteStream = new MediaStream();
  pc.ontrack = (e) => { e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t)); renderCallScreen(); };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  const { data: callRow, error } = await sb.from('calls').insert({
    from_uid: state.user.uid, from_name: state.user.name, to_uid: toUid, to_name: toName,
    type, status: 'ringing', offer: { sdp: offer.sdp, type: offer.type }, ts: Date.now()
  }).select().single();
  if(error){ showToast('Не удалось начать звонок'); return; }
  const callId = callRow.id;

  currentCall = { callId, pc, localStream, remoteStream, unsubs: [], role: 'caller', type, otherUid: toUid, otherName: toName, startedAt: null, screenSharing: false, screenTrack: null };

  pc.onicecandidate = (e) => { if(e.candidate) sb.from('call_candidates').insert({ call_id: callId, side: 'caller', candidate: e.candidate.toJSON() }); };

  const channel1 = sb.channel('call-' + callId)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'calls', filter: `id=eq.${callId}` }, async (payload) => {
      const data = payload.new;
      if(!data) return;
      if(data.status === 'declined'){ endCall(false, 'declined'); }
      if(data.status === 'ended'){ endCall(false); }
      if(data.answer && pc.currentRemoteDescription === null){
        await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        currentCall.startedAt = Date.now();
      }
    })
    .subscribe();
  const channel2 = sb.channel('call-candidates-callee-' + callId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'call_candidates', filter: `call_id=eq.${callId}` }, (payload) => {
      const row = payload.new;
      if(row && row.side === 'callee') pc.addIceCandidate(new RTCIceCandidate(row.candidate)).catch(()=>{});
    })
    .subscribe();
  currentCall.unsubs.push(() => sb.removeChannel(channel1), () => sb.removeChannel(channel2));
  currentCall.notifyEnd = () => sb.from('calls').update({ status: 'ended' }).eq('id', callId).then(()=>{}).catch(()=>{});
  renderCallScreen();
}

async function acceptIncomingCall(){
  if(!incomingCallDoc) return;
  const call = incomingCallDoc;
  incomingCallDoc = null;
  renderIncomingCallBanner();
  const constraints = call.type === 'video' ? { audio: true, video: true } : { audio: true };
  let localStream;
  try{
    localStream = await navigator.mediaDevices.getUserMedia(constraints);
  }catch(e){
    showToast('Нет доступа к микрофону/камере: ' + (e.name || e.message));
    return;
  }
  const pc = new RTCPeerConnection(RTC_CONFIG);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  const remoteStream = new MediaStream();
  pc.ontrack = (e) => { e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t)); renderCallScreen(); };

  currentCall = { callId: call.id, pc, localStream, remoteStream, unsubs: [], role: 'callee', type: call.type, otherUid: call.fromUid, otherName: call.fromName, startedAt: Date.now(), screenSharing: false, screenTrack: null };

  pc.onicecandidate = (e) => { if(e.candidate) sb.from('call_candidates').insert({ call_id: call.id, side: 'callee', candidate: e.candidate.toJSON() }); };

  await pc.setRemoteDescription(new RTCSessionDescription(call.offer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await sb.from('calls').update({ status: 'active', answer: { sdp: answer.sdp, type: answer.type } }).eq('id', call.id);

  const channel1 = sb.channel('call-' + call.id)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'calls', filter: `id=eq.${call.id}` }, (payload) => {
      const data = payload.new;
      if(data && data.status === 'ended') endCall(false);
    })
    .subscribe();
  const channel2 = sb.channel('call-candidates-caller-' + call.id)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'call_candidates', filter: `call_id=eq.${call.id}` }, (payload) => {
      const row = payload.new;
      if(row && row.side === 'caller') pc.addIceCandidate(new RTCIceCandidate(row.candidate)).catch(()=>{});
    })
    .subscribe();
  currentCall.unsubs.push(() => sb.removeChannel(channel1), () => sb.removeChannel(channel2));
  currentCall.notifyEnd = () => sb.from('calls').update({ status: 'ended' }).eq('id', call.id).then(()=>{}).catch(()=>{});
  renderCallScreen();
}

async function declineIncomingCall(){
  if(!incomingCallDoc) return;
  try{ await sb.from('calls').update({ status: 'declined' }).eq('id', incomingCallDoc.id); }catch(e){}
  incomingCallDoc = null;
  renderIncomingCallBanner();
}

function endCall(notifyRemote, reason){
  if(!currentCall) return;
  const call = currentCall;
  currentCall = null;
  call.unsubs.forEach(fn => { try{ fn(); }catch(e){} });
  if(notifyRemote !== false && call.notifyEnd){ call.notifyEnd(); }
  try{ call.pc.close(); }catch(e){}
  try{ call.localStream.getTracks().forEach(t => t.stop()); }catch(e){}
  try{ if(call.screenTrack) call.screenTrack.stop(); }catch(e){}
  renderCallScreen();

  let outcome, duration = 0;
  if(reason === 'declined'){ outcome = 'declined'; }
  else if(call.startedAt){ outcome = 'completed'; duration = Math.round((Date.now() - call.startedAt)/1000); }
  else { outcome = 'missed'; }
  if(call.otherUid){
    logCallMessage(call.otherUid, call.otherName, call.type, outcome, duration).catch(e => console.error('call log failed', e));
  }
}

async function logCallMessage(otherUid, otherName, type, outcome, duration){
  if(!supabaseReady) return;
  await sb.from('messages').insert({
    chat_id: pairId(state.user.uid, otherUid),
    from_uid: state.user.uid, from_name: state.user.name, to_uid: otherUid, to_name: otherName,
    ts: Date.now(), call_summary: { type, outcome, duration }
  });
}

function renderCallScreen(){
  let overlay = document.getElementById('call-overlay');
  if(overlay) overlay.remove();
  if(!currentCall) return;

  overlay = document.createElement('div');
  overlay.id = 'call-overlay';
  overlay.className = 'call-overlay';

  const topBar = document.createElement('div');
  topBar.className = 'call-topbar';
  topBar.textContent = currentCall.otherName + (currentCall.role === 'caller' && !currentCall.startedAt ? ' · вызов…' : '');
  overlay.appendChild(topBar);

  const grid = document.createElement('div');
  grid.className = 'call-grid';

  function makeTile(labelName, micOn){
    const tile = document.createElement('div');
    tile.className = 'call-tile';
    const label = document.createElement('div');
    label.className = 'call-tile-label';
    const micIcon = document.createElement('span');
    micIcon.className = 'call-tile-mic';
    micIcon.innerHTML = micOn ? CALL_ICONS.mic : CALL_ICONS.micOff;
    label.appendChild(document.createTextNode(labelName + ' '));
    label.appendChild(micIcon);
    tile.appendChild(label);
    return { tile, micIcon };
  }

  let localMicIconEl, remoteMicIconEl;

  if(currentCall.type === 'video'){
    const remoteTileParts = makeTile(currentCall.otherName, true);
    const remoteVid = document.createElement('video');
    remoteVid.autoplay = true; remoteVid.playsInline = true; remoteVid.className = 'call-tile-video';
    remoteVid.srcObject = currentCall.remoteStream;
    remoteTileParts.tile.insertBefore(remoteVid, remoteTileParts.tile.firstChild);
    grid.appendChild(remoteTileParts.tile);
    remoteMicIconEl = remoteTileParts.micIcon;

    const localTileParts = makeTile('Ты', true);
    const localVid = document.createElement('video');
    localVid.autoplay = true; localVid.playsInline = true; localVid.muted = true; localVid.className = 'call-tile-video';
    localVid.srcObject = currentCall.localStream;
    localTileParts.tile.insertBefore(localVid, localTileParts.tile.firstChild);
    grid.appendChild(localTileParts.tile);
    localMicIconEl = localTileParts.micIcon;
  } else {
    const remoteTileParts = makeTile(currentCall.otherName, true);
    const avatar = document.createElement('div');
    avatar.className = 'call-avatar';
    avatar.textContent = (currentCall.otherName || '?')[0].toUpperCase();
    remoteTileParts.tile.insertBefore(avatar, remoteTileParts.tile.firstChild);
    grid.appendChild(remoteTileParts.tile);
    remoteMicIconEl = remoteTileParts.micIcon;

    const remoteAudio = document.createElement('audio');
    remoteAudio.autoplay = true;
    remoteAudio.srcObject = currentCall.remoteStream;
    overlay.appendChild(remoteAudio);
  }
  overlay.appendChild(grid);

  const bar = document.createElement('div');
  bar.className = 'call-bottom-bar';

  const micBtn = document.createElement('button');
  micBtn.className = 'call-ctrl-btn';
  const micEnabled = () => currentCall.localStream.getAudioTracks().every(t => t.enabled);
  const renderMicBtn = () => {
    micBtn.innerHTML = micEnabled() ? CALL_ICONS.mic : CALL_ICONS.micOff;
    micBtn.classList.toggle('off', !micEnabled());
    if(localMicIconEl) localMicIconEl.innerHTML = micEnabled() ? CALL_ICONS.mic : CALL_ICONS.micOff;
  };
  micBtn.onclick = () => {
    currentCall.localStream.getAudioTracks().forEach(t => { t.enabled = !t.enabled; });
    renderMicBtn();
  };
  renderMicBtn();
  bar.appendChild(micBtn);

  if(currentCall.type === 'video'){
    const camBtn = document.createElement('button');
    camBtn.className = 'call-ctrl-btn';
    const camEnabled = () => currentCall.localStream.getVideoTracks().every(t => t.enabled);
    const renderCamBtn = () => { camBtn.innerHTML = camEnabled() ? CALL_ICONS.cam : CALL_ICONS.camOff; camBtn.classList.toggle('off', !camEnabled()); };
    camBtn.onclick = () => {
      currentCall.localStream.getVideoTracks().forEach(t => { t.enabled = !t.enabled; });
      renderCamBtn();
    };
    renderCamBtn();
    bar.appendChild(camBtn);

    const screenBtn = document.createElement('button');
    screenBtn.className = 'call-ctrl-btn call-ctrl-btn-labeled';
    const renderScreenBtn = () => {
      screenBtn.innerHTML = CALL_ICONS.screen;
      const lbl = document.createElement('span'); lbl.textContent = 'Демонстрация';
      screenBtn.appendChild(lbl);
      screenBtn.classList.toggle('off', !currentCall.screenSharing);
    };
    screenBtn.onclick = async () => {
      if(!currentCall.screenSharing){
        try{
          const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
          const screenTrack = screenStream.getVideoTracks()[0];
          const sender = currentCall.pc.getSenders().find(s => s.track && s.track.kind === 'video');
          if(sender) await sender.replaceTrack(screenTrack);
          currentCall.screenTrack = screenTrack;
          currentCall.screenSharing = true;
          screenTrack.onended = () => stopScreenShare();
          renderScreenBtn();
        }catch(e){
          console.error('screen share failed', e);
          showToast('Не удалось начать демонстрацию экрана');
        }
      } else {
        stopScreenShare();
      }
    };
    function stopScreenShare(){
      const camTrack = currentCall.localStream.getVideoTracks()[0];
      const sender = currentCall.pc.getSenders().find(s => s.track && s.track.kind === 'video');
      if(sender && camTrack) sender.replaceTrack(camTrack);
      if(currentCall.screenTrack){ currentCall.screenTrack.stop(); currentCall.screenTrack = null; }
      currentCall.screenSharing = false;
      renderScreenBtn();
    }
    renderScreenBtn();
    bar.appendChild(screenBtn);
  }

  const hangupBtn = document.createElement('button');
  hangupBtn.className = 'call-hangup-btn'; hangupBtn.innerHTML = CALL_ICONS.phone;
  hangupBtn.onclick = () => endCall(true);
  bar.appendChild(hangupBtn);
  overlay.appendChild(bar);

  document.body.appendChild(overlay);
}

function pairId(uidA, uidB){
  return [uidA, uidB].sort().join('_');
}

function mapFriendRequestRow(r){
  return { id: r.id, fromUid: r.from_uid, fromName: r.from_name, toUid: r.to_uid, toName: r.to_name, status: r.status, ts: r.ts };
}

async function getFriendRequestBetween(uidA, uidB){
  if(!supabaseReady) throw backendNotConfiguredError();
  const { data: d1 } = await sb.from('friend_requests').select('*').eq('from_uid', uidA).eq('to_uid', uidB).limit(1);
  if(d1 && d1.length) return mapFriendRequestRow(d1[0]);
  const { data: d2 } = await sb.from('friend_requests').select('*').eq('from_uid', uidB).eq('to_uid', uidA).limit(1);
  if(d2 && d2.length) return mapFriendRequestRow(d2[0]);
  return null;
}

async function sendFriendRequest(toUid, toName){
  if(!supabaseReady) throw backendNotConfiguredError();
  const me = state.user;
  const existing = await getFriendRequestBetween(me.uid, toUid);
  if(existing){
    if(existing.status === 'pending' && existing.fromUid === toUid){
      await sb.from('friend_requests').update({ status: 'accepted' }).eq('id', existing.id);
      return { ...existing, status: 'accepted' };
    }
    return existing;
  }
  const { data, error } = await sb.from('friend_requests').insert({
    from_uid: me.uid, from_name: me.name, to_uid: toUid, to_name: toName, status: 'pending', ts: Date.now()
  }).select().single();
  if(error) throw new Error(error.message);
  return mapFriendRequestRow(data);
}

async function respondFriendRequest(requestId, accept){
  if(!supabaseReady) throw backendNotConfiguredError();
  if(accept){
    await sb.from('friend_requests').update({ status: 'accepted' }).eq('id', requestId);
  } else {
    await sb.from('friend_requests').delete().eq('id', requestId);
  }
}

async function listIncomingRequests(){
  if(!supabaseReady) throw backendNotConfiguredError();
  const { data, error } = await sb.from('friend_requests').select('*').eq('to_uid', state.user.uid).eq('status', 'pending');
  if(error) throw new Error(error.message);
  return data.map(mapFriendRequestRow);
}

async function listFriends(){
  if(!supabaseReady) throw backendNotConfiguredError();
  const uid = state.user.uid;
  const [q1, q2] = await Promise.all([
    sb.from('friend_requests').select('*').eq('from_uid', uid).eq('status', 'accepted'),
    sb.from('friend_requests').select('*').eq('to_uid', uid).eq('status', 'accepted'),
  ]);
  const friends = [];
  (q1.data||[]).forEach(v => { friends.push({ uid: v.to_uid, name: v.to_name }); });
  (q2.data||[]).forEach(v => { friends.push({ uid: v.from_uid, name: v.from_name }); });
  return friends;
}

// Загружаем файл (фото/видео/голос/документ) в настоящее файловое хранилище Supabase
// и возвращаем публичную ссылку — раньше всё это лежало прямо в базе как base64,
// именно это и было вероятной причиной, что видео-кружочки не проигрывались на части устройств.
async function uploadMediaToStorage(dataUrl, kind){
  if(!supabaseReady) throw backendNotConfiguredError();
  const [header, base64] = dataUrl.split(',');
  const mimeMatch = header.match(/data:(.*?);base64/);
  const mime = mimeMatch ? mimeMatch[1] : 'application/octet-stream';
  const bin = atob(base64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  const blob = new Blob([bytes], { type: mime });
  const ext = (mime.split('/')[1] || 'bin').split(';')[0].split('+')[0];
  const path = `${state.user.uid}/${kind}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
  const { error } = await sb.storage.from('media').upload(path, blob, { contentType: mime });
  if(error) throw new Error(error.message);
  const { data } = sb.storage.from('media').getPublicUrl(path);
  return data.publicUrl;
}

// Приводим строки из базы (snake_case, ссылки вместо base64) к тем же именам полей
// (camelCase), которые уже использует весь остальной код отрисовки — чтобы не переписывать
// разметку сообщений заново.
function mapMessageRow(r){
  return {
    id: r.id, chatId: r.chat_id, fromUid: r.from_uid, fromName: r.from_name,
    toUid: r.to_uid, toName: r.to_name, groupId: r.group_id,
    text: r.text, imageData: r.image_url, voiceData: r.voice_url, videoData: r.video_url,
    fileData: r.file_url, fileName: r.file_name, transcript: r.transcript, waveform: r.waveform,
    replyTo: r.reply_to, pinned: r.pinned, deletedFor: r.deleted_for || [], callSummary: r.call_summary, ts: r.ts,
  };
}

async function sendMessage(toUid, toName, text, imageData, voiceData, videoData, transcript, waveform, fileData, fileName){
  if(!supabaseReady) throw backendNotConfiguredError();
  const me = state.user;
  const row = {
    chat_id: pairId(me.uid, toUid), from_uid: me.uid, from_name: me.name, to_uid: toUid, to_name: toName, ts: Date.now()
  };
  if(text) row.text = text;
  if(imageData) row.image_url = await uploadMediaToStorage(imageData, 'images');
  if(voiceData) row.voice_url = await uploadMediaToStorage(voiceData, 'voice');
  if(videoData) row.video_url = await uploadMediaToStorage(videoData, 'video');
  if(fileData){ row.file_url = await uploadMediaToStorage(fileData, 'files'); row.file_name = fileName || 'файл'; }
  if(transcript) row.transcript = transcript;
  if(waveform) row.waveform = waveform;
  if(state.replyingTo){ row.reply_to = state.replyingTo; state.replyingTo = null; renderReplyBanner(); }
  const { error } = await sb.from('messages').insert(row);
  if(error) throw new Error(error.message);
}

async function sendGroupMessage(groupId, text, imageData, voiceData, videoData, transcript, waveform, fileData, fileName){
  if(!supabaseReady) throw backendNotConfiguredError();
  const me = state.user;
  const row = {
    chat_id: 'g_' + groupId, group_id: groupId, from_uid: me.uid, from_name: me.name, ts: Date.now()
  };
  if(text) row.text = text;

async function getUnreadChatsCount(){
  if(!state.user || !supabaseReady) return 0;
  const me = state.user.uid;
  const [{ data: reads }, { data: sent }, { data: received }, { data: groupsData }] = await Promise.all([
    sb.from('chat_reads').select('*').eq('user_id', me),
    sb.from('messages').select('chat_id, ts, from_uid').eq('from_uid', me),
    sb.from('messages').select('chat_id, ts, from_uid').eq('to_uid', me),
    sb.from('groups').select('id').contains('members', [me]),
  ]);
  const lastRead = {};
  (reads||[]).forEach(r => { lastRead[r.chat_id] = r.last_read; });
  const groupIds = new Set((groupsData||[]).map(g => 'g_' + g.id));
  const latestByChat = {};
  [...(sent||[]), ...(received||[])].forEach(m => {
    if(!latestByChat[m.chat_id] || m.ts > latestByChat[m.chat_id]) latestByChat[m.chat_id] = m.ts;
  });
  if(groupIds.size){
    const { data: groupMsgs } = await sb.from('messages').select('chat_id, ts, from_uid').in('chat_id', [...groupIds]);
    (groupMsgs||[]).forEach(m => {
      if(m.from_uid === me) return;
      if(!latestByChat[m.chat_id] || m.ts > latestByChat[m.chat_id]) latestByChat[m.chat_id] = m.ts;
    });
  }
  let count = 0;
  Object.keys(latestByChat).forEach(chatId => {
    if(latestByChat[chatId] > (lastRead[chatId] || 0)) count++;
  });
  return count;
}

// Живые обновления через Supabase Realtime (аналог onSnapshot из Firestore).
// Подход попроще: при любом изменении просто перезапрашиваем весь список сообщений чата.
function listenToMessages(chatId, callback){
  async function refetch(){
    const { data, error } = await sb.from('messages').select('*').eq('chat_id', chatId).order('ts', { ascending: true });
    if(error){ console.error('chat listen failed', error); return; }
    callback((data||[]).map(mapMessageRow));
  }
  refetch();
  const channel = sb.channel('messages-' + chatId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages', filter: `chat_id=eq.${chatId}` }, refetch)
    .subscribe();
  return () => sb.removeChannel(channel);
}

async function listChatThreads(){
  const me = state.user.uid;
  const [{ data: sent }, { data: received }, { data: groupsData }, { data: reads }] = await Promise.all([
    sb.from('messages').select('*').eq('from_uid', me),
    sb.from('messages').select('*').eq('to_uid', me),
    sb.from('groups').select('*').contains('members', [me]),
    sb.from('chat_reads').select('*').eq('user_id', me),
  ]);
  const byChatId = {};
  function ingest(row){
    const m = mapMessageRow(row);
    const existing = byChatId[m.chatId];
    if(!existing || (m.ts||0) > (existing.latest?.ts||0)){
      byChatId[m.chatId] = {
        chatId: m.chatId,
        isGroup: !!m.groupId,
        groupId: m.groupId || null,
        otherUid: m.fromUid === me ? m.toUid : m.fromUid,
        otherName: m.fromUid === me ? m.toName : m.fromName,
        latest: m,
      };
    }
  }
  (sent||[]).forEach(ingest);
  (received||[]).forEach(ingest);

  const groupIds = (groupsData||[]).map(g => g.id);
  let groupMsgsByGroup = {};
  if(groupIds.length){
    const { data: groupMsgs } = await sb.from('messages').select('*').in('group_id', groupIds);
    (groupMsgs||[]).forEach(row => {
      const m = mapMessageRow(row);
      if(!groupMsgsByGroup[m.groupId]) groupMsgsByGroup[m.groupId] = [];
      groupMsgsByGroup[m.groupId].push(m);
    });
  }
  (groupsData||[]).forEach(g => {
    const chatId = 'g_' + g.id;
    const msgs = groupMsgsByGroup[g.id] || [];
    msgs.forEach(m => {
      const existing = byChatId[chatId];
      if(!existing || (m.ts||0) > (existing.latest?.ts||0)){
        byChatId[chatId] = { chatId, isGroup:true, groupId: g.id, groupName: g.name, latest: m };
      }
    });
    if(!byChatId[chatId]){
      byChatId[chatId] = { chatId, isGroup:true, groupId: g.id, groupName: g.name, latest: null };
    } else {
      byChatId[chatId].groupName = g.name;
    }
  });

  const lastRead = {};
  (reads||[]).forEach(r => { lastRead[r.chat_id] = r.last_read; });
  const threads = Object.values(byChatId).map(t => ({
    ...t,
    unread: !!(t.latest && t.latest.fromUid !== me && (t.latest.ts||0) > (lastRead[t.chatId]||0))
  }));
  threads.sort((a,b) => (b.latest?.ts||0) - (a.latest?.ts||0));
  return threads;
}

function formatLastSeen(ts){
  if(!ts) return 'давно не заходил(а)';
  const diffMin = (Date.now() - ts) / 60000;
  if(diffMin < 2) return 'в сети';
  if(diffMin < 60) return `был(а) в сети ${Math.round(diffMin)} мин назад`;
  const diffH = diffMin / 60;
  if(diffH < 24) return `был(а) в сети ${Math.round(diffH)} ч назад`;
  return `был(а) в сети ${Math.round(diffH/24)} дн назад`;
}

// ---------------- запись голосовых и видео-кружочков ----------------
// Ограничиваем длительность — сообщения хранятся прямо в базе Firestore
// (лимит ~1 МБ на сообщение), поэтому длинные ролики физически не влезут.
function pickSupportedMimeType(candidates){
  for(const c of candidates){
    if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c;
  }
  return null;
}

function recordMedia(constraints, maxSeconds, onTick, recorderOptions, onStreamReady){
  return navigator.mediaDevices.getUserMedia(constraints).then(stream => {
    if(onStreamReady) onStreamReady(stream);
    const chunks = [];
    let recorder;
    try{ recorder = new MediaRecorder(stream, recorderOptions || {}); }
    catch(e){ recorder = new MediaRecorder(stream); }
    let seconds = 0;
    recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
    const finished = new Promise((resolve, reject) => {
      recorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
        const reader = new FileReader();
        reader.onload = () => resolve({ dataUrl: reader.result, seconds, sizeBytes: blob.size });
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      };
    });
    function stop(){
      clearInterval(tickTimer);
      if(recorder.state !== 'inactive') recorder.stop();
    }
    const tickTimer = setInterval(() => {
      seconds += 1;
      if(onTick) onTick(seconds);
      if(seconds >= maxSeconds) stop();
    }, 1000);
    recorder.start();
    return { stop, finished, stream };
  });
}

// Расшифровка голосового — идёт ЖИВЬЁМ во время записи (браузер умеет распознавать
// только живой звук с микрофона, не готовый файл), результат сохраняется вместе с сообщением.
let activeRecognition = null;
let recognitionBuffer = '';
function startTranscription(){
  recognitionBuffer = '';
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return;
  activeRecognition = new SR();
  activeRecognition.lang = 'ru-RU';
  activeRecognition.continuous = true;
  activeRecognition.interimResults = true;
  activeRecognition.onresult = (event) => {
    let text = '';
    for(let i=0;i<event.results.length;i++){ text += event.results[i][0].transcript; }
    recognitionBuffer = text;
  };
  activeRecognition.onerror = () => {};
  try{ activeRecognition.start(); }catch(e){ /* ignore */ }
}
function stopTranscription(){
  if(activeRecognition){
    try{ activeRecognition.stop(); }catch(e){ /* ignore */ }
    activeRecognition = null;
  }
  return recognitionBuffer.trim();
}

function formatDuration(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
}

// Настоящая волна по громкости, а не декоративная — разбираем записанный звук на пики.
async function extractWaveformPeaks(dataUrl, barCount){
  barCount = barCount || 32;
  try{
    const resp = await fetch(dataUrl);
    const arrayBuffer = await resp.arrayBuffer();
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    const channelData = audioBuffer.getChannelData(0);
    const blockSize = Math.max(1, Math.floor(channelData.length / barCount));
    const peaks = [];
    for(let i=0;i<barCount;i++){
      let max = 0;
      const start = i*blockSize;
      for(let j=0;j<blockSize;j++){
        const v = Math.abs(channelData[start + j] || 0);
        if(v > max) max = v;
      }
      peaks.push(Math.round(max*100)/100);
    }
    audioCtx.close();
    return peaks;
  }catch(e){
    console.error('waveform extraction failed', e);
    return null;
  }
}

    const query = (state.peopleSearch || '').trim().toLowerCase();
    const interestQuery = (state.peopleInterestSearch || '').trim().toLowerCase();
    let others = state.user ? state.people.filter(p => p.name.toLowerCase() !== state.user.name.toLowerCase()) : state.people;
    if(query){ others = others.filter(p => p.name.toLowerCase().includes(query)); }
    let matchedInterestByUid = {};
    let matchCountByUid = {};
    if(interestQuery){
      others = others.filter(p => {
        const leafHits = (p.graph.nodes||[]).filter(n => !n.isHub && labelMatchesQuery(n.label, interestQuery));
        const clusterHit = (p.graph.clusters||[]).find(c => labelMatchesQuery(c, interestQuery));
        const key = p.uid || p.name;
        if(leafHits.length){
          matchedInterestByUid[key] = leafHits.map(n => n.label).join(', ');
          matchCountByUid[key] = leafHits.length;
          return true;
        }
        if(clusterHit){
          matchedInterestByUid[key] = clusterHit;
          matchCountByUid[key] = 1;
          return true;
        }
        return false;
      });
    }
    if(others.length === 0){
      const emptyMsg = interestQuery ? 'Никто не упоминал такой интерес.' : (query ? 'Никого не нашли по этому запросу.' : 'Кроме тебя пока никого нет.');
      card.appendChild(el('div','empty', emptyMsg));
      return;
    }
    const withScores = others.map(p => ({
      p,
      compat: state.graph ? computeCompatibility(state.graph, p.graph) : null
    }));
    if(interestQuery){
      withScores.sort((x, y) => (matchCountByUid[y.p.uid || y.p.name]||0) - (matchCountByUid[x.p.uid || x.p.name]||0));
    } else if(state.graph){
      withScores.sort((x, y) => y.compat.percent - x.compat.percent);
    }
    const grid = el('div','people-grid');
    withScores.forEach(({ p, compat }) => {
      const row = el('div','person-row');
      const left = el('div');
      left.style.display='flex'; left.style.alignItems='center'; left.style.gap='10px';
      const pAvatar = avatarCircleEl(p.name, 40);
      if(p.uid) fillAvatarAsync(pAvatar, p.uid);
      left.appendChild(pAvatar);
      const nameCol = el('div','');
      nameCol.appendChild(el('div','name', p.name));
      let metaText = (p.graph.nodes||[]).filter(n=>!n.isHub).length + ' узлов · ' + (p.graph.clusters||[]).length + ' тем';
      const key = p.uid || p.name;
      if(matchedInterestByUid[key]){
        const cnt = matchCountByUid[key] || 1;
        metaText += ` · совпадений: ${cnt} (${matchedInterestByUid[key]})`;
      }
      if(compat && compat.sharedClusters.length){
        metaText += ' · общее: ' + compat.sharedClusters.join(', ');
      }
      nameCol.appendChild(el('div','meta', metaText));
      left.appendChild(nameCol);
      row.appendChild(left);

      const right = el('div','');
      right.style.display='flex'; right.style.alignItems='center'; right.style.gap='12px'; right.style.flexShrink='0';
      if(compat){
        right.appendChild(el('div','compat-badge', compat.percent + '%'));
      }
      const iconsBox = el('div','');
      iconsBox.style.display='flex'; iconsBox.style.gap='6px';
      right.appendChild(iconsBox);
      renderQuickIcons(iconsBox, p);
      right.appendChild(el('div','arrow','→'));
      row.appendChild(right);

      row.onclick = () => { state.selectedPerson = p; state.screen = 'personView'; render(); };
      grid.appendChild(row);
    });
    card.appendChild(grid);
  }

  renderGrid();
}

const avatarCache = {};

async function saveAvatar(uid, dataUrl){
  if(!supabaseReady) throw backendNotConfiguredError();
  const { error } = await sb.from('avatars').upsert({ user_id: uid, data: dataUrl });
  if(error) throw new Error(error.message);
  avatarCache[uid] = dataUrl;
}

async function getAvatar(uid){
  if(!uid) return null;
  if(uid in avatarCache) return avatarCache[uid];
  if(!supabaseReady) return null;
  try{
    const { data } = await sb.from('avatars').select('data').eq('user_id', uid).single();
    const url = data?.data || null;
    avatarCache[uid] = url;
    return url;
  }catch(e){
    console.error('getAvatar failed', e);
    return null;
  }
}

function avatarCircleEl(name, size){
  const div = el('div','avatar-circle', (name||'?')[0].toUpperCase());
  div.style.width = size+'px'; div.style.height = size+'px';
  div.style.fontSize = Math.round(size*0.42)+'px';
  return div;
}

// Ставит аватар в готовый div (avatarCircleEl), как только он подгрузится — без блокировки отрисовки.
function fillAvatarAsync(div, uid){
  if(!uid) return;
  getAvatar(uid).then(url => {
    if(url){
      div.innerHTML = '';
      const img = document.createElement('img');
      img.src = url;
      div.appendChild(img);
    }
  });
}

function compressImageToDataUrl(file, maxW){
  maxW = maxW || 480;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

let otherLastReadUnsub = null;

function openChat(uid, name){
  if(chatUnsubscribe){ chatUnsubscribe(); chatUnsubscribe = null; }
  if(otherLastReadUnsub){ otherLastReadUnsub(); otherLastReadUnsub = null; }
  state.screen = 'messages';
  state.chatWith = { uid, name, isGroup: false };
  state.chatMessages = []; state.replyingTo = null; state.selectMode = false; state.selectedMessageIds = new Set();
  state.otherLastRead = 0;
  state.chatStatusText = '';
  render();
  const chatId = pairId(state.user.uid, uid);
  markChatRead(chatId).then(() => refreshNotificationCounts().then(() => {
    if(state.screen === 'messages') refreshGlobalNav();
  }));
  chatUnsubscribe = listenToChat(uid, (msgs) => {
    state.chatMessages = msgs;
    if(state.screen === 'messages' && state.chatWith && state.chatWith.uid === uid){
      renderChatMessages();
      markChatRead(chatId);
    }
  });
  // видит ли собеседник мои сообщения — обновляем "просмотрено" в реальном времени
  otherLastReadUnsub = (() => {
    async function refetchOtherRead(){
      const { data } = await sb.from('chat_reads').select('last_read').eq('user_id', uid).eq('chat_id', chatId).single();
      state.otherLastRead = data?.last_read || 0;
      if(state.screen === 'messages') renderChatMessages();
    }
    refetchOtherRead();
    const channel = sb.channel('chatread-' + uid + '-' + chatId)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'chat_reads', filter: `user_id=eq.${uid}` }, (payload) => {
        const row = payload.new || payload.old;
        if(row && row.chat_id === chatId) refetchOtherRead();
      })
      .subscribe();
    return () => sb.removeChannel(channel);
  })();
  getStatusText(uid).then(txt => {
    state.chatStatusText = txt;
    if(state.screen === 'messages') renderChatHeaderStatus();
  });
}

function openGroupChat(groupId, groupName){
  if(chatUnsubscribe){ chatUnsubscribe(); chatUnsubscribe = null; }
  if(otherLastReadUnsub){ otherLastReadUnsub(); otherLastReadUnsub = null; }
  state.screen = 'messages';
  state.chatWith = { groupId, name: groupName, isGroup: true };
  state.chatMessages = []; state.replyingTo = null; state.selectMode = false; state.selectedMessageIds = new Set();

  });
}

function buildVoicePlayer(voiceData, transcript, waveform){
  const wrap = el('div','');
  const audio = new Audio(dataUrlToObjectUrl(voiceData));
  const row = el('div','voice-bubble');
  const playBtn = el('div','voice-play','▶');

  const waveWrap = el('div','voice-waveform-wrap');
  const waveEl = el('div','voice-waveform');
  const peaks = (waveform && waveform.length) ? waveform : new Array(32).fill(0).map((_,i)=> 0.3 + 0.5*Math.abs(Math.sin(i*0.7)));
  const bars = peaks.map(p => {
    const bar = document.createElement('span');
    bar.style.height = Math.max(15, Math.round(p*100)) + '%';
    waveEl.appendChild(bar);
    return bar;
  });
  const seek = document.createElement('input');
  seek.type = 'range'; seek.min = '0'; seek.max = '1000'; seek.value = '0';
  seek.className = 'voice-seek-overlay';
  let seeking = false;
  waveWrap.appendChild(waveEl);
  waveWrap.appendChild(seek);

  const durationEl = el('div','voice-duration','0:00');
  row.appendChild(playBtn);
  row.appendChild(waveWrap);
  row.appendChild(durationEl);
  wrap.appendChild(row);

  function updateBars(fraction){
    const activeCount = Math.round(fraction * bars.length);
    bars.forEach((b,i) => b.classList.toggle('played', i < activeCount));
  }

  if(transcript){
    const toggleBtn = el('div','voice-transcript-toggle','Показать текст');
    const textEl = el('div','voice-transcript-text', transcript);
    textEl.style.display = 'none';
    toggleBtn.onclick = () => {
      const hidden = textEl.style.display === 'none';
      textEl.style.display = hidden ? 'block' : 'none';
      toggleBtn.textContent = hidden ? 'Скрыть текст' : 'Показать текст';
    };
    wrap.appendChild(toggleBtn);
    wrap.appendChild(textEl);
  }

  audio.addEventListener('loadedmetadata', () => {
    if(isFinite(audio.duration)) durationEl.textContent = formatDuration(Math.round(audio.duration));
  });
  audio.addEventListener('timeupdate', () => {
    if(seeking) return;
    if(!audio.paused) durationEl.textContent = formatDuration(Math.round(audio.currentTime));
    if(isFinite(audio.duration) && audio.duration > 0){
      const frac = audio.currentTime / audio.duration;
      seek.value = String(Math.round(frac * 1000));
      updateBars(frac);
    }
  });
  audio.addEventListener('ended', () => {
    playBtn.textContent = '▶';
    durationEl.textContent = isFinite(audio.duration) ? formatDuration(Math.round(audio.duration)) : '0:00';
    seek.value = '0';
    updateBars(0);
  });
  playBtn.onclick = () => {
    if(audio.paused){ audio.play(); playBtn.textContent = '⏸'; }
    else { audio.pause(); playBtn.textContent = '▶'; }
  };
  seek.addEventListener('input', () => {
    seeking = true;
    const frac = seek.value/1000;
    updateBars(frac);
    if(isFinite(audio.duration)){
      durationEl.textContent = formatDuration(Math.round(frac * audio.duration));
    }
  });
  seek.addEventListener('change', () => {
    if(isFinite(audio.duration)){
      audio.currentTime = (seek.value/1000) * audio.duration;
    }
    seeking = false;
  });
  return wrap;
}

function formatClockTime(ts){
  if(!ts) return '';
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function attachLongPressAndRightClick(el2, handler){
  el2.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    handler(e.clientX, e.clientY);
  });
  let pressTimer = null;
  el2.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    pressTimer = setTimeout(() => handler(touch.clientX, touch.clientY), 500);
  }, { passive: true });
  el2.addEventListener('touchend', () => clearTimeout(pressTimer));
  el2.addEventListener('touchmove', () => clearTimeout(pressTimer));
}

// Большие data:URL иногда плохо воспроизводятся напрямую (особенно в мобильных браузерах) —
// превращаем в настоящий Blob и играем через object URL, это надёжнее.
// Пробуем реально проиграть записанное видео на этом же устройстве — если браузер сам не может
// декодировать то, что записал, лучше сказать об этом сразу, чем отправить нерабочий файл собеседнику.
function testVideoPlayable(dataUrl){
  return new Promise((resolve) => {
    const url = dataUrlToObjectUrl(dataUrl);
    const vid = document.createElement('video');
    vid.muted = true; vid.playsInline = true; vid.preload = 'auto';
    const timeout = setTimeout(() => { cleanup(); resolve({ ok:false, code:'timeout' }); }, 4000);
    function cleanup(){ clearTimeout(timeout); URL.revokeObjectURL(url); }
    vid.addEventListener('loadeddata', () => { cleanup(); resolve({ ok:true }); }, { once:true });
    vid.addEventListener('error', () => { const code = vid.error ? vid.error.code : '?'; cleanup(); resolve({ ok:false, code }); }, { once:true });
    vid.src = url;
  });
}

function dataUrlToObjectUrl(dataUrl){
  try{
    const [header, base64] = dataUrl.split(',');
    const mimeMatch = header.match(/data:(.*?);base64/);
    const mime = mimeMatch ? mimeMatch[1] : '';
    const bin = atob(base64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    const blob = new Blob([bytes], { type: mime });
    return URL.createObjectURL(blob);
  }catch(e){
    console.error('dataUrlToObjectUrl failed', e);
    return dataUrl;
  }
}

function downloadDataUrl(dataUrl, filename){
  const a = document.createElement('a');
  a.href = dataUrl; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
}

        const errCodeNames = {1:'ABORTED',2:'NETWORK',3:'DECODE — браузер не смог распознать формат',4:'SRC_NOT_SUPPORTED — формат/кодек не поддерживается'};
        console.error('video message failed to load', { id: m.id, code: errCode, name: errCodeNames[errCode], mimeStored: m.videoData?.slice(5, m.videoData.indexOf(';')) });

      });
      vid.addEventListener('loadeddata', () => {

      circleWrap.appendChild(vid);

      bubble.appendChild(circleWrap);

      dl.onclick = (e) => { e.stopPropagation(); downloadDataUrl(m.videoData, 'video-' + m.ts + '.webm'); };

    let maxTimer = null;

    async function begin(){
      if(active) return;
      // на всякий случай убираем застрявшее превью от предыдущей попытки
      document.querySelectorAll('.record-live-preview').forEach(p => p.remove());
      try{
        active = await recordMedia(constraints, maxSeconds, sec => {
          btn.innerHTML = CHAT_ICONS.stop + '<span>' + formatDuration(sec) + '</span>';
        }, opts.recorderOptions, stream => {
          if(opts.livePreview){
            previewBackdrop = document.createElement('div');
            previewBackdrop.className = 'record-live-preview-backdrop';
            document.body.appendChild(previewBackdrop);
            previewEl = document.createElement('video');
            previewEl.srcObject = stream;
            previewEl.autoplay = true; previewEl.muted = true; previewEl.playsInline = true;
            previewEl.className = 'record-live-preview';
            document.body.appendChild(previewEl);
          }
        });
        btn.classList.add('recording');
        if(opts.transcribe) startTranscription();
        maxTimer = setTimeout(() => { if(active) finish(); }, maxSeconds*1000 + 300);
      }catch(e){
        console.error('recording start failed', e);
        showToast('Микрофон/камера недоступны: ' + (e.name || e.message || 'нет доступа'));
      }
    }

    async function finish(){
      if(!active) return;
      if(maxTimer){ clearTimeout(maxTimer); maxTimer = null; }
      const rec = active; active = null;
      rec.stop();
      btn.disabled = true; btn.innerHTML = '…';
      if(previewEl){ previewEl.remove(); previewEl = null; }
      if(previewBackdrop){ previewBackdrop.remove(); previewBackdrop = null; }
      const transcript = opts.transcribe ? stopTranscription() : '';
      try{
        const result = await rec.finished;
        const mimeFromDataUrl = result.dataUrl.slice(5, result.dataUrl.indexOf(';'));
        console.log('recording finished:', { seconds: result.seconds, sizeBytes: result.sizeBytes, dataUrlChars: result.dataUrl.length, mime: mimeFromDataUrl, icon });
        if(result.seconds < 1){
          // случайный тап — молча игнорируем
        } else if(result.sizeBytes < 2000){
          showToast('Запись не получилась (пустой файл) — попробуй ещё раз');
        } else if(result.dataUrl.length > MAX_UPLOAD_CHARS){
          showToast('Запись слишком длинная для отправки — попробуй короче или тише качеством');
        } else if(constraints.video){
          // проверяем на этом же устройстве, что видео реально проигрывается — иначе не отправляем вслепую
          const playable = await testVideoPlayable(result.dataUrl);
          if(!playable.ok){
            showToast('Это устройство не смогло воспроизвести свою же запись (код ' + playable.code + ') — формат видео здесь не поддерживается, отправка отменена');
          } else {
            await onFinish(result.dataUrl, transcript);
          }
        } else {
          await onFinish(result.dataUrl, transcript);
        }
      }catch(e){
        console.error('recording send failed', e);
        showToast('Не получилось отправить запись: ' + (e.message || e.name || 'ошибка'));
      }
      if(previewEl){ previewEl.remove(); previewEl = null; }
      if(previewBackdrop){ previewBackdrop.remove(); previewBackdrop = null; }
      btn.disabled = false;
      btn.classList.remove('recording');
      btn.innerHTML = icon;
    }

    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if(e.pointerType === 'mouse'){
        if(active) finish(); else begin();
      } else {
        begin();
      }
    });
    btn.addEventListener('pointerup', (e) => { if(e.pointerType !== 'mouse') finish(); });
    btn.addEventListener('pointerleave', (e) => { if(active && e.pointerType !== 'mouse') finish(); });
    btn.addEventListener('pointercancel', (e) => { if(active && e.pointerType !== 'mouse') finish(); });
    return btn;
  }

  const videoMime = pickSupportedMimeType(['video/mp4','video/webm;codecs=vp8,opus','video/webm']);
  const voiceBtn = makeRecordButton(CHAT_ICONS.mic, { audio: true }, 300, doSendVoice, {
    title: 'На телефоне — зажми; на компьютере — клик, чтобы начать, и ещё клик, чтобы отправить (до 5 минут)',
    transcribe: true,
    recorderOptions: { audioBitsPerSecond: 12000 },
  });
  const videoCircleBtn = makeRecordButton(CHAT_ICONS.video, { video: { width: {ideal: 240}, height: {ideal: 240}, facingMode: 'user' }, audio: true }, 20, doSendVideo, {
    title: 'На телефоне — зажми; на компьютере — клик, чтобы начать, и ещё клик, чтобы отправить (до 20 сек)',
    livePreview: true,
    recorderOptions: videoMime ? { mimeType: videoMime, videoBitsPerSecond: 150000, audioBitsPerSecond: 32000 } : { videoBitsPerSecond: 150000, audioBitsPerSecond: 32000 },
  });

  const input = document.createElement('input');
  input.type='text'; input.placeholder='Написать сообщение…';
  input.style.marginBottom = '0';
  const emojiBtn = buildEmojiButton(input);

    }catch(e){ console.error('send failed', e); }
  };
  sendBtn.onclick = doSend;
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') doSend(); });
  inputRow.appendChild(attachBtn);
  inputRow.appendChild(fileInput);
  inputRow.appendChild(voiceBtn);

function timeAgoShort(ts){
  if(!ts) return '';
  const diffMin = (Date.now() - ts) / 60000;
  if(diffMin < 1) return 'сейчас';
  if(diffMin < 60) return Math.round(diffMin) + ' мин';
  const diffH = diffMin / 60;
  if(diffH < 24) return Math.round(diffH) + ' ч';
  return Math.round(diffH / 24) + ' дн';
}

  } else if(state.createGroupFriends.length === 0){
    card.appendChild(el('div','empty','Пока нет друзей, кого можно добавить.'));
  } else {
    const checks = [];
    state.createGroupFriends.forEach(f => {
      const label = document.createElement('label');
      label.style.display='flex'; label.style.alignItems='center'; label.style.gap='10px'; label.style.marginBottom='10px'; label.style.cursor='pointer';
      const cb = document.createElement('input');
      cb.type='checkbox'; cb.style.width='auto'; cb.style.marginBottom='0';
      label.appendChild(cb);
      label.appendChild(document.createTextNode(f.name));
      card.appendChild(label);
      checks.push({ cb, friend: f });
    });
    const createBtn = el('button','btn','Создать группу →');
    createBtn.style.marginTop = '12px';
    createBtn.onclick = async () => {
      const name = nameInput.value.trim();
      const chosen = checks.filter(c => c.cb.checked).map(c => c.friend);
      if(!name){ nameInput.style.borderColor = '#ef6f8e'; return; }
      if(chosen.length === 0){ card.appendChild(el('div','err','Выбери хотя бы одного друга.')); return; }
      createBtn.disabled = true; createBtn.textContent = 'Создаём…';
      try{
        const groupId = await createGroup(name, chosen);
        openGroupChat(groupId, name);
      }catch(e){
        console.error('group create failed', e);
        card.appendChild(el('div','err', e.message));
        createBtn.disabled = false; createBtn.textContent = 'Создать группу →';
      }
    };
    card.appendChild(createBtn);
  }
  w.appendChild(card);
  root.appendChild(w);
}

    const circle = el('div','theme-swatch-circle');
    circle.style.background = THEME_PREVIEW[t.id] || '#222';
    swatch.appendChild(circle);
    swatch.appendChild(el('div','', t.name));
    swatch.onclick = async () => {
      state.user.theme = t.id;
      await saveTheme(t.id);
      render();
    };
    themeGrid.appendChild(swatch);
  });
  themeCard.appendChild(themeGrid);

  const motionLabel = document.createElement('label');
  motionLabel.style.display='flex'; motionLabel.style.alignItems='center'; motionLabel.style.gap='10px';
  motionLabel.style.marginTop = '16px'; motionLabel.style.fontSize = '13px'; motionLabel.style.color = 'var(--ink-dim)';
  motionLabel.style.cursor = 'pointer';
  const motionCheckbox = document.createElement('input');
  motionCheckbox.type = 'checkbox'; motionCheckbox.style.width='auto'; motionCheckbox.style.marginBottom='0';
  motionCheckbox.checked = state.profile?.bgMotion === true;
  motionCheckbox.onchange = async () => {
    applyBgMotion(motionCheckbox.checked);
    const profile = { ...(state.profile||{}), bgMotion: motionCheckbox.checked };
    try{
      const { error } = await sb.from('profiles').update({ profile }).eq('id', state.user.uid);
      if(error) throw new Error(error.message);
      state.profile = profile;
    }catch(e){ console.error('bgMotion save failed', e); showToast('Не удалось сохранить'); }
  };
  motionLabel.appendChild(motionCheckbox);
  motionLabel.appendChild(document.createTextNode('Лёгкое движение фона (сейчас заметно только в светлой теме)'));
  themeCard.appendChild(motionLabel);

  w.appendChild(themeCard);

  // --- Фото аккаунта ---
  const avatarCard = el('div','card');
  avatarCard.style.marginBottom = '16px';
  avatarCard.appendChild(el('div','top-tag','Фото'));
  const avatarRow = el('div','');
  avatarRow.style.display='flex'; avatarRow.style.alignItems='center'; avatarRow.style.gap='16px';
  const avatarPreview = avatarCircleEl(state.user.name, 64);
  avatarPreview.style.fontSize = '24px';
  fillAvatarAsync(avatarPreview, state.user.uid);
  avatarRow.appendChild(avatarPreview);
  const avatarFileInput = document.createElement('input');
  avatarFileInput.type = 'file'; avatarFileInput.accept = 'image/*';
  const avatarBtn = el('button','btn ghost','Загрузить фото');
  avatarBtn.onclick = () => avatarFileInput.click();
  avatarFileInput.onchange = async () => {
    const file = avatarFileInput.files[0];
    if(!file) return;
    avatarBtn.disabled = true; avatarBtn.textContent = 'Загружаем…';
    try{
      const dataUrl = await compressImageToDataUrl(file, 160);
      await saveAvatar(state.user.uid, dataUrl);
      showToast('Фото обновлено ✓');
      render();
    }catch(e){
      console.error('avatar upload failed', e);
      showToast('Не сохранилось: ' + (e.message || e.code || 'ошибка'));
    }
    avatarBtn.disabled = false; avatarBtn.textContent = 'Загрузить фото';
  };
  avatarRow.appendChild(avatarBtn);
  avatarRow.appendChild(avatarFileInput);
  avatarCard.appendChild(avatarRow);
  w.appendChild(avatarCard);

  // --- Логин ---
  const loginCard = el('div','card');
  loginCard.style.marginBottom = '16px';
  loginCard.appendChild(el('div','top-tag','Логин'));
  loginCard.appendChild(el('p','lead','Только латинские буквы — это то, чем ты входишь на сайт.'));
  if(state.accountError) loginCard.appendChild(el('div','err', state.accountError));

  const loginInput = document.createElement('input');
  loginInput.type='text'; loginInput.value = state.user.login || '';
  loginCard.appendChild(loginInput);

  const currentPassInput = document.createElement('input');
  currentPassInput.type='password'; currentPassInput.placeholder='Текущий пароль (чтобы подтвердить смену)';
  loginCard.appendChild(currentPassInput);

  const loginBtn = el('button','btn ghost','Сохранить логин');
  loginBtn.onclick = async () => {
    const newLogin = loginInput.value.trim();
    if(!/^[A-Za-z0-9_]+$/.test(newLogin)){
      state.accountError = 'Логин может содержать только латинские буквы, цифры и подчёркивание.';
      render(); return;
    }
    if(!currentPassInput.value){
      state.accountError = 'Введи текущий пароль, чтобы подтвердить смену логина.';
      render(); return;
    }
    loginBtn.disabled = true; loginBtn.textContent = 'Сохраняем…';
    try{
      await changeLogin(newLogin, currentPassInput.value);
      state.user.login = newLogin;
      state.accountError = '';
      showToast('Логин обновлён ✓');
      render();
    }catch(e){
      state.accountError = e.message;
      loginBtn.disabled = false; loginBtn.textContent = 'Сохранить логин';
      render();
    }
  };
  loginCard.appendChild(loginBtn);
  w.appendChild(loginCard);

  // --- Профиль ---
  const card = el('div','card');
  card.appendChild(el('div','top-tag','Профиль'));

  const nameInput = document.createElement('input');
  nameInput.type='text'; nameInput.placeholder='Имя'; nameInput.value = state.user.name || '';
  card.appendChild(nameInput);

  const rowTop = el('div','');
  rowTop.style.display='flex'; rowTop.style.gap='12px'; rowTop.style.flexWrap='wrap';
  const ageInput = document.createElement('input');
  ageInput.type='text'; ageInput.placeholder='Возраст'; ageInput.style.maxWidth='120px'; ageInput.style.marginBottom='0';
  ageInput.value = state.profile?.age || '';
  rowTop.appendChild(ageInput);
  card.appendChild(rowTop);

  const rowGeo = el('div','');
  rowGeo.style.display='flex'; rowGeo.style.gap='12px'; rowGeo.style.flexWrap='wrap'; rowGeo.style.marginTop='12px';

  const countrySelect = document.createElement('select');
  countrySelect.style.flex='1'; countrySelect.style.minWidth='160px';
  const emptyOpt = document.createElement('option'); emptyOpt.value=''; emptyOpt.textContent='Страна';
  countrySelect.appendChild(emptyOpt);
  COUNTRIES.forEach(c => {
    const opt = document.createElement('option'); opt.value = c; opt.textContent = c;
    if(state.profile?.country === c) opt.selected = true;
    countrySelect.appendChild(opt);
  });
  rowGeo.appendChild(countrySelect);

  const cityContainer = el('div','');
  cityContainer.style.flex = '1'; cityContainer.style.minWidth='160px';
  rowGeo.appendChild(cityContainer);
  card.appendChild(rowGeo);

  function renderCityField(){
    cityContainer.innerHTML = '';
    const cities = citiesForCountry(countrySelect.value);
    if(cities){
      const citySelect = document.createElement('select');
      citySelect.style.width = '100%';
      const cEmpty = document.createElement('option'); cEmpty.value=''; cEmpty.textContent='Город';
      citySelect.appendChild(cEmpty);
      cities.forEach(city => {
        const opt = document.createElement('option'); opt.value = city; opt.textContent = city;
        if(state.profile?.city === city) opt.selected = true;
        citySelect.appendChild(opt);
      });
      citySelect.id = 'city-field';
      cityContainer.appendChild(citySelect);
    } else {
      const cityInput = document.createElement('input');
      cityInput.type='text'; cityInput.placeholder='Город'; cityInput.style.marginBottom='0';
      cityInput.value = state.profile?.city || '';
      cityInput.id = 'city-field';
      cityContainer.appendChild(cityInput);
    }
  }
  renderCityField();
  countrySelect.addEventListener('change', renderCityField);

  const statusLabel = document.createElement('label');
  statusLabel.style.display='flex'; statusLabel.style.alignItems='center'; statusLabel.style.gap='10px';
  statusLabel.style.marginTop = '16px'; statusLabel.style.fontSize = '13px'; statusLabel.style.color = 'var(--ink-dim)';
  statusLabel.style.cursor = 'pointer';
  const statusCheckbox = document.createElement('input');
  statusCheckbox.type = 'checkbox'; statusCheckbox.style.width='auto'; statusCheckbox.style.marginBottom='0';
  statusCheckbox.checked = state.profile?.showStatus !== false;
  statusLabel.appendChild(statusCheckbox);
  statusLabel.appendChild(document.createTextNode('Показывать мой статус «в сети» другим (если выключишь — тоже перестанешь видеть чужой)'));
  card.appendChild(statusLabel);

  const saveBtn = el('button','btn','Сохранить профиль');
  saveBtn.style.marginTop = '14px';
  saveBtn.onclick = async () => {
    saveBtn.disabled = true; saveBtn.textContent = 'Сохраняем…';
    const cityField = document.getElementById('city-field');
    const profile = {
      age: ageInput.value.trim(),
      country: countrySelect.value,
      city: cityField ? cityField.value.trim() : '',
      showStatus: statusCheckbox.checked,
    };
    const newName = nameInput.value.trim() || state.user.name;
    try{
      const { error } = await sb.from('profiles').update({ profile, show_status: statusCheckbox.checked }).eq('id', state.user.uid);
      if(error) throw new Error(error.message);
      if(newName !== state.user.name) await changeDisplayName(newName);
      state.profile = profile;
      state.user.name = newName;
      showToast('Профиль сохранён ✓');
    }catch(e){
      console.error('account save failed', e);
      showToast('Не удалось сохранить :(');
    }
    saveBtn.disabled = false; saveBtn.textContent = 'Сохранить профиль';
    render();
  };
  card.appendChild(saveBtn);
  w.appendChild(card);

  const logoutCard = el('div','card');
  logoutCard.style.marginTop = '16px';
  const logoutBtn = el('button','btn ghost','Выйти из аккаунта');
  logoutBtn.onclick = () => {
    if(chatUnsubscribe){ chatUnsubscribe(); chatUnsubscribe = null; }
    if(otherLastReadUnsub){ otherLastReadUnsub(); otherLastReadUnsub = null; }
    stopNotificationPolling();
    stopListeningForIncomingCalls();
    if(currentCall) endCall(true);
    logoutUser();
    state = { screen: 'landing', user: null, text: '', graph: null, error: '', authMode: 'login' };
    render();
  };
  logoutCard.appendChild(logoutBtn);
  w.appendChild(logoutCard);

  root.appendChild(w);
}

const THEMES = [
  { id: 'dark', name: 'Тёмная (авто)' },
  { id: 'light', name: 'Светлая' },
  { id: 'ocean', name: 'Океан' },
  { id: 'forest', name: 'Лес' },
  { id: 'nebula', name: 'Жемчуг' },
];

function applyTheme(themeId){
  if(themeId && themeId !== 'dark'){
    document.body.dataset.theme = themeId;
  } else {
    delete document.body.dataset.theme;
  }
}

function applyBgMotion(enabled){
  document.body.classList.toggle('bg-motion', !!enabled);
}

async function saveTheme(themeId){
  applyTheme(themeId);
  if(!state.user) return;
  try{
    const { error } = await sb.from('profiles').update({ theme: themeId }).eq('id', state.user.uid);
    if(error) console.error('theme save failed', error);
  }catch(e){ console.error('theme save failed', e); }
}
